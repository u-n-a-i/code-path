ul","lines":"1997,2001"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: desacoplar una abstracci&#xf3;n de su implementaci&#xf3;n, permitiendo que ambas evolucionen de manera independiente.","children":[],"payload":{"tag":"li","lines":"2003,2004"}},{"content":"<strong>Caracter&#xed;sticas</strong>: divide el c&#xf3;digo en dos jerarqu&#xed;as: abstracciones e implementaciones.","children":[],"payload":{"tag":"li","lines":"2004,2005"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas gr&#xe1;ficos que separan la l&#xf3;gica de dibujo de las plataformas de renderizado.","children":[],"payload":{"tag":"li","lines":"2005,2007"}}],"payload":{"tag":"ul","lines":"2003,2007"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: permite tratar objetos individuales y compuestos de manera uniforme.","children":[],"payload":{"tag":"li","lines":"2009,2010"}},{"content":"<strong>Caracter&#xed;sticas</strong>: organiza objetos en estructuras jer&#xe1;rquicas tipo &#xe1;rbol.","children":[],"payload":{"tag":"li","lines":"2010,2011"}},{"content":"<strong>Ejemplo de uso</strong>: men&#xfa;s de aplicaciones, sistemas de archivos con carpetas y archivos.","children":[],"payload":{"tag":"li","lines":"2011,2013"}}],"payload":{"tag":"ul","lines":"2009,2013"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: a&#xf1;ade funcionalidades adicionales a un objeto de manera din&#xe1;mica sin modificar su clase original.","children":[],"payload":{"tag":"li","lines":"2015,2016"}},{"content":"<strong>Caracter&#xed;sticas</strong>: envuelve objetos para extender su comportamiento.","children":[],"payload":{"tag":"li","lines":"2016,2017"}},{"content":"<strong>Ejemplo de uso</strong>: a&#xf1;adir cifrado, compresi&#xf3;n o logging a flujos de datos.","children":[],"payload":{"tag":"li","lines":"2017,2019"}}],"payload":{"tag":"ul","lines":"2015,2019"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: proporciona una <strong>interfaz simplificada</strong> para un conjunto complejo de clases o subsistemas.","children":[],"payload":{"tag":"li","lines":"2021,2022"}},{"content":"<strong>Caracter&#xed;sticas</strong>: oculta la complejidad interna y ofrece un punto de acceso &#xfa;nico.","children":[],"payload":{"tag":"li","lines":"2022,2023"}},{"content":"<strong>Ejemplo de uso</strong>: librer&#xed;as que simplifican el acceso a APIs complejas.","children":[],"payload":{"tag":"li","lines":"2023,2025"}}],"payload":{"tag":"ul","lines":"2021,2025"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: optimizar el uso de memoria compartiendo objetos comunes en lugar de duplicarlos.","children":[],"payload":{"tag":"li","lines":"2027,2028"}},{"content":"<strong>Caracter&#xed;sticas</strong>: separa el estado intr&#xed;nseco (compartido) del extr&#xed;nseco (&#xfa;nico).","children":[],"payload":{"tag":"li","lines":"2028,2029"}},{"content":"<strong>Ejemplo de uso</strong>: representaci&#xf3;n de caracteres en un editor de texto, piezas en un juego.","children":[],"payload":{"tag":"li","lines":"2029,2031"}}],"payload":{"tag":"ul","lines":"2027,2031"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: actuar como sustituto o intermediario de otro objeto, controlando su acceso.","children":[],"payload":{"tag":"li","lines":"2033,2034"}},{"content":"<strong>Caracter&#xed;sticas</strong>: puede a&#xf1;adir seguridad, control de acceso, carga diferida o comunicaci&#xf3;n remota.","children":[],"payload":{"tag":"li","lines":"2034,2035"}},{"content":"<strong>Ejemplo de uso</strong>: proxies de red, acceso a servicios remotos, objetos pesados cargados bajo demanda.","children":[],"payload":{"tag":"li","lines":"2035,2036"}}],"payload":{"tag":"ul","lines":"2033,2036"}}],"payload":{"tag":"li","lines":"1988,2036"}},{"content":"\n<p data-lines=\"2036,2037\">Comportamiento</p>\n<h2 data-lines=\"2038,2039\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"2040,2042\">Los <strong>patrones de comportamiento</strong> son un grupo de patrones de dise&#xf1;o que se enfocan en la <strong>interacci&#xf3;n y comunicaci&#xf3;n entre objetos</strong>.<br>\nSu objetivo es definir c&#xf3;mo los objetos colaboran, se comunican y reparten responsabilidades, asegurando que el sistema sea m&#xe1;s flexible, extensible y f&#xe1;cil de mantener.</p>\n<h2 data-lines=\"2043,2044\">&#x1f539; Observer</h2>","children":[{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: define una dependencia uno-a-muchos entre objetos, de manera que cuando uno cambia de estado, todos sus dependientes son notificados autom&#xe1;ticamente.","children":[],"payload":{"tag":"li","lines":"2045,2046"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas de suscripci&#xf3;n, interfaces gr&#xe1;ficas, notificaciones en tiempo real.","children":[],"payload":{"tag":"li","lines":"2046,2048"}}],"payload":{"tag":"ul","lines":"2045,2048"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: permite definir una familia de algoritmos, encapsularlos y hacerlos intercambiables en tiempo de ejecuci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"2050,2051"}},{"content":"<strong>Ejemplo de uso</strong>: algoritmos de ordenamiento, c&#xe1;lculo de rutas, m&#xe9;todos de pago.","children":[],"payload":{"tag":"li","lines":"2051,2053"}}],"payload":{"tag":"ul","lines":"2050,2053"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: encapsula una petici&#xf3;n como un objeto, permitiendo parametrizar clientes con diferentes solicitudes, colas o registros de operaciones.","children":[],"payload":{"tag":"li","lines":"2055,2056"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas de deshacer/rehacer, ejecuci&#xf3;n de tareas programadas.","children":[],"payload":{"tag":"li","lines":"2056,2058"}}],"payload":{"tag":"ul","lines":"2055,2058"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: permite que un objeto cambie su comportamiento cuando cambia su estado interno.","children":[],"payload":{"tag":"li","lines":"2060,2061"}},{"content":"<strong>Ejemplo de uso</strong>: m&#xe1;quinas de estados, sistemas de autenticaci&#xf3;n, ciclos de vida de documentos.","children":[],"payload":{"tag":"li","lines":"2061,2063"}}],"payload":{"tag":"ul","lines":"2060,2063"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: proporciona una manera de acceder secuencialmente a los elementos de una colecci&#xf3;n sin exponer su representaci&#xf3;n interna.","children":[],"payload":{"tag":"li","lines":"2065,2066"}},{"content":"<strong>Ejemplo de uso</strong>: recorrer listas, &#xe1;rboles o estructuras de datos complejas.","children":[],"payload":{"tag":"li","lines":"2066,2068"}}],"payload":{"tag":"ul","lines":"2065,2068"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: define un objeto que encapsula la forma en que interact&#xfa;an un conjunto de objetos, promoviendo el bajo acoplamiento.","children":[],"payload":{"tag":"li","lines":"2070,2071"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas de chat, coordinaci&#xf3;n de componentes en interfaces gr&#xe1;ficas.","children":[],"payload":{"tag":"li","lines":"2071,2073"}}],"payload":{"tag":"ul","lines":"2070,2073"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: captura y externaliza el estado interno de un objeto sin violar su encapsulaci&#xf3;n, para poder restaurarlo m&#xe1;s tarde.","children":[],"payload":{"tag":"li","lines":"2075,2076"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas de deshacer/rehacer, guardado de configuraciones.","children":[],"payload":{"tag":"li","lines":"2076,2078"}}],"payload":{"tag":"ul","lines":"2075,2078"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: define el esqueleto de un algoritmo en una operaci&#xf3;n, dejando que las subclases redefinan ciertos pasos sin cambiar la estructura general.","children":[],"payload":{"tag":"li","lines":"2080,2081"}},{"content":"<strong>Ejemplo de uso</strong>: procesamiento de archivos, flujos de validaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"2081,2083"}}],"payload":{"tag":"ul","lines":"2080,2083"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: permite definir nuevas operaciones sobre una estructura de objetos sin modificar las clases de los objetos.","children":[],"payload":{"tag":"li","lines":"2085,2086"}},{"content":"<strong>Ejemplo de uso</strong>: recorridos en &#xe1;rboles, operaciones sobre estructuras complejas.","children":[],"payload":{"tag":"li","lines":"2086,2088"}}],"payload":{"tag":"ul","lines":"2085,2088"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: evita acoplar el emisor de una petici&#xf3;n a su receptor, dando la posibilidad de que m&#xfa;ltiples objetos la procesen en cadena.","children":[],"payload":{"tag":"li","lines":"2090,2091"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas de validaci&#xf3;n, manejo de eventos, filtros en servidores web.","children":[],"payload":{"tag":"li","lines":"2091,2093"}}],"payload":{"tag":"ul","lines":"2090,2093"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: define una representaci&#xf3;n para la gram&#xe1;tica de un lenguaje y un int&#xe9;rprete que usa dicha representaci&#xf3;n para interpretar sentencias.","children":[],"payload":{"tag":"li","lines":"2095,2096"}},{"content":"<strong>Ejemplo de uso</strong>: int&#xe9;rpretes de expresiones matem&#xe1;ticas, lenguajes de dominio espec&#xed;fico (DSL).","children":[],"payload":{"tag":"li","lines":"2096,2097"}}],"payload":{"tag":"ul","lines":"2095,2097"}}],"payload":{"tag":"li","lines":"2036,2097"}},{"content":"\n<p data-lines=\"2097,2098\">Arquitect&#xf3;nicos</p>\n<h2 data-lines=\"2099,2100\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"2101,2103\">Los <strong>patrones arquitect&#xf3;nicos</strong> son soluciones de alto nivel que definen la <strong>estructura y organizaci&#xf3;n de un sistema de software</strong>.<br>\nA diferencia de los patrones de dise&#xf1;o (que se enfocan en problemas m&#xe1;s espec&#xed;ficos), los arquitect&#xf3;nicos establecen la <strong>forma global</strong> en que los componentes interact&#xfa;an, asegurando escalabilidad, mantenibilidad y flexibilidad.</p>\n<h2 data-lines=\"2104,2105\">&#x1f539; Modelo-Vista-Controlador (MVC)</h2>","children":[{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: separar la l&#xf3;gica de negocio, la interfaz de usuario y el control de flujo.","children":[],"payload":{"tag":"li","lines":"2106,2107"}},{"content":"<strong>Componentes</strong>:","children":[{"content":"<strong>Modelo</strong>: gestiona los datos y reglas de negocio.","children":[],"payload":{"tag":"li","lines":"2108,2109"}},{"content":"<strong>Vista</strong>: presenta la informaci&#xf3;n al usuario.","children":[],"payload":{"tag":"li","lines":"2109,2110"}},{"content":"<strong>Controlador</strong>: coordina la interacci&#xf3;n entre modelo y vista.","children":[],"payload":{"tag":"li","lines":"2110,2111"}}],"payload":{"tag":"li","lines":"2107,2111"}},{"content":"<strong>Ejemplo de uso</strong>: frameworks web como Django, Ruby on Rails, Spring MVC.","children":[],"payload":{"tag":"li","lines":"2111,2113"}}],"payload":{"tag":"ul","lines":"2106,2113"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: similar al MVC, pero el <strong>presentador</strong> asume mayor responsabilidad en la l&#xf3;gica de presentaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"2115,2116"}},{"content":"<strong>Componentes</strong>:","children":[{"content":"<strong>Modelo</strong>: datos y l&#xf3;gica de negocio.","children":[],"payload":{"tag":"li","lines":"2117,2118"}},{"content":"<strong>Vista</strong>: interfaz de usuario, m&#xe1;s pasiva.","children":[],"payload":{"tag":"li","lines":"2118,2119"}},{"content":"<strong>Presentador</strong>: contiene la l&#xf3;gica de presentaci&#xf3;n y act&#xfa;a como intermediario.","children":[],"payload":{"tag":"li","lines":"2119,2120"}}],"payload":{"tag":"li","lines":"2116,2120"}},{"content":"<strong>Ejemplo de uso</strong>: aplicaciones de escritorio y m&#xf3;viles (Android).","children":[],"payload":{"tag":"li","lines":"2120,2122"}}],"payload":{"tag":"ul","lines":"2115,2122"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: separar la interfaz de usuario de la l&#xf3;gica de negocio mediante un <strong>ViewModel</strong> que expone datos y comandos.","children":[],"payload":{"tag":"li","lines":"2124,2125"}},{"content":"<strong>Componentes</strong>:","children":[{"content":"<strong>Modelo</strong>: datos y l&#xf3;gica.","children":[],"payload":{"tag":"li","lines":"2126,2127"}},{"content":"<strong>Vista</strong>: interfaz gr&#xe1;fica.","children":[],"payload":{"tag":"li","lines":"2127,2128"}},{"content":"<strong>ViewModel</strong>: conecta la vista con el modelo, usando <strong>data binding</strong>.","children":[],"payload":{"tag":"li","lines":"2128,2129"}}],"payload":{"tag":"li","lines":"2125,2129"}},{"content":"<strong>Ejemplo de uso</strong>: frameworks como Angular, React (con hooks), WPF, Xamarin.","children":[],"payload":{"tag":"li","lines":"2129,2131"}}],"payload":{"tag":"ul","lines":"2124,2131"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: organizar el sistema en <strong>capas jer&#xe1;rquicas</strong>, cada una con responsabilidades espec&#xed;ficas.","children":[],"payload":{"tag":"li","lines":"2133,2134"}},{"content":"<strong>Componentes t&#xed;picos</strong>:","children":[{"content":"<strong>Capa de presentaci&#xf3;n</strong>: interfaz con el usuario.","children":[],"payload":{"tag":"li","lines":"2135,2136"}},{"content":"<strong>Capa de negocio</strong>: l&#xf3;gica de la aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"2136,2137"}},{"content":"<strong>Capa de datos</strong>: acceso y persistencia.","children":[],"payload":{"tag":"li","lines":"2137,2138"}}],"payload":{"tag":"li","lines":"2134,2138"}},{"content":"<strong>Ejemplo de uso</strong>: aplicaciones empresariales tradicionales.","children":[],"payload":{"tag":"li","lines":"2138,2140"}}],"payload":{"tag":"ul","lines":"2133,2140"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: tambi&#xe9;n llamada <strong>Ports and Adapters</strong>, busca aislar la l&#xf3;gica de negocio del resto del sistema.","children":[],"payload":{"tag":"li","lines":"2142,2143"}},{"content":"<strong>Caracter&#xed;sticas</strong>:","children":[{"content":"El n&#xfa;cleo de la aplicaci&#xf3;n es independiente de frameworks y bases de datos.","children":[],"payload":{"tag":"li","lines":"2144,2145"}},{"content":"Los <strong>puertos</strong> definen interfaces.","children":[],"payload":{"tag":"li","lines":"2145,2146"}},{"content":"Los <strong>adaptadores</strong> implementan esas interfaces para interactuar con sistemas externos.","children":[],"payload":{"tag":"li","lines":"2146,2147"}}],"payload":{"tag":"li","lines":"2143,2147"}},{"content":"<strong>Ejemplo de uso</strong>: aplicaciones que requieren alta mantenibilidad y facilidad de pruebas.","children":[],"payload":{"tag":"li","lines":"2147,2149"}}],"payload":{"tag":"ul","lines":"2142,2149"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: dividir el sistema en <strong>servicios peque&#xf1;os e independientes</strong>, que se comunican entre s&#xed; mediante APIs.","children":[],"payload":{"tag":"li","lines":"2151,2152"}},{"content":"<strong>Caracter&#xed;sticas</strong>:","children":[{"content":"Cada servicio tiene su propia l&#xf3;gica y base de datos.","children":[],"payload":{"tag":"li","lines":"2153,2154"}},{"content":"Escalabilidad independiente.","children":[],"payload":{"tag":"li","lines":"2154,2155"}},{"content":"Despliegue aut&#xf3;nomo.","children":[],"payload":{"tag":"li","lines":"2155,2156"}}],"payload":{"tag":"li","lines":"2152,2156"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas distribuidos modernos, plataformas de e-commerce, Netflix, Amazon.","children":[],"payload":{"tag":"li","lines":"2156,2158"}}],"payload":{"tag":"ul","lines":"2151,2158"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: organizar el sistema en <strong>servicios reutilizables</strong> que se comunican mediante protocolos est&#xe1;ndar (ejemplo: SOAP, REST).","children":[],"payload":{"tag":"li","lines":"2160,2161"}},{"content":"<strong>Caracter&#xed;sticas</strong>:","children":[{"content":"Servicios m&#xe1;s grandes y menos independientes que los microservicios.","children":[],"payload":{"tag":"li","lines":"2162,2163"}},{"content":"Uso de un <strong>bus de servicios (ESB)</strong> para la comunicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"2163,2164"}}],"payload":{"tag":"li","lines":"2161,2164"}},{"content":"<strong>Ejemplo de uso</strong>: aplicaciones empresariales integradas, sistemas bancarios.","children":[],"payload":{"tag":"li","lines":"2164,2166"}}],"payload":{"tag":"ul","lines":"2160,2166"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: los componentes del sistema reaccionan a <strong>eventos</strong> generados por otros componentes.","children":[],"payload":{"tag":"li","lines":"2168,2169"}},{"content":"<strong>Caracter&#xed;sticas</strong>:","children":[{"content":"Comunicaci&#xf3;n as&#xed;ncrona mediante colas o brokers de mensajes.","children":[],"payload":{"tag":"li","lines":"2170,2171"}},{"content":"Desacoplamiento entre emisores y receptores.","children":[],"payload":{"tag":"li","lines":"2171,2172"}},{"content":"Escalabilidad y flexibilidad en sistemas distribuidos.","children":[],"payload":{"tag":"li","lines":"2172,2173"}}],"payload":{"tag":"li","lines":"2169,2173"}},{"content":"<strong>Ejemplo de uso</strong>","children":[],"payload":{"tag":"li","lines":"2173,2174"}}],"payload":{"tag":"ul","lines":"2168,2174"}}],"payload":{"tag":"li","lines":"2097,2174"}},{"content":"\n<p data-lines=\"2174,2175\">Concurrencia</p>\n<h2 data-lines=\"2176,2177\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"2178,2180\">Los <strong>patrones de concurrencia</strong> son soluciones de dise&#xf1;o que abordan problemas comunes en sistemas donde m&#xfa;ltiples procesos o hilos se ejecutan de manera simult&#xe1;nea.<br>\nSu objetivo es garantizar la <strong>coordinaci&#xf3;n, sincronizaci&#xf3;n y comunicaci&#xf3;n</strong> entre tareas concurrentes, evitando errores como condiciones de carrera, bloqueos o inconsistencias en el acceso a recursos compartidos.</p>\n<h2 data-lines=\"2181,2182\">&#x1f539; Bloqueo M&#xfa;ltiple (Multiple Locks)</h2>","children":[{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: permitir que diferentes recursos compartidos sean protegidos por distintos bloqueos.","children":[],"payload":{"tag":"li","lines":"2183,2184"}},{"content":"<strong>Caracter&#xed;sticas</strong>: cada recurso tiene su propio candado, lo que mejora la eficiencia al evitar bloqueos globales.","children":[],"payload":{"tag":"li","lines":"2184,2185"}},{"content":"<strong>Ejemplo de uso</strong>: bases de datos que bloquean filas o tablas espec&#xed;ficas en lugar de toda la base.","children":[],"payload":{"tag":"li","lines":"2185,2187"}}],"payload":{"tag":"ul","lines":"2183,2187"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: establecer un orden jer&#xe1;rquico en la adquisici&#xf3;n de bloqueos para evitar interbloqueos (deadlocks).","children":[],"payload":{"tag":"li","lines":"2189,2190"}},{"content":"<strong>Caracter&#xed;sticas</strong>: los hilos deben adquirir bloqueos siguiendo un orden predefinido.","children":[],"payload":{"tag":"li","lines":"2190,2191"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas de archivos donde primero se bloquea el directorio y luego los archivos.","children":[],"payload":{"tag":"li","lines":"2191,2193"}}],"payload":{"tag":"ul","lines":"2189,2193"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: controlar el acceso a un recurso compartido mediante un contador.","children":[],"payload":{"tag":"li","lines":"2195,2196"}},{"content":"<strong>Caracter&#xed;sticas</strong>:","children":[{"content":"<strong>Sem&#xe1;foro binario</strong>: permite acceso exclusivo (similar a un candado).","children":[],"payload":{"tag":"li","lines":"2197,2198"}},{"content":"<strong>Sem&#xe1;foro contable</strong>: permite acceso a un n&#xfa;mero limitado de hilos.","children":[],"payload":{"tag":"li","lines":"2198,2199"}}],"payload":{"tag":"li","lines":"2196,2199"}},{"content":"<strong>Ejemplo de uso</strong>: limitar el n&#xfa;mero de conexiones simult&#xe1;neas a un servidor.","children":[],"payload":{"tag":"li","lines":"2199,2201"}}],"payload":{"tag":"ul","lines":"2195,2201"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: encapsular variables compartidas, operaciones y mecanismos de sincronizaci&#xf3;n en una estructura &#xfa;nica.","children":[],"payload":{"tag":"li","lines":"2203,2204"}},{"content":"<strong>Caracter&#xed;sticas</strong>: asegura que solo un hilo acceda a la secci&#xf3;n cr&#xed;tica a la vez.","children":[],"payload":{"tag":"li","lines":"2204,2205"}},{"content":"<strong>Ejemplo de uso</strong>: lenguajes como Java y C# implementan monitores en sus bloques <code>synchronized</code>.","children":[],"payload":{"tag":"li","lines":"2205,2207"}}],"payload":{"tag":"ul","lines":"2203,2207"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: coordinar la producci&#xf3;n y consumo de datos entre hilos.","children":[],"payload":{"tag":"li","lines":"2209,2210"}},{"content":"<strong>Caracter&#xed;sticas</strong>:","children":[{"content":"El productor genera datos y los coloca en una cola.","children":[],"payload":{"tag":"li","lines":"2211,2212"}},{"content":"El consumidor extrae datos de la cola para procesarlos.","children":[],"payload":{"tag":"li","lines":"2212,2213"}}],"payload":{"tag":"li","lines":"2210,2213"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas de mensajer&#xed;a, procesamiento de tareas en segundo plano.","children":[],"payload":{"tag":"li","lines":"2213,2215"}}],"payload":{"tag":"ul","lines":"2209,2215"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: sincronizar m&#xfa;ltiples hilos en un punto com&#xfa;n antes de continuar la ejecuci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"2217,2218"}},{"content":"<strong>Caracter&#xed;sticas</strong>: todos los hilos deben llegar a la barrera para avanzar juntos.","children":[],"payload":{"tag":"li","lines":"2218,2219"}},{"content":"<strong>Ejemplo de uso</strong>: c&#xe1;lculos paralelos donde los resultados parciales deben combinarse antes de seguir.","children":[],"payload":{"tag":"li","lines":"2219,2221"}}],"payload":{"tag":"ul","lines":"2217,2221"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: gestionar un conjunto de hilos reutilizables para ejecutar tareas concurrentes.","children":[],"payload":{"tag":"li","lines":"2223,2224"}},{"content":"<strong>Caracter&#xed;sticas</strong>: evita la sobrecarga de crear y destruir hilos constantemente.","children":[],"payload":{"tag":"li","lines":"2224,2225"}},{"content":"<strong>Ejemplo de uso</strong>: servidores web que atienden m&#xfa;ltiples solicitudes simult&#xe1;neamente.","children":[],"payload":{"tag":"li","lines":"2225,2227"}}],"payload":{"tag":"ul","lines":"2223,2227"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: similar a la barrera, pero puede reutilizarse m&#xfa;ltiples veces.","children":[],"payload":{"tag":"li","lines":"2229,2230"}},{"content":"<strong>Caracter&#xed;sticas</strong>: los hilos se sincronizan en ciclos repetidos de ejecuci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"2230,2231"}},{"content":"<strong>Ejemplo de uso</strong>: simulaciones iterativas donde los hilos deben sincronizarse en cada paso.","children":[],"payload":{"tag":"li","lines":"2231,2233"}}],"payload":{"tag":"ul","lines":"2229,2233"}}],"payload":{"tag":"li","lines":"2174,2233"}}],"payload":{"tag":"h3","lines":"1907,1908"}},{"content":"Fundamentos de testing","children":[{"content":"\n<p data-lines=\"2235,2236\">Introducci&#xf3;n</p>","children":[{"content":"Qu&#xe9; es una prueba (test) de software","children":[],"payload":{"tag":"li","lines":"2236,2237"}},{"content":"Por qu&#xe9; testear: evitar bugs, facilitar cambios, documentar comportamiento","children":[],"payload":{"tag":"li","lines":"2237,2238"}},{"content":"Costo de no testear: fallos en producci&#xf3;n, p&#xe9;rdida de confianza","children":[],"payload":{"tag":"li","lines":"2238,2239"}},{"content":"Testing manual vs testing automatizado","children":[],"payload":{"tag":"li","lines":"2239,2240"}},{"content":"Diferencia entre verificaci&#xf3;n y validaci&#xf3;n","children":[],"payload":{"tag":"li","lines":"2240,2241"}},{"content":"Ciclo de vida del testing: desarrollo &#x2192; prueba &#x2192; correcci&#xf3;n &#x2192; re-prueba","children":[],"payload":{"tag":"li","lines":"2241,2242"}}],"payload":{"tag":"li","lines":"2235,2242"}},{"content":"\n<p data-lines=\"2242,2243\">Por nivel</p>","children":[{"content":"Unitarias (Unit Tests): prueban una funci&#xf3;n, m&#xe9;todo o clase","children":[],"payload":{"tag":"li","lines":"2243,2244"}},{"content":"De integraci&#xf3;n (Integration Tests): prueban c&#xf3;mo interact&#xfa;an varios componentes","children":[],"payload":{"tag":"li","lines":"2244,2245"}},{"content":"De sistema (System Tests): prueban toda la aplicaci&#xf3;n como un todo","children":[],"payload":{"tag":"li","lines":"2245,2246"}},{"content":"De aceptaci&#xf3;n (Acceptance Tests): validan requisitos del usuario","children":[],"payload":{"tag":"li","lines":"2246,2248"}}],"payload":{"tag":"li","lines":"2242,2248"}},{"content":"\n<p data-lines=\"2248,2249\">Por ejecuci&#xf3;n</p>","children":[{"content":"Manuales: realizadas por una persona","children":[],"payload":{"tag":"li","lines":"2249,2250"}},{"content":"Automatizadas: escritas en c&#xf3;digo, se ejecutan con herramientas","children":[],"payload":{"tag":"li","lines":"2250,2251"}}],"payload":{"tag":"li","lines":"2248,2251"}},{"content":"\n<p data-lines=\"2251,2252\">Por conocimiento</p>","children":[{"content":"Caja negra: sin ver el c&#xf3;digo (solo entradas y salidas)","children":[],"payload":{"tag":"li","lines":"2252,2253"}},{"content":"Caja blanca: con acceso al c&#xf3;digo (prueba caminos internos)","children":[],"payload":{"tag":"li","lines":"2253,2254"}},{"content":"Basadas en experiencia: exploratorio, error guessing","children":[],"payload":{"tag":"li","lines":"2254,2255"}}],"payload":{"tag":"li","lines":"2251,2255"}},{"content":"\n<p data-lines=\"2255,2256\">Pruebas unitarias</p>","children":[{"content":"Qu&#xe9; es una funci&#xf3;n pura: ideal para testear","children":[],"payload":{"tag":"li","lines":"2256,2257"}},{"content":"Estructura de un test: Given-When-Then (Dado-Cuando-Entonces)","children":[],"payload":{"tag":"li","lines":"2257,2258"}},{"content":"Valores de entrada, salida esperada, aserciones","children":[],"payload":{"tag":"li","lines":"2258,2259"}},{"content":"Buenas pr&#xe1;cticas:","children":[{"content":"Tests r&#xe1;pidos, aislados, repetibles","children":[],"payload":{"tag":"li","lines":"2260,2261"}},{"content":"Un test = un comportamiento","children":[],"payload":{"tag":"li","lines":"2261,2262"}},{"content":"Nombres claros: <code>deber&#xed;aSumarDosNumeros</code>","children":[],"payload":{"tag":"li","lines":"2262,2263"}}],"payload":{"tag":"li","lines":"2259,2263"}}],"payload":{"tag":"li","lines":"2255,2263"}},{"content":"\n<p data-lines=\"2263,2264\">TDD (test&#x2011;driven development)</p>","children":[{"content":"Qu&#xe9; es TDD: escribir el test antes del c&#xf3;digo","children":[],"payload":{"tag":"li","lines":"2264,2265"}},{"content":"Ciclo rojo-verde-refactor:","children":[{"content":"Rojo: escribe un test que falla","children":[],"payload":{"tag":"li","lines":"2266,2267"}},{"content":"Verde: escribe el m&#xed;nimo c&#xf3;digo para que pase","children":[],"payload":{"tag":"li","lines":"2267,2268"}},{"content":"Refactor: mejora el c&#xf3;digo sin romper los tests","children":[],"payload":{"tag":"li","lines":"2268,2269"}}],"payload":{"tag":"li","lines":"2265,2269"}},{"content":"Ventajas: dise&#xf1;o limpio, menos bugs, confianza al refactorizar","children":[],"payload":{"tag":"li","lines":"2269,2270"}},{"content":"Limitaciones: curva de aprendizaje, no siempre aplicable","children":[],"payload":{"tag":"li","lines":"2270,2272"}}],"payload":{"tag":"li","lines":"2263,2272"}},{"content":"\n<p data-lines=\"2272,2273\">Aislar unidades y simular dependencias</p>","children":[{"content":"Por qu&#xe9; no testear todo junto: necesitas aislar la unidad","children":[],"payload":{"tag":"li","lines":"2273,2274"}},{"content":"Mock: objeto falso que simula un comportamiento (ej: una API)","children":[],"payload":{"tag":"li","lines":"2274,2275"}},{"content":"Stub: devuelve valores predefinidos","children":[],"payload":{"tag":"li","lines":"2275,2276"}},{"content":"Spy: registra llamadas a una funci&#xf3;n","children":[],"payload":{"tag":"li","lines":"2276,2277"}},{"content":"Ejemplo: simular una llamada a una base de datos o API externa","children":[],"payload":{"tag":"li","lines":"2277,2279"}}],"payload":{"tag":"li","lines":"2272,2279"}},{"content":"\n<p data-lines=\"2279,2280\">Pruebas de integraci&#xf3;n</p>","children":[{"content":"Prueban la interacci&#xf3;n entre m&#xf3;dulos","children":[],"payload":{"tag":"li","lines":"2280,2281"}},{"content":"Ejemplo: probar que un controlador llama al modelo y devuelve una respuesta","children":[],"payload":{"tag":"li","lines":"2281,2282"}},{"content":"En APIs: probar rutas con <code>supertest</code> (Node.js) o <code>requests</code> (Python)","children":[],"payload":
