52\"><strong>Clean Code</strong> (C&#xf3;digo Limpio) es un enfoque de programaci&#xf3;n que busca escribir c&#xf3;digo <strong>claro, legible, mantenible y eficiente</strong>, de manera que cualquier desarrollador pueda entenderlo y modificarlo f&#xe1;cilmente.<br>\nEl t&#xe9;rmino se populariz&#xf3; gracias al libro <em>Clean Code: A Handbook of Agile Software Craftsmanship</em> de <strong>Robert C. Martin (Uncle Bob)</strong>, considerado una referencia esencial en buenas pr&#xe1;cticas de programaci&#xf3;n.</p>\n<h2 data-lines=\"153,154\">&#x1f539; Principios Fundamentales</h2>","children":[{"content":"","children":[{"content":"<strong>Legibilidad</strong>: el c&#xf3;digo debe ser f&#xe1;cil de leer y comprender.","children":[],"payload":{"tag":"li","lines":"155,156"}},{"content":"<strong>Simplicidad</strong>: evitar complejidad innecesaria, priorizando soluciones claras.","children":[],"payload":{"tag":"li","lines":"156,157"}},{"content":"<strong>Consistencia</strong>: seguir convenciones de estilo y nomenclatura.","children":[],"payload":{"tag":"li","lines":"157,158"}},{"content":"<strong>Mantenibilidad</strong>: facilitar la correcci&#xf3;n de errores y la incorporaci&#xf3;n de nuevas funcionalidades.","children":[],"payload":{"tag":"li","lines":"158,159"}},{"content":"<strong>Modularidad</strong>: dividir el sistema en funciones, clases y m&#xf3;dulos peque&#xf1;os y coherentes.","children":[],"payload":{"tag":"li","lines":"159,160"}},{"content":"<strong>Pruebas</strong>: el c&#xf3;digo limpio debe ser f&#xe1;cil de probar y verificar.","children":[],"payload":{"tag":"li","lines":"160,162"}}],"payload":{"tag":"ul","lines":"155,162"}},{"content":"","children":[{"content":"Usar <strong>nombres significativos</strong> para variables, funciones y clases.","children":[],"payload":{"tag":"li","lines":"164,165"}},{"content":"Escribir <strong>funciones peque&#xf1;as</strong> que hagan una sola cosa.","children":[],"payload":{"tag":"li","lines":"165,166"}},{"content":"Evitar duplicaci&#xf3;n de c&#xf3;digo (<strong>DRY: Don&#x2019;t Repeat Yourself</strong>).","children":[],"payload":{"tag":"li","lines":"166,167"}},{"content":"Manejar errores de forma clara y consistente.","children":[],"payload":{"tag":"li","lines":"167,168"}},{"content":"Documentar solo lo necesario: el c&#xf3;digo debe ser <strong>autoexplicativo</strong>.","children":[],"payload":{"tag":"li","lines":"168,169"}},{"content":"Seguir principios como <strong>SOLID</strong> y <strong>KISS (Keep It Simple, Stupid)</strong>.","children":[],"payload":{"tag":"li","lines":"169,170"}},{"content":"Refactorizar constantemente para mejorar la calidad del c&#xf3;digo.","children":[],"payload":{"tag":"li","lines":"170,172"}}],"payload":{"tag":"ul","lines":"164,172"}},{"content":"","children":[{"content":"<strong>Facilita el trabajo en equipo</strong>: cualquier desarrollador puede entender y colaborar.","children":[],"payload":{"tag":"li","lines":"174,175"}},{"content":"<strong>Reduce errores</strong>: c&#xf3;digo m&#xe1;s claro disminuye la probabilidad de fallos.","children":[],"payload":{"tag":"li","lines":"175,176"}},{"content":"<strong>Ahorra tiempo y costes</strong>: menos esfuerzo en mantenimiento y evoluci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"176,177"}},{"content":"<strong>Escalabilidad</strong>: sistemas m&#xe1;s f&#xe1;ciles de extender y adaptar.","children":[],"payload":{"tag":"li","lines":"177,178"}},{"content":"<strong>Profesionalismo</strong>: refleja buenas pr&#xe1;cticas y calidad en el desarrollo.","children":[],"payload":{"tag":"li","lines":"178,180"}}],"payload":{"tag":"ul","lines":"174,180"}},{"content":"","children":[{"content":"Requiere <strong>disciplina constante</strong>: escribir c&#xf3;digo limpio es un h&#xe1;bito, no un evento puntual.","children":[],"payload":{"tag":"li","lines":"182,183"}},{"content":"Puede implicar <strong>m&#xe1;s tiempo inicial</strong>, pero se compensa con menor esfuerzo en mantenimiento.","children":[],"payload":{"tag":"li","lines":"183,184"}},{"content":"No significa &#x201c;c&#xf3;digo perfecto&#x201d;, sino <strong>c&#xf3;digo suficientemente bueno y claro</strong> para ser entendido y mantenido.","children":[],"payload":{"tag":"li","lines":"184,185"}}],"payload":{"tag":"ul","lines":"182,185"}}],"payload":{"tag":"li","lines":"146,185"}},{"content":"\n<p data-lines=\"185,186\">Refactorizaci&#xf3;n continua</p>\n<h2 data-lines=\"187,188\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"189,191\">La <strong>refactorizaci&#xf3;n continua</strong> es la pr&#xe1;ctica de <strong>mejorar de manera constante el c&#xf3;digo existente</strong> sin alterar su funcionalidad externa.<br>\nConsiste en realizar peque&#xf1;os cambios frecuentes que optimizan la <strong>legibilidad, mantenibilidad y eficiencia</strong> del sistema, evitando que el c&#xf3;digo se degrade con el tiempo.</p>\n<h2 data-lines=\"192,193\">&#x1f539; Principios Fundamentales</h2>","children":[{"content":"","children":[{"content":"<strong>Peque&#xf1;os pasos</strong>: cambios incrementales en lugar de grandes modificaciones.","children":[],"payload":{"tag":"li","lines":"194,195"}},{"content":"<strong>Sin alterar el comportamiento</strong>: el c&#xf3;digo debe seguir funcionando igual despu&#xe9;s de cada refactorizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"195,196"}},{"content":"<strong>Apoyada en pruebas</strong>: contar con <strong>tests automatizados</strong> que aseguren que la funcionalidad no se rompe.","children":[],"payload":{"tag":"li","lines":"196,197"}},{"content":"<strong>Constancia</strong>: no esperar a que el c&#xf3;digo est&#xe9; &#x201c;roto&#x201d; para mejorarlo, sino hacerlo de manera continua.","children":[],"payload":{"tag":"li","lines":"197,198"}},{"content":"<strong>Prevenci&#xf3;n de deuda t&#xe9;cnica</strong>: evita acumulaci&#xf3;n de problemas que luego son m&#xe1;s costosos de resolver.","children":[],"payload":{"tag":"li","lines":"198,200"}}],"payload":{"tag":"ul","lines":"194,200"}},{"content":"","children":[{"content":"<strong>Legibilidad</strong>: el c&#xf3;digo se vuelve m&#xe1;s claro y f&#xe1;cil de entender.","children":[],"payload":{"tag":"li","lines":"202,203"}},{"content":"<strong>Mantenibilidad</strong>: facilita la incorporaci&#xf3;n de nuevas funcionalidades.","children":[],"payload":{"tag":"li","lines":"203,204"}},{"content":"<strong>Reducci&#xf3;n de errores</strong>: al simplificar estructuras, disminuye la probabilidad de fallos.","children":[],"payload":{"tag":"li","lines":"204,205"}},{"content":"<strong>Evoluci&#xf3;n del sistema</strong>: permite que el software crezca de manera ordenada.","children":[],"payload":{"tag":"li","lines":"205,206"}},{"content":"<strong>Trabajo en equipo</strong>: cualquier desarrollador puede comprender y modificar el c&#xf3;digo m&#xe1;s f&#xe1;cilmente.","children":[],"payload":{"tag":"li","lines":"206,208"}}],"payload":{"tag":"ul","lines":"202,208"}},{"content":"","children":[{"content":"Renombrar variables y m&#xe9;todos con nombres m&#xe1;s descriptivos.","children":[],"payload":{"tag":"li","lines":"210,211"}},{"content":"Extraer m&#xe9;todos para reducir funciones demasiado largas.","children":[],"payload":{"tag":"li","lines":"211,212"}},{"content":"Eliminar duplicaci&#xf3;n de c&#xf3;digo (<strong>principio DRY</strong>).","children":[],"payload":{"tag":"li","lines":"212,213"}},{"content":"Simplificar estructuras condicionales complejas.","children":[],"payload":{"tag":"li","lines":"213,214"}},{"content":"Reorganizar clases y m&#xf3;dulos para mejorar la cohesi&#xf3;n y reducir el acoplamiento.","children":[],"payload":{"tag":"li","lines":"214,216"}}],"payload":{"tag":"ul","lines":"210,216"}},{"content":"","children":[{"content":"<strong>Disciplina constante</strong>: requiere h&#xe1;bito y compromiso del equipo.","children":[],"payload":{"tag":"li","lines":"218,219"}},{"content":"<strong>Apoyo en pruebas unitarias</strong>: sin tests, la refactorizaci&#xf3;n puede introducir errores inadvertidos.","children":[],"payload":{"tag":"li","lines":"219,220"}},{"content":"<strong>Balance con entregas</strong>: no debe retrasar el desarrollo de nuevas funcionalidades, sino integrarse en el flujo de trabajo.","children":[],"payload":{"tag":"li","lines":"220,221"}},{"content":"<strong>Cultura de equipo</strong>: todos los miembros deben compartir la responsabilidad de mantener el c&#xf3;digo limpio.","children":[],"payload":{"tag":"li","lines":"221,222"}}],"payload":{"tag":"ul","lines":"218,222"}}],"payload":{"tag":"li","lines":"185,222"}},{"content":"\n<p data-lines=\"222,223\">DRY (don&#x2019;t repeat yourself) y KISS (keep it simple, stupid)</p>\n<h2 data-lines=\"224,225\">&#x1f539; DRY (Don&#x2019;t Repeat Yourself)</h2>","children":[{"content":"","children":[{"content":"<strong>Definici&#xf3;n</strong>: este principio establece que <strong>no debemos duplicar c&#xf3;digo o l&#xf3;gica</strong> en diferentes partes del sistema.","children":[],"payload":{"tag":"li","lines":"226,227"}},{"content":"<strong>Objetivo</strong>: reducir la redundancia y centralizar la l&#xf3;gica en un &#xfa;nico lugar.","children":[],"payload":{"tag":"li","lines":"227,228"}},{"content":"<strong>Beneficios</strong>:","children":[{"content":"Facilita el mantenimiento: si hay que cambiar algo, se modifica en un solo sitio.","children":[],"payload":{"tag":"li","lines":"229,230"}},{"content":"Reduce errores: menos riesgo de inconsistencias.","children":[],"payload":{"tag":"li","lines":"230,231"}},{"content":"Mejora la legibilidad: el c&#xf3;digo es m&#xe1;s claro y conciso.","children":[],"payload":{"tag":"li","lines":"231,233"}}],"payload":{"tag":"li","lines":"228,233"}}],"payload":{"tag":"ul","lines":"226,233"}},{"content":"","children":[{"content":"<strong>Definici&#xf3;n</strong>: este principio indica que el c&#xf3;digo debe ser <strong>simple y directo</strong>, evitando complejidad innecesaria.","children":[],"payload":{"tag":"li","lines":"235,236"}},{"content":"<strong>Objetivo</strong>: que cualquier desarrollador pueda entender y modificar el c&#xf3;digo sin dificultad.","children":[],"payload":{"tag":"li","lines":"236,237"}},{"content":"<strong>Beneficios</strong>:","children":[{"content":"Mayor legibilidad: el c&#xf3;digo es f&#xe1;cil de seguir.","children":[],"payload":{"tag":"li","lines":"238,239"}},{"content":"Menos errores: la simplicidad reduce la probabilidad de fallos.","children":[],"payload":{"tag":"li","lines":"239,240"}},{"content":"Mejor mantenibilidad: sistemas m&#xe1;s f&#xe1;ciles de evolucionar.","children":[],"payload":{"tag":"li","lines":"240,242"}}],"payload":{"tag":"li","lines":"237,242"}}],"payload":{"tag":"ul","lines":"235,242"}},{"content":"","children":[{"content":"Ambos principios buscan <strong>claridad y eficiencia</strong> en el c&#xf3;digo.","children":[],"payload":{"tag":"li","lines":"244,245"}},{"content":"<strong>DRY</strong> evita duplicaci&#xf3;n innecesaria.","children":[],"payload":{"tag":"li","lines":"245,246"}},{"content":"<strong>KISS</strong> evita complejidad innecesaria.","children":[],"payload":{"tag":"li","lines":"246,247"}},{"content":"Juntos, promueven un c&#xf3;digo <strong>limpio, mantenible y f&#xe1;cil de entender</strong>.","children":[],"payload":{"tag":"li","lines":"247,248"}}],"payload":{"tag":"ul","lines":"244,248"}}],"payload":{"tag":"li","lines":"222,248"}},{"content":"\n<p data-lines=\"248,249\">SOLID</p>\n<h2 data-lines=\"250,251\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"252,254\"><strong>SOLID</strong> es un acr&#xf3;nimo que representa cinco principios de dise&#xf1;o de software orientado a objetos, formulados por <strong>Robert C. Martin (Uncle Bob)</strong>.<br>\nSu objetivo es crear sistemas <strong>m&#xe1;s mantenibles, escalables y flexibles</strong>, reduciendo el acoplamiento y aumentando la cohesi&#xf3;n entre clases y m&#xf3;dulos.</p>\n<h2 data-lines=\"255,256\">&#x1f539; Principios</h2>\n<h3 data-lines=\"257,258\">1. <strong>S &#x2013; Single Responsibility Principle (SRP)</strong></h3>","children":[{"content":"","children":[{"content":"<strong>Definici&#xf3;n</strong>: una clase debe tener <strong>una &#xfa;nica responsabilidad</strong> o motivo de cambio.","children":[],"payload":{"tag":"li","lines":"259,260"}},{"content":"<strong>Beneficio</strong>: facilita la comprensi&#xf3;n y el mantenimiento del c&#xf3;digo.","children":[],"payload":{"tag":"li","lines":"260,261"}},{"content":"<strong>Ejemplo</strong>: separar la l&#xf3;gica de c&#xe1;lculo de impuestos de la l&#xf3;gica de impresi&#xf3;n de facturas.","children":[],"payload":{"tag":"li","lines":"261,263"}}],"payload":{"tag":"ul","lines":"259,263"}},{"content":"","children":[{"content":"<strong>Definici&#xf3;n</strong>: el software debe estar <strong>abierto a la extensi&#xf3;n, pero cerrado a la modificaci&#xf3;n</strong>.","children":[],"payload":{"tag":"li","lines":"265,266"}},{"content":"<strong>Beneficio</strong>: permite a&#xf1;adir nuevas funcionalidades sin alterar el c&#xf3;digo existente.","children":[],"payload":{"tag":"li","lines":"266,267"}},{"content":"<strong>Ejemplo</strong>: usar herencia o interfaces para extender comportamientos sin modificar clases base.","children":[],"payload":{"tag":"li","lines":"267,269"}}],"payload":{"tag":"ul","lines":"265,269"}},{"content":"","children":[{"content":"<strong>Definici&#xf3;n</strong>: los objetos de una clase derivada deben poder <strong>reemplazar a los de su clase base</strong> sin alterar el funcionamiento del sistema.","children":[],"payload":{"tag":"li","lines":"271,272"}},{"content":"<strong>Beneficio</strong>: asegura consistencia y evita errores en jerarqu&#xed;as de herencia.","children":[],"payload":{"tag":"li","lines":"272,273"}},{"content":"<strong>Ejemplo</strong>: una clase <code>Rect&#xe1;ngulo</code> y una clase <code>Cuadrado</code> deben comportarse coherentemente si se usan como la clase base <code>Figura</code>.","children":[],"payload":{"tag":"li","lines":"273,275"}}],"payload":{"tag":"ul","lines":"271,275"}},{"content":"","children":[{"content":"<strong>Definici&#xf3;n</strong>: los clientes no deben estar obligados a depender de <strong>interfaces que no utilizan</strong>.","children":[],"payload":{"tag":"li","lines":"277,278"}},{"content":"<strong>Beneficio</strong>: evita interfaces demasiado grandes y promueve la creaci&#xf3;n de interfaces espec&#xed;ficas.","children":[],"payload":{"tag":"li","lines":"278,279"}},{"content":"<strong>Ejemplo</strong>: en lugar de una interfaz <code>IM&#xe1;quina</code> con m&#xe9;todos de imprimir, escanear y fax, crear interfaces m&#xe1;s peque&#xf1;as como <code>IImpresora</code>, <code>IEsc&#xe1;ner</code>, <code>IFax</code>.","children":[],"payload":{"tag":"li","lines":"279,281"}}],"payload":{"tag":"ul","lines":"277,281"}},{"content":"","children":[{"content":"<strong>Definici&#xf3;n</strong>: los m&#xf3;dulos de alto nivel no deben depender de m&#xf3;dulos de bajo nivel, sino de <strong>abstracciones</strong>.","children":[],"payload":{"tag":"li","lines":"283,284"}},{"content":"<strong>Beneficio</strong>: reduce el acoplamiento y facilita el cambio de implementaciones.","children":[],"payload":{"tag":"li","lines":"284,285"}},{"content":"<strong>Ejemplo</strong>: una clase <code>ControladorDePagos</code> depende de una interfaz <code>IPasarelaPago</code>, no de una implementaci&#xf3;n concreta como <code>PayPal</code> o <code>Stripe</code>.","children":[],"payload":{"tag":"li","lines":"285,287"}}],"payload":{"tag":"ul","lines":"283,287"}},{"content":"","children":[{"content":"C&#xf3;digo m&#xe1;s <strong>limpio y mantenible</strong>.","children":[],"payload":{"tag":"li","lines":"289,290"}},{"content":"Facilita la <strong>extensi&#xf3;n y evoluci&#xf3;n</strong> del sistema.","children":[],"payload":{"tag":"li","lines":"290,291"}},{"content":"Reduce el <strong>acoplamiento</strong> entre clases.","children":[],"payload":{"tag":"li","lines":"291,292"}},{"content":"Promueve la <strong>reutilizaci&#xf3;n</strong> de componentes.","children":[],"payload":{"tag":"li","lines":"292,293"}},{"content":"Mejora la <strong>calidad y escalabilidad</strong> del software.","children":[],"payload":{"tag":"li","lines":"293,294"}}],"payload":{"tag":"ul","lines":"289,294"}}],"payload":{"tag":"li","lines":"248,294"}},{"content":"\n<p data-lines=\"294,295\">L&#xf3;gica de negocio</p>\n<h2 data-lines=\"296,297\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"298,300\">La <strong>l&#xf3;gica de negocio</strong> es el conjunto de <strong>reglas, procesos y operaciones</strong> que representan c&#xf3;mo funciona una organizaci&#xf3;n dentro de un sistema de software.<br>\nEs la capa que traduce las necesidades del negocio en <strong>funcionalidades t&#xe9;cnicas</strong>, asegurando que el sistema refleje correctamente las pol&#xed;ticas, restricciones y objetivos de la empresa.</p>\n<p data-lines=\"301,302\">Conocer la <strong>l&#xf3;gica de negocio</strong> es una <strong>muy buena pr&#xe1;ctica en el desarrollo de software</strong>, porque es lo que conecta directamente la parte t&#xe9;cnica con las necesidades reales de la organizaci&#xf3;n o del cliente.</p>\n<h1 data-lines=\"303,304\">Importancia de la L&#xf3;gica de Negocio en el Desarrollo de Software</h1>\n<h2 data-lines=\"305,306\">&#x1f539; &#xbf;Por qu&#xe9; es clave?</h2>","children":[{"content":"","children":[{"content":"La l&#xf3;gica de negocio define <strong>c&#xf3;mo funciona la empresa</strong> y qu&#xe9; reglas deben cumplirse.","children":[],"payload":{"tag":"li","lines":"307,308"}},{"content":"Permite que el software <strong>resuelva problemas reales</strong>, no solo t&#xe9;cnicos.","children":[],"payload":{"tag":"li","lines":"308,309"}},{"content":"Evita que los desarrolladores creen soluciones que no se alinean con los objetivos del negocio.","children":[],"payload":{"tag":"li","lines":"309,311"}}],"payload":{"tag":"ul","lines":"307,311"}},{"content":"","children":[{"content":"<strong>Centralidad</strong>: es el n&#xfa;cleo del sistema, donde se define el &#x201c;qu&#xe9;&#x201d; y el &#x201c;c&#xf3;mo&#x201d; de las operaciones.","children":[],"payload":{"tag":"li","lines":"313,314"}},{"content":"<strong>Independencia</strong>: debe estar separada de la interfaz de usuario y de la capa de datos.","children":[],"payload":{"tag":"li","lines":"314,315"}},{"content":"<strong>Reglas de negocio</strong>: define condiciones, validaciones y restricciones que gu&#xed;an el comportamiento del sistema.","children":[],"payload":{"tag":"li","lines":"315,316"}},{"content":"<strong>Procesos</strong>: describe flujos de trabajo y operaciones que representan actividades reales de la organizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"316,317"}},{"content":"<strong>Consistencia</strong>: asegura que las operaciones cumplan siempre las mismas reglas.","children":[],"payload":{"tag":"li","lines":"317,319"}}],"payload":{"tag":"ul","lines":"313,319"}},{"content":"","children":[{"content":"<strong>Reglas de negocio</strong>: condiciones que determinan c&#xf3;mo deben ejecutarse las operaciones (ejemplo: &#x201c;un cliente no puede realizar un pedido sin saldo disponible&#x201d;).","children":[],"payload":{"tag":"li","lines":"321,322"}},{"content":"<strong>Procesos de negocio</strong>: secuencias de pasos que representan actividades (ejemplo: &#x201c;registrar una venta&#x201d;, &#x201c;aprobar un pr&#xe9;stamo&#x201d;).","children":[],"payload":{"tag":"li","lines":"322,323"}},{"content":"<strong>Servicios de negocio</strong>: funciones que encapsulan operaciones espec&#xed;ficas (ejemplo: &#x201c;calcular impuestos&#x201d;, &#x201c;validar usuario&#x201d;).","children":[],"payload":{"tag":"li","lines":"323,324"}},{"content":"<strong>Entidades de negocio</strong>: objetos que representan elementos clave del dominio (ejemplo: cliente, producto, factura).","children":[],"payload":{"tag":"li","lines":"324,326"}}],"payload":{"tag":"ul","lines":"321,326"}},{"content":"","children":[{"content":"<strong>Claridad</strong>: separa la l&#xf3;gica empresarial de la t&#xe9;cnica, facilitando la comprensi&#xf3;n.","children":[],"payload":{"tag":"li","lines":"328,329"}},{"content":"<strong>Mantenibilidad</strong>: cambios en las reglas de negocio no afectan otras capas del sistema.","children":[],"payload":{"tag":"li","lines":"329,330"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: las reglas y procesos pueden aplicarse en diferentes aplicaciones.","children":[],"payload":{"tag":"li","lines":"330,331"}},{"content":"<strong>Escalabilidad</strong>: facilita la evoluci&#xf3;n del sistema conforme cambian las necesidades del negocio.","children":[],"payload":{"tag":"li","lines":"331,332"}},{"content":"<strong>Alineaci&#xf3;n</strong>: asegura que el software refleje fielmente los objetivos de la organizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"332,334"}}],"payload":{"tag":"ul","lines":"328,334"}},{"content":"","children":[{"content":"<strong>Separaci&#xf3;n de capas</strong>: debe estar aislada de la interfaz y la persistencia de datos (ejemplo: arquitectura en capas, hexagonal, DDD).","children":[],"payload":{"tag":"li","lines":"336,337"}},{"content":"<strong>Adaptabilidad</strong>: las reglas de negocio cambian con frecuencia, por lo que el dise&#xf1;o debe permitir modificaciones r&#xe1;pidas.","children":[],"payload":{"tag":"li","lines":"337,338"}},{"content":"<strong>Documentaci&#xf3;n</strong>: es importante mantener las reglas y procesos bien documentados.","children":[],"payload":{"tag":"li","lines":"338,339"}},{"content":"<strong>Pruebas</strong>: la l&#xf3;gica de negocio debe estar cubierta por pruebas unitarias y funcionales para garantizar su correcto funcionamiento.","children":[],"payload":{"tag":"li","lines":"339,341"}}],"payload":{"tag":"ul","lines":"336,341"}},{"content":"","children":[{"content":"<strong>E-commerce</strong>: c&#xe1;lculo de precios, descuentos y validaci&#xf3;n de stock.","children":[],"payload":{"tag":"li","lines":"343,344"}},{"content":"<strong>Banca</strong>: reglas para aprobaci&#xf3;n de cr&#xe9;ditos, gesti&#xf3;n de cuentas y transferencias.","children":[],"payload":{"tag":"li","lines":"344,345"}},{"content":"<strong>Salud</strong>: validaci&#xf3;n de historiales m&#xe9;dicos y gesti&#xf3;n de citas.","children":[],"payload":{"tag":"li","lines":"345,346"}},{"content":"<strong>Log&#xed;stica</strong>: planificaci&#xf3;n de rutas y control de inventarios.","children":[],"payload":{"tag":"li","lines":"346,347"}},{"content":"<strong>Educaci&#xf3;n</strong>: gesti&#xf3;n de matr&#xed;culas, calificaciones y certificaciones.","children":[],"payload":{"tag":"li","lines":"347,349"}}],"payload":{"tag":"ul","lines":"343,349"}}],"payload":{"tag":"li","lines":"294,349"}}],"payload":{"tag":"h3","lines":"144,145"}},{"content":"Modelos y metodolog&#xed;as","children":[{"content":"\n<p data-lines=\"351,352\">Introducci&#xf3;n</p>\n<h2 data-lines=\"353,354\">&#x1f539; &#xbf;Qu&#xe9; son?</h2>","children":[{"content":"","children":[{"content":"<strong>Modelos de desarrollo de software</strong>: representan la forma en que se organiza y estructura el proceso de creaci&#xf3;n de un sistema.","children":[],"payload":{"tag":"li","lines":"355,356"}},{"content":"<strong>Metodolog&#xed;as</strong>: aportan pr&#xe1;cticas, principios y herramientas para aplicar esos modelos en proyectos reales.","children":[],"payload":{"tag":"li","lines":"356,358"}}],"payload":{"tag":"ul","lines":"355,358"}},{"content":"","children":[{"content":"<strong>Requisitos</strong> &#x2192; entender qu&#xe9; necesita el cliente.","children":[],"payload":{"tag":"li","lines":"364,365"}},{"content":"<strong>Dise&#xf1;o</strong> &#x2192; planificar la arquitectura y componentes.","children":[],"payload":{"tag":"li","lines":"365,366"}},{"content":"<strong>Implementaci&#xf3;n</strong> &#x2192; codificar el sistema.","children":[],"payload":{"tag":"li","lines":"366,367"}},{"content":"<strong>Pruebas</strong> &#x2192; verificar que funciona correctamente.","children":[],"payload":{"tag":"li","lines":"367,368"}},{"content":"<strong>Mantenimiento</strong> &#x2192; corregir errores y a&#xf1;adir mejoras.","children":[],"payload":{"tag":"li","lines":"368,370"}}],"payload":{"tag":"ul","lines":"364,370"}},{"content":"","children":[{"content":"<strong>Cascada (Waterfall)</strong>: lineal y secuencial, cada fase depende de la anterior.","children":[],"payload":{"tag":"li","lines":"372,373"}},{"content":"<strong>Modelo en V</strong>: vincula cada fase de desarrollo con una fase de prueba.","children":[],"payload":{"tag":"li","lines":"373,374"}},{"content":"<strong>Incremental</strong>: entrega el sistema en partes funcionales sucesivas.","children":[],"payload":{"tag":"li","lines":"374,375"}},{"content":"<strong>Iterativo</strong>: refinamiento continuo del mismo producto en ciclos repetidos.","children":[],"payload":{"tag":"li","lines":"375,376"}},{"content":"<strong>Espiral</strong>: combina iteraciones con gesti&#xf3;n de riesgos.","children":[],"payload":{"tag":"li","lines":"376,378"}}],"payload":{"tag":"ul","lines":"372,378"}},{"content":"","children":[{"content":"<strong>Agile</strong>: principios del Manifiesto &#xc1;gil (colaboraci&#xf3;n, flexibilidad, entregas r&#xe1;pidas).","children":[],"payload":{"tag":"li","lines":"382,383"}},{"content":"<strong>Scrum</strong>: roles, eventos y artefactos para gestionar proyectos en sprints.","children":[],"payload":{"tag":"li","lines":"383,384"}},{"content":"<strong>Kanban</strong>: gesti&#xf3;n visual del flujo de trabajo con tableros y l&#xed;mites de tareas.","children":[],"payload":{"tag":"li","lines":"384,385"}},{"content":"<strong>Extreme Programming (XP)</strong>: pr&#xe1;cticas t&#xe9;cnicas como TDD, refactorizaci&#xf3;n, integraci&#xf3;n continua.","children":[],"payload":{"tag":"li","lines":"385,387"}}],"payload":{"tag":"ul","lines":"382,387"}},{"content":"","children":[{"content":"<strong>Modelos< f3;digo, el otro revisa en tiempo real.","children":[],"payload":{"tag":"li","lines":"846,847"}},{"content":"Beneficios: menos errores, mayor transferencia de conocimiento.","children":[],"payload":{"tag":"li","lines":"847,849"}}],"payload":{"tag":"ul","lines":"845,849"}},{"content":"","children":[{"content":"Cada m&#xf3;dulo debe tener pruebas autom&#xe1;ticas.","children":[],"payload":{"tag":"li","lines":"851,852"}},{"content":"Garantiza que el c&#xf3;digo funciona como se espera.","children":[],"payload":{"tag":"li","lines":"852,853"}},{"content":"Base para la integraci&#xf3;n continua.","children":[],"payload":{"tag":"li","lines":"853,855"}}],"payload":{"tag":"ul","lines":"851,855"}},{"content":"","children":[{"content":"Integrar c&#xf3;digo frecuentemente en un repositorio compartido.","children":[],"payload":{"tag":"li","lines":"857,858"}},{"content":"Ejecuci&#xf3;n autom&#xe1;tica de pruebas tras cada integraci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"858,859"}},{"content":"Detecta errores temprano.","children":[],"payload":{"tag":"li","lines":"859,861"}}],"payload":{"tag":"ul","lines":"857,861"}},{"content":"","children":[{"content":"Mejorar el c&#xf3;digo sin cambiar su funcionalidad.","children":[],"payload":{"tag":"li","lines":"863,864"}},{"content":"Objetivo: mantenerlo limpio, legible y eficiente.","children":[],"payload":{"tag":"li","lines":"864,866"}}],"payload":{"tag":"ul","lines":"863,866"}},{"content":"","children":[{"content":"Escribir primero la prueba, luego el c&#xf3;digo que la hace pasar.","children":[],"payload":{"tag":"li","lines":"868,869"}},{"content":"Ciclo: <strong>Red &#x2192; Green &#x2192; Refactor</strong>.","children":[],"payload":{"tag":"li","lines":"869,870"}},{"content":"Asegura calidad y dise&#xf1;o simple.","children":[],"payload":{"tag":"li","lines":"870,872"}}],"payload":{"tag":"ul","lines":"868,872"}},{"content":"","children":[{"content":"Crear soluciones lo m&#xe1;s simples posibles.","children":[],"payload":{"tag":"li","lines":"874,875"}},{"content":"Evitar sobreingenier&#xed;a.","children":[],"payload":{"tag":"li","lines":"875,876"}},{"content":"Facilita mantenimiento y cambios futuros.","children":[],"payload":{"tag":"li","lines":"876,878"}}],"payload":{"tag":"ul","lines":"874,878"}},{"content":"","children":[{"content":"El cliente forma parte del equipo.","children":[],"payload":{"tag":"li","lines":"880,881"}},{"content":"Aporta feedback inmediato.","children":[],"payload":{"tag":"li","lines":"881,882"}},{"content":"Reduce malentendidos en requisitos.","children":[],"payload":{"tag":"li","lines":"882,884"}}],"payload":{"tag":"ul","lines":"880,884"}},{"content":"","children":[{"content":"Ciclos de desarrollo de 1&#x2013;2 semanas.","children":[],"payload":{"tag":"li","lines":"886,887"}},{"content":"Entregas frecuentes y funcionales.","children":[],"payload":{"tag":"li","lines":"887,888"}},{"content":"Permite ajustes r&#xe1;pidos seg&#xfa;n retroalimentaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"888,890"}}],"payload":{"tag":"ul","lines":"886,890"}},{"content":"","children":[{"content":"<strong>Comunicaci&#xf3;n</strong>: constante entre desarrolladores y cliente.","children":[],"payload":{"tag":"li","lines":"892,893"}},{"content":"<strong>Simplicidad</strong>: soluciones claras y directas.","children":[],"payload":{"tag":"li","lines":"893,894"}},{"content":"<strong>Retroalimentaci&#xf3;n</strong>: pruebas y cliente aportan informaci&#xf3;n continua.","children":[],"payload":{"tag":"li","lines":"894,895"}},{"content":"<strong>Coraje</strong>: afrontar cambios y mejoras sin miedo.","children":[],"payload":{"tag":"li","lines":"895,896"}},{"content":"<strong>Respeto</strong>: colaboraci&#xf3;n y confianza en el equipo.","children":[],"payload":{"tag":"li","lines":"896,898"}}],"payload":{"tag":"ul","lines":"892,898"}},{"content":"","children":[{"content":"Alta calidad del software gracias a pruebas y refactorizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"900,901"}},{"content":"Flexibilidad frente a cambios en requisitos.","children":[],"payload":{"tag":"li","lines":"901,902"}},{"content":"Entregas r&#xe1;pidas y frecuentes.","children":[],"payload":{"tag":"li","lines":"902,903"}},{"content":"Mayor satisfacci&#xf3;n del cliente por su participaci&#xf3;n activa.","children":[],"payload":{"tag":"li","lines":"903,904"}},{"content":"Equipos m&#xe1;s cohesionados y motivados.","children":[],"payload":{"tag":"li","lines":"904,906"}}],"payload":{"tag":"ul","lines":"900,906"}}],"payload":{"tag":"li","lines":"833,906"}}],"payload":{"tag":"h3","lines":"349,350"}},{"content":"Arquitectura de software","children":[{"content":"\n<p data-lines=\"908,909\">Introducci&#xf3;n</p>\n<h2 data-lines=\"910,911\">&#x1f539; &#xbf;Qu&#xe9; es la Arquitectura de Software?</h2>\n<p data-lines=\"912,914\">La <strong>arquitectura de software</strong> es la estructura fundamental de un sistema inform&#xe1;tico, que define c&#xf3;mo se organizan sus componentes, c&#xf3;mo interact&#xfa;an entre s&#xed; y qu&#xe9; principios gu&#xed;an su dise&#xf1;o y evoluci&#xf3;n.<br>\nEn otras palabras, es el <strong>plano de construcci&#xf3;n</strong> de una aplicaci&#xf3;n, que permite transformar requisitos funcionales y no funcionales en soluciones t&#xe9;cnicas organizadas.</p>\n<h2 data-lines=\"915,916\">&#x1f539; Objetivos de la Arquitectura de Software</h2>","children":[{"content":"","children":[{"content":"<strong>Organizaci&#xf3;n</strong>: dividir el sistema en m&#xf3;dulos o capas con responsabilidades claras.","children":[],"payload":{"tag":"li","lines":"917,918"}},{"content":"<strong>Escalabilidad</strong>: permitir que el sistema crezca sin perder rendimiento ni calidad.","children":[],"payload":{"tag":"li","lines":"918,919"}},{"content":"<strong>Mantenibilidad</strong>: facilitar la correcci&#xf3;n de errores y la incorporaci&#xf3;n de nuevas funcionalidades.","children":[],"payload":{"tag":"li","lines":"919,920"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: aprovechar componentes ya desarrollados en otros proyectos.","children":[],"payload":{"tag":"li","lines":"920,921"}},{"content":"<strong>Seguridad y confiabilidad</strong>: garantizar que el sistema sea robusto y seguro.","children":[],"payload":{"tag":"li","lines":"921,922"}},{"content":"<strong>Comunicaci&#xf3;n</strong>: servir como lenguaje com&#xfa;n entre desarrolladores, arquitectos y stakeholders.","children":[],"payload":{"tag":"li","lines":"922,924"}}],"payload":{"tag":"ul","lines":"917,924"}},{"content":"","children":[{"content":"Act&#xfa;a como <strong>puente entre requisitos y c&#xf3;digo</strong>.","children":[],"payload":{"tag":"li","lines":"926,927"}},{"content":"Reduce riesgos en proyectos grandes y complejos.","children":[],"payload":{"tag":"li","lines":"927,928"}},{"content":"Permite tomar decisiones estrat&#xe9;gicas sobre tecnolog&#xed;as, patrones y estilos arquitect&#xf3;nicos.","children":[],"payload":{"tag":"li","lines":"928,929"}},{"content":"Influye directamente en la <strong>calidad del software</strong> (rendimiento, seguridad, usabilidad).","children":[],"payload":{"tag":"li","lines":"929,931"}}],"payload":{"tag":"ul","lines":"926,931"}},{"content":"","children":[{"content":"<strong>Componentes</strong>: partes funcionales del sistema (m&#xf3;dulos, servicios, clases).","children":[],"payload":{"tag":"li","lines":"933,934"}},{"content":"<strong>Conectores</strong>: mecanismos de comunicaci&#xf3;n entre componentes (APIs, protocolos, mensajes).","children":[],"payload":{"tag":"li","lines":"934,935"}},{"content":"<strong>Patrones arquitect&#xf3;nicos</strong>: soluciones probadas como MVC, en capas, cliente-servidor, microservicios, hexagonal, etc.","children":[],"payload":{"tag":"li","lines":"935,936"}},{"content":"<strong>Estilos arquitect&#xf3;nicos</strong>: enfoques generales como monol&#xed;tico, distribuido, orientado a eventos, basado en servicios.","children":[],"payload":{"tag":"li","lines":"936,938"}}],"payload":{"tag":"ul","lines":"933,938"}},{"content":"","children":[{"content":"1. <strong>Modelos tradicionales</strong>: monol&#xed;tico, en capas, cliente-servidor.","children":[],"payload":{"tag":"li","lines":"940,941","listIndex":1}},{"content":"2. <strong>Arquitecturas distribuidas</strong>: SOA, N capas, orientada a eventos.","children":[],"payload":{"tag":"li","lines":"941,942","listIndex":2}},{"content":"3. <strong>Arquitecturas modernas</strong>: microservicios, hexagonal, limpia, cloud-native.","children":[],"payload":{"tag":"li","lines":"942,943","listIndex":3}},{"content":"4. <strong>Tendencias actuales</strong>: arquitecturas basadas en componentes, serverless, edge computing, inteligencia artificial integrada.","children":[],"payload":{"tag":"li","lines":"943,945","listIndex":4}}],"payload":{"tag":"ol","lines":"940,945"}},{"content":"","children":[{"content":"Mayor calidad del producto final.","children":[],"payload":{"tag":"li","lines":"947,948"}},{"content":"Reducci&#xf3;n de costes de mantenimiento.","children":[],"payload":{"tag":"li","lines":"948,949"}},{"content":"Flexibilidad para adaptarse a cambios del negocio.","children":[],"payload":{"tag":"li","lines":"949,950"}},{"content":"Mejor comunicaci&#xf3;n entre equipos t&#xe9;cnicos y de negocio.","children":[],"payload":{"tag":"li","lines":"950,951"}},{"content":"Base s&#xf3;lida para la innovaci&#xf3;n tecnol&#xf3;gica.","children":[],"payload":{"tag":"li","lines":"951,952"}}],"payload":{"tag":"ul","lines":"947,952"}}],"payload":{"tag":"li","lines":"908,952"}},{"content":"\n<p data-lines=\"952,953\">MVC</p>\n<h2 data-lines=\"954,955\">&#x1f539; Modelo Vista Controlador (MVC)</h2>","children":[{"content":"","children":[{"content":"Definici&#xf3;n: patr&#xf3;n de arquitectura de software que separa la l&#xf3;gica de negocio, la interfaz de usuario y el control del flujo.","children":[],"payload":{"tag":"li","lines":"956,957"}},{"content":"Origen: creado en los a&#xf1;os 70 en Smalltalk, popularizado en frameworks modernos (Ruby on Rails, Spring MVC, ASP.NET MVC, Django).","children":[],"payload":{"tag":"li","lines":"957,958"}},{"content":"Objetivo: mejorar la organizaci&#xf3;n del c&#xf3;digo, facilitar mantenimiento y escalabilidad.","children":[],"payload":{"tag":"li","lines":"958,960"}}],"payload":{"tag":"ul","lines":"956,960"}},{"content":"","children":[{"content":"Representa los <strong>datos</strong> y la <strong>l&#xf3;gica de negocio</strong>.","children":[],"payload":{"tag":"li","lines":"964,965"}},{"content":"Encapsula reglas, validaciones y acceso a la base de datos.","children":[],"payload":{"tag":"li","lines":"965,966"}},{"content":"Ejemplo: clases que gestionan usuarios, productos, pedidos.","children":[],"payload":{"tag":"li","lines":"966,968"}}],"payload":{"tag":"ul","lines":"964,968"}},{"content":"","children":[{"content":"Encargada de mostrar la <strong>interfaz de usuario</strong>.","children":[],"payload":{"tag":"li","lines":"970,971"}},{"content":"No contiene l&#xf3;gica de negocio, solo presentaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"971,972"}},{"content":"Ejemplo: plantillas HTML, interfaces gr&#xe1;ficas, reportes.","children":[],"payload":{"tag":"li","lines":"972,974"}}],"payload":{"tag":"ul","lines":"970,974"}},{"content":"","children":[{"content":"Act&#xfa;a como intermediario entre <strong>Modelo</strong> y <strong>Vista</strong>.","children":[],"payload":{"tag":"li","lines":"976,977"}},{"content":"Recibe las solicitudes del usuario, invoca la l&#xf3;gica del modelo y selecciona la vista adecuada.","children":[],"payload":{"tag":"li","lines":"977,978"}},{"content":"Ejemplo: m&#xe9;todos que gestionan peticiones HTTP en un framework web.","children":[],"payload":{"tag":"li","lines":"978,980"}}],"payload":{"tag":"ul","lines":"976,980"}},{"content":"","children":[{"content":"<strong>Separaci&#xf3;n de responsabilidades</strong>: cada componente tiene un rol claro.","children":[],"payload":{"tag":"li","lines":"982,983"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: vistas y modelos pueden reutilizarse en distintos contextos.","children":[],"payload":{"tag":"li","lines":"983,984"}},{"content":"<strong>Mantenibilidad</strong>: facilita localizar y corregir errores.","children":[],"payload":{"tag":"li","lines":"984,985"}},{"content":"<strong>Escalabilidad</strong>: permite crecer el sistema sin perder orden.","children":[],"payload":{"tag":"li","lines":"985,986"}},{"content":"<strong>Pruebas m&#xe1;s f&#xe1;ciles</strong>: se pueden testear modelos y controladores de forma independiente.","children":[],"payload":{"tag":"li","lines":"986,988"}}],"payload":{"tag":"ul","lines":"982,988"}},{"content":"","children":[{"content":"Frameworks populares:","children":[{"content":"<strong>Web</strong>: Django (Python), Ruby on Rails, ASP.NET MVC, Spring MVC (Java).","children":[],"payload":{"tag":"li","lines":"991,992"}},{"content":"<strong>Desktop/M&#xf3;vil</strong>: JavaFX, Angular (aunque es m&#xe1;s MVVM), iOS con Cocoa MVC.","children":[],"payload":{"tag":"li","lines":"992,993"}}],"payload":{"tag":"li","lines":"990,993"}},{"content":"Flujo t&#xed;pico:","children":[{"content":"1. El usuario interact&#xfa;a con la <strong>Vista</strong>.","children":[],"payload":{"tag":"li","lines":"994,995","listIndex":1}},{"content":"2. La <strong>Vista</strong> env&#xed;a la acci&#xf3;n al <strong>Controlador</strong>.","children":[],"payload":{"tag":"li","lines":"995,996","listIndex":2}},{"content":"3. El <strong>Controlador</strong> procesa la petici&#xf3;n y consulta/actualiza el <strong>Modelo</strong>.","children":[],"payload":{"tag":"li","lines":"996,997","listIndex":3}},{"content":"4. El <strong>Modelo</strong> devuelve datos al <strong>Controlador</strong>.","children":[],"payload":{"tag":"li","lines":"997,998","listIndex":4}},{"content":"5. El <strong>Controlador</strong> selecciona la <strong>Vista</strong> adecuada para mostrar resultados.","children":[],"payload":{"tag":"li","lines":"998,999","listIndex":5}}],"payload":{"tag":"li","lines":"993,999"}},{"content":"Ejemplo pr&#xe1;ctico: aplicaci&#xf3;n web de gesti&#xf3;n de tareas (Vista = interfaz HTML, Controlador = l&#xf3;gica de peticiones, Modelo = base de datos de tareas).","children":[],"payload":{"tag":"li","lines":"999,1000"}}],"payload":{"tag":"ul","lines":"990,1000"}}],"payload":{"tag":"li","lines":"952,1000"}},{"content":"\n<p data-lines=\"1000,1001\">Monol&#xed;tica</p>\n<h2 data-lines=\"1002,1003\">&#x1f539; Arquitectura Monol&#xed;tica</h2>","children":[{"content":"","children":[{"content":"Definici&#xf3;n: estilo de arquitectura de software donde toda la aplicaci&#xf3;n se construye como una &#xfa;nica unidad.","children":[],"payload":{"tag":"li","lines":"1004,1005"}},{"content":"Contexto hist&#xf3;rico: fue el enfoque predominante antes de la popularizaci&#xf3;n de arquitecturas distribuidas y microservicios.","children":[],"payload":{"tag":"li","lines":"1005,1006"}},{"content":"Ejemplos t&#xed;picos: aplicaciones empresariales tradicionales, sistemas ERP, aplicaciones web iniciales.","children":[],"payload":{"tag":"li","lines":"1006,1008"}}],"payload":{"tag":"ul","lines":"1004,1008"}},{"content":"","children":[{"content":"<strong>C&#xf3;digo unificado</strong>: todos los m&#xf3;dulos (UI, l&#xf3;gica de negocio, acceso a datos) est&#xe1;n integrados en un solo proyecto.","children":[],"payload":{"tag":"li","lines":"1010,1011"}},{"content":"<strong>Despliegue &#xfa;nico</strong>: se compila y despliega como un bloque completo.","children":[],"payload":{"tag":"li","lines":"1011,1012"}},{"content":"<strong>Dependencias internas</strong>: los componentes est&#xe1;n fuertemente acoplados.","children":[],"payload":{"tag":"li","lines":"1012,1013"}},{"content":"<strong>Escalado vertical</strong>: se mejora el rendimiento aumentando recursos del servidor (CPU, RAM).","children":[],"payload":{"tag":"li","lines":"1013,1014"}},{"content":"<strong>Dificultad para modularidad</strong>: aunque puede haber capas, siguen formando parte de la misma aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1014,1016"}}],"payload":{"tag":"ul","lines":"1010,1016"}},{"content":"","children":[{"content":"<strong>Simplicidad inicial</strong>: m&#xe1;s f&#xe1;cil de dise&#xf1;ar y desarrollar en proyectos peque&#xf1;os.","children":[],"payload":{"tag":"li","lines":"1018,1019"}},{"content":"<strong>Despliegue sencillo</strong>: un solo paquete o archivo ejecutable.","children":[],"payload":{"tag":"li","lines":"1019,1020"}},{"content":"<strong>Rendimiento</strong>: llamadas internas r&#xe1;pidas al estar todo en el mismo proceso.","children":[],"payload":{"tag":"li","lines":"1020,1021"}},{"content":"<strong>Menor complejidad operativa</strong>: no requiere infraestructura distribuida.","children":[],"payload":{"tag":"li","lines":"1021,1022"}},{"content":"<strong>Adecuado para aplicaciones peque&#xf1;as o con requisitos estables</strong>.","children":[],"payload":{"tag":"li","lines":"1022,1024"}}],"payload":{"tag":"ul","lines":"1018,1024"}},{"content":"","children":[{"content":"<strong>Escalabilidad limitada</strong>: dif&#xed;cil de escalar horizontalmente (a&#xf1;adir m&#xe1;s servidores).","children":[],"payload":{"tag":"li","lines":"1026,1027"}},{"content":"<strong>Mantenimiento complejo</strong>: cambios en una parte pueden afectar a toda la aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1027,1028"}},{"content":"<strong>Tiempo de despliegue largo</strong>: cualquier modificaci&#xf3;n requiere recompilar y desplegar todo el sistema.","children":[],"payload":{"tag":"li","lines":"1028,1029"}},{"content":"<strong>Falta de flexibilidad tecnol&#xf3;gica</strong>: dif&#xed;cil usar diferentes lenguajes o frameworks en distintos m&#xf3;dulos.","children":[],"payload":{"tag":"li","lines":"1029,1030"}},{"content":"<strong>Riesgo de fallos globales</strong>: un error puede tumbar toda la aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1030,1031"}}],"payload":{"tag":"ul","lines":"1026,1031"}}],"payload":{"tag":"li","lines":"1000,1031"}},{"content":"\n<p data-lines=\"1031,1032\">En capas</p>\n<h2 data-lines=\"1033,1034\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1035,1037\">La <strong>arquitectura en capas</strong> es un patr&#xf3;n de dise&#xf1;o de software que organiza el sistema en diferentes niveles o capas, cada una con responsabilidades espec&#xed;ficas.<br>\nSu objetivo principal es <strong>separar preocupaciones</strong>, mejorar la mantenibilidad y facilitar la evoluci&#xf3;n del sistema.</p>\n<p data-lines=\"1038,1039\">Ejemplo t&#xed;pico: aplicaciones empresariales con interfaz gr&#xe1;fica, l&#xf3;gica de negocio y base de datos claramente diferenciadas.</p>\n<h2 data-lines=\"1040,1041\">&#x1f539; Capas Principales de una Arquitectura en Capas</h2>\n<h3 data-lines=\"1042,1043\">1. Interfaz de Usuario (Presentation Layer)</h3>","children":[{"content":"","children":[{"content":"Responsable de la interacci&#xf3;n con el usuario.","children":[],"payload":{"tag":"li","lines":"1044,1045"}},{"content":"Contiene pantallas, formularios, vistas y componentes gr&#xe1;ficos.","children":[],"payload":{"tag":"li","lines":"1045,1046"}},{"content":"No debe incluir l&#xf3;gica de negocio, solo presentaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1046,1047"}},{"content":"Ejemplo: p&#xe1;ginas web en HTML/CSS/JavaScript, aplicaciones m&#xf3;viles con interfaces gr&#xe1;ficas.","children":[],"payload":{"tag":"li","lines":"1047,1049"}}],"payload":{"tag":"ul","lines":"1044,1049"}},{"content":"","children":[{"content":"Encapsula las reglas de negocio y procesos de la aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1051,1052"}},{"content":"Act&#xfa;a como intermediario entre la interfaz y los datos.","children":[],"payload":{"tag":"li","lines":"1052,1053"}},{"content":"Define validaciones, c&#xe1;lculos y flujos de trabajo.","children":[],"payload":{"tag":"li","lines":"1053,1054"}},{"content":"Ejemplo: servicios que gestionan pedidos, facturaci&#xf3;n, usuarios.","children":[],"payload":{"tag":"li","lines":"1054,1056"}}],"payload":{"tag":"ul","lines":"1051,1056"}},{"content":"","children":[{"content":"Responsable de la comunicaci&#xf3;n con la base de datos o sistemas externos.","children":[],"payload":{"tag":"li","lines":"1058,1059"}},{"content":"Contiene consultas SQL, repositorios y mapeo de objetos.","children":[],"payload":{"tag":"li","lines":"1059,1060"}},{"content":"Proporciona datos al Business Layer de manera estructurada.","children":[],"payload":{"tag":"li","lines":"1060,1061"}},{"content":"Ejemplo: ORM (Hibernate, Entity Framework), DAOs en Java o Python.","children":[],"payload":{"tag":"li","lines":"1061,1063"}}],"payload":{"tag":"ul","lines":"1058,1063"}},{"content":"","children":[{"content":"<strong>Separaci&#xf3;n de responsabilidades</strong>: cada capa tiene un rol definido.","children":[],"payload":{"tag":"li","lines":"1065,1066"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: componentes de negocio y acceso a datos pueden usarse en distintas interfaces.","children":[],"payload":{"tag":"li","lines":"1066,1067"}},{"content":"<strong>Mantenibilidad</strong>: facilita localizar y corregir errores.","children":[],"payload":{"tag":"li","lines":"1067,1068"}},{"content":"<strong>Escalabilidad</strong>: permite crecer el sistema sin perder orden.","children":[],"payload":{"tag":"li","lines":"1068,1069"}},{"content":"<strong>Pruebas m&#xe1;s sencillas</strong>: se pueden testear capas de forma independiente.","children":[],"payload":{"tag":"li","lines":"1069,1071"}}],"payload":{"tag":"ul","lines":"1065,1071"}},{"content":"","children":[{"content":"<strong>Acoplamiento</strong>: evitar dependencias fuertes entre capas.","children":[],"payload":{"tag":"li","lines":"1073,1074"}},{"content":"<strong>Rendimiento</strong>: demasiadas capas pueden introducir sobrecarga.","children":[],"payload":{"tag":"li","lines":"1074,1075"}},{"content":"<strong>Flexibilidad</strong>: aunque es un modelo cl&#xe1;sico, puede combinarse con otros patrones (MVC, microservicios).","children":[],"payload":{"tag":"li","lines":"1075,1076"}},{"content":"<strong>Buenas pr&#xe1;cticas</strong>: documentar interfaces entre capas y aplicar principios SOLID.","children":[],"payload":{"tag":"li","lines":"1076,1077"}},{"content":"<strong>Uso t&#xed;pico</strong>: aplicaciones empresariales, sistemas bancarios, ERPs, aplicaciones web tradicionales.","children":[],"payload":{"tag":"li","lines":"1077,1078"}}],"payload":{"tag":"ul","lines":"1073,1078"}}],"payload":{"tag":"li","lines":"1031,1078"}},{"content":"\n<p data-lines=\"1078,1079\">Cliente&#x2011;servidor</p>\n<h2 data-lines=\"1080,1081\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1082,1084\">La <strong>arquitectura cliente-servidor</strong> es un modelo de dise&#xf1;o de sistemas distribuidos en el que las funciones se dividen entre <strong>clientes</strong> (que solicitan servicios) y <strong>servidores</strong> (que los proveen).<br>\nEs uno de los paradigmas m&#xe1;s utilizados en aplicaciones de red, desde p&#xe1;ginas web hasta sistemas empresariales.</p>\n<h2 data-lines=\"1085,1086\">&#x1f539; Cliente</h2>","children":[{"content":"","children":[{"content":"Es la parte que <strong>inicia la comunicaci&#xf3;n</strong> solicitando recursos o servicios.","children":[],"payload":{"tag":"li","lines":"1087,1088"}},{"content":"Generalmente es la interfaz con el usuario (navegador web, aplicaci&#xf3;n m&#xf3;vil, software de escritorio).","children":[],"payload":{"tag":"li","lines":"1088,1089"}},{"content":"Sus funciones principales:","children":[{"content":"Capturar las solicitudes del usuario.","children":[],"payload":{"tag":"li","lines":"1090,1091"}},{"content":"Enviar peticiones al servidor.","children":[],"payload":{"tag":"li","lines":"1091,1092"}},{"content":"Mostrar los resultados recibidos.","children":[],"payload":{"tag":"li","lines":"1092,1094"}}],"payload":{"tag":"li","lines":"1089,1094"}}],"payload":{"tag":"ul","lines":"1087,1094"}},{"content":"","children":[{"content":"Es la parte que <strong>responde a las solicitudes</strong> del cliente.","children":[],"payload":{"tag":"li","lines":"1096,1097"}},{"content":"Puede ser un equipo f&#xed;sico o un servicio en la nube.","children":[],"payload":{"tag":"li","lines":"1097,1098"}},{"content":"Sus funciones principales:","children":[{"content":"Procesar las peticiones.","children":[],"payload":{"tag":"li","lines":"1099,1100"}},{"content":"Ejecutar l&#xf3;gica de negocio.","children":[],"payload":{"tag":"li","lines":"1100,1101"}},{"content":"Acceder y gestionar datos (bases de datos, archivos).","children":[],"payload":{"tag":"li","lines":"1101,1102"}},{"content":"Devolver respuestas al cliente.","children":[],"payload":{"tag":"li","lines":"1102,1104"}}],"payload":{"tag":"li","lines":"1098,1104"}}],"payload":{"tag":"ul","lines":"1096,1104"}},{"content":"","children":[{"content":"Se realiza a trav&#xe9;s de <strong>protocolos de red</strong> (ejemplo: HTTP/HTTPS, FTP, SMTP).","children":[],"payload":{"tag":"li","lines":"1106,1107"}},{"content":"Flujo t&#xed;pico:","children":[{"content":"1. El cliente env&#xed;a una petici&#xf3;n al servidor.","children":[],"payload":{"tag":"li","lines":"1108,1109","listIndex":1}},{"content":"2. El servidor procesa la solicitud.","children":[],"payload":{"tag":"li","lines":"1109,1110","listIndex":2}},{"content":"3. El servidor devuelve una respuesta al cliente.","children":[],"payload":{"tag":"li","lines":"1110,1111","listIndex":3}}],"payload":{"tag":"li","lines":"1107,1111"}},{"content":"Puede ser <strong>sincr&#xf3;nica</strong> (espera respuesta inmediata) o <strong>as&#xed;ncrona</strong> (procesamiento en segundo plano).","children":[],"payload":{"tag":"li","lines":"1111,1112"}},{"content":"Ejemplo: un navegador solicita una p&#xe1;gina web y el servidor devuelve el contenido HTML.","children":[],"payload":{"tag":"li","lines":"1112,1114"}}],"payload":{"tag":"ul","lines":"1106,1114"}},{"content":"","children":[{"content":"<strong>Centralizaci&#xf3;n</strong>: los datos y servicios se gestionan en el servidor.","children":[],"payload":{"tag":"li","lines":"1116,1117"}},{"content":"<strong>Escalabilidad</strong>: se pueden a&#xf1;adir m&#xe1;s clientes sin modificar el servidor.","children":[],"payload":{"tag":"li","lines":"1117,1118"}},{"content":"<strong>Mantenimiento sencillo</strong>: las actualizaciones se realizan en el servidor, sin necesidad de cambiar cada cliente.","children":[],"payload":{"tag":"li","lines":"1118,1119"}},{"content":"<strong>Seguridad</strong>: control centralizado de accesos y permisos.","children":[],"payload":{"tag":"li","lines":"1119,1120"}},{"content":"<strong>Flexibilidad</strong>: soporta m&#xfa;ltiples tipos de clientes (web, m&#xf3;vil, escritorio).","children":[],"payload":{"tag":"li","lines":"1120,1122"}}],"payload":{"tag":"ul","lines":"1116,1122"}},{"content":"","children":[{"content":"<strong>Dependencia del servidor</strong>: si falla, los clientes no pueden acceder al servicio.","children":[],"payload":{"tag":"li","lines":"1124,1125"}},{"content":"<strong>Carga del servidor</strong>: puede saturarse si hay demasiadas peticiones simult&#xe1;neas.","children":[],"payload":{"tag":"li","lines":"1125,1126"}},{"content":"<strong>Latencia de red</strong>: la comunicaci&#xf3;n depende de la calidad de la conexi&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1126,1127"}},{"content":"<strong>Escalado horizontal</strong>: requiere balanceadores de carga y servidores adicionales para grandes vol&#xfa;menes.","children":[],"payload":{"tag":"li","lines":"1127,1128"}},{"content":"<strong>Ejemplo pr&#xe1;ctico</strong>: aplicaciones web modernas (cliente = navegador, servidor = backend con base de datos).","children":[],"payload":{"tag":"li","lines":"1128,1129"}}],"payload":{"tag":"ul","lines":"1124,1129"}}],"payload":{"tag":"li","lines":"1078,1129"}},{"content":"\n<p data-lines=\"1129,1130\">Microservicios</p>\n<h2 data-lines=\"1131,1132\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1133,1135\">La <strong>arquitectura de microservicios</strong> es un estilo de dise&#xf1;o de software en el que una aplicaci&#xf3;n se construye como un conjunto de <strong>servicios peque&#xf1;os, independientes y desplegables de forma aut&#xf3;noma</strong>, que se comunican entre s&#xed; mediante APIs ligeras (normalmente REST o mensajer&#xed;a).<br>\nCada microservicio se centra en una funcionalidad espec&#xed;fica del negocio y puede desarrollarse, desplegarse y escalarse de manera independiente.</p>\n<h2 data-lines=\"1136,1137\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Descomposici&#xf3;n en servicios</strong>: cada m&#xf3;dulo es un servicio independiente.","children":[],"payload":{"tag":"li","lines":"1138,1139"}},{"content":"<strong>Autonom&#xed;a</strong>: los microservicios pueden desarrollarse y desplegarse sin afectar a otros.","children":[],"payload":{"tag":"li","lines":"1139,1140"}},{"content":"<strong>Comunicaci&#xf3;n ligera</strong>: suelen usar HTTP/REST, gRPC o colas de mensajer&#xed;a.","children":[],"payload":{"tag":"li","lines":"1140,1141"}},{"content":"<strong>Escalabilidad horizontal</strong>: se pueden escalar solo los servicios que lo necesiten.","children":[],"payload":{"tag":"li","lines":"1141,1142"}},{"content":"<strong>Flexibilidad tecnol&#xf3;gica</strong>: cada servicio puede implementarse con diferentes lenguajes o frameworks.","children":[],"payload":{"tag":"li","lines":"1142,1143"}},{"content":"<strong>Resiliencia</strong>: fallos en un servicio no necesariamente afectan a toda la aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1143,1145"}}],"payload":{"tag":"ul","lines":"1138,1145"}},{"content":"","children":[{"content":"<strong>Servicios independientes</strong>: cada uno con su propia l&#xf3;gica de negocio y base de datos.","children":[],"payload":{"tag":"li","lines":"1147,1148"}},{"content":"<strong>API Gateway</strong>: punto de entrada que gestiona las peticiones de los clientes hacia los microservicios.","children":[],"payload":{"tag":"li","lines":"1148,1149"}},{"content":"<strong>Bases de datos distribuidas</strong>: cada servicio puede tener su propia base de datos, evitando dependencias.","children":[],"payload":{"tag":"li","lines":"1149,1150"}},{"content":"<strong>Gesti&#xf3;n de configuraci&#xf3;n</strong>: herramientas para centralizar par&#xe1;metros y secretos (ejemplo: Consul, Config Server).","children":[],"payload":{"tag":"li","lines":"1150,1151"}},{"content":"<strong>Orquestaci&#xf3;n y despliegue</strong>: plataformas como Kubernetes o Docker para gestionar contenedores y escalado.","children":[],"payload":{"tag":"li","lines":"1151,1152"}},{"content":"<strong>Monitoreo y logging</strong>: sistemas para rastrear el estado de los servicios (ejemplo: Prometheus, ELK Stack).","children":[],"payload":{"tag":"li","lines":"1152,1153"}},{"content":"<strong>Comunicaci&#xf3;n entre servicios</strong>: mediante APIs REST, gRPC o mensajer&#xed;a (RabbitMQ, Kafka).","children":[],"payload":{"tag":"li","lines":"1153,1155"}}],"payload":{"tag":"ul","lines":"1147,1155"}},{"content":"","children":[{"content":"<strong>Complejidad operativa</strong>: requiere infraestructura avanzada para despliegue, monitoreo y comunicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1157,1158"}},{"content":"<strong>Dise&#xf1;o cuidadoso</strong>: mala definici&#xf3;n de l&#xed;mites entre servicios puede generar dependencias ocultas.","children":[],"payload":{"tag":"li","lines":"1158,1159"}},{"content":"<strong>Coste inicial</strong>: m&#xe1;s complejo que una arquitectura monol&#xed;tica o en capas.","children":[],"payload":{"tag":"li","lines":"1159,1160"}},{"content":"<strong>Seguridad</strong>: cada servicio debe gestionarse con autenticaci&#xf3;n y autorizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1160,1161"}},{"content":"<strong>Casos de uso ideales</strong>: aplicaciones grandes, con equipos distribuidos y necesidad de escalabilidad.","children":[],"payload":{"tag":"li","lines":"1161,1162"}},{"content":"<strong>Migraci&#xf3;n progresiva</strong>: muchas aplicaciones comienzan como monol&#xed;ticas y evolucionan hacia microservicios.","children":[],"payload":{"tag":"li","lines":"1162,1163"}}],"payload":{"tag":"ul","lines":"1157,1163"}}],"payload":{"tag":"li","lines":"1129,1163"}},{"content":"\n<p data-lines=\"1163,1164\">SOA</p>\n<h2 data-lines=\"1165,1166\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1167,1169\">La <strong>Arquitectura Orientada a Servicios (SOA)</strong> es un estilo de dise&#xf1;o de software que organiza las aplicaciones como un conjunto de <strong>servicios independientes</strong>, cada uno con una funcionalidad espec&#xed;fica y accesible a trav&#xe9;s de interfaces bien definidas.<br>\nSu objetivo es lograr <strong>interoperabilidad, reutilizaci&#xf3;n y flexibilidad</strong>, permitiendo que distintos sistemas se comuniquen entre s&#xed; sin importar la plataforma o el lenguaje de programaci&#xf3;n.</p>\n<h2 data-lines=\"1170,1171\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Servicios independientes</strong>: cada servicio realiza una tarea concreta y puede ser reutilizado en diferentes aplicaciones.","children":[],"payload":{"tag":"li","lines":"1172,1173"}},{"content":"<strong>Interoperabilidad</strong>: los servicios se comunican mediante protocolos est&#xe1;ndar (SOAP, REST, XML, JSON).","children":[],"payload":{"tag":"li","lines":"1173,1174"}},{"content":"<strong>Acoplamiento d&#xe9;bil</strong>: los servicios est&#xe1;n dise&#xf1;ados para minimizar dependencias entre s&#xed;.","children":[],"payload":{"tag":"li","lines":"1174,1175"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: un mismo servicio puede ser consumido por m&#xfa;ltiples aplicaciones.","children":[],"payload":{"tag":"li","lines":"1175,1176"}},{"content":"<strong>Escalabilidad</strong>: permite a&#xf1;adir nuevos servicios sin afectar a los existentes.","children":[],"payload":{"tag":"li","lines":"1176,1177"}},{"content":"<strong>Flexibilidad tecnol&#xf3;gica</strong>: los servicios pueden estar implementados en distintos lenguajes o plataformas.","children":[],"payload":{"tag":"li","lines":"1177,1179"}}],"payload":{"tag":"ul","lines":"1172,1179"}},{"content":"","children":[{"content":"<strong>Servicios</strong>: unidades funcionales independientes (ejemplo: servicio de pagos, servicio de autenticaci&#xf3;n).","children":[],"payload":{"tag":"li","lines":"1181,1182"}},{"content":"<strong>Bus de Servicios (Enterprise Service Bus, ESB)</strong>: middleware que gestiona la comunicaci&#xf3;n entre servicios, transformando mensajes y garantizando integraci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1182,1183"}},{"content":"<strong>Interfaces de Servicio</strong>: contratos que definen c&#xf3;mo se accede a cada servicio (WSDL en SOAP, endpoints REST).","children":[],"payload":{"tag":"li","lines":"1183,1184"}},{"content":"<strong>Registro de Servicios</strong>: cat&#xe1;logo donde se publican y descubren los servicios disponibles.","children":[],"payload":{"tag":"li","lines":"1184,1185"}},{"content":"<strong>Consumidores de Servicios</strong>: aplicaciones o sistemas que utilizan los servicios expuestos.","children":[],"payload":{"tag":"li","lines":"1185,1187"}}],"payload":{"tag":"ul","lines":"1181,1187"}},{"content":"","children":[{"content":"<strong>Reutilizaci&#xf3;n de componentes</strong>: se evita duplicar funcionalidades.","children":[],"payload":{"tag":"li","lines":"1189,1190"}},{"content":"<strong>Integraci&#xf3;n de sistemas heterog&#xe9;neos</strong>: conecta aplicaciones de diferentes tecnolog&#xed;as.","children":[],"payload":{"tag":"li","lines":"1190,1191"}},{"content":"<strong>Escalabilidad y flexibilidad</strong>: f&#xe1;cil a&#xf1;adir o modificar servicios.","children":[],"payload":{"tag":"li","lines":"1191,1192"}},{"content":"<strong>Mantenimiento m&#xe1;s sencillo</strong>: cambios en un servicio no afectan a toda la aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1192,1193"}},{"content":"<strong>Alineaci&#xf3;n con procesos de negocio</strong>: los servicios reflejan funciones del negocio.","children":[],"payload":{"tag":"li","lines":"1193,1195"}}],"payload":{"tag":"ul","lines":"1189,1195"}},{"content":"","children":[{"content":"<strong>Complejidad inicial</strong>: requiere una infraestructura robusta (ESB, registros, seguridad).","children":[],"payload":{"tag":"li","lines":"1197,1198"}},{"content":"<strong>Sobrecarga de comunicaci&#xf3;n</strong>: el uso de protocolos est&#xe1;ndar puede afectar al rendimiento.","children":[],"payload":{"tag":"li","lines":"1198,1199"}},{"content":"<strong>Gobernanza de servicios</strong>: es necesario definir pol&#xed;ticas claras de uso, seguridad y versionado.","children":[],"payload":{"tag":"li","lines":"1199,1200"}},{"content":"<strong>Coste de implementaci&#xf3;n</strong>: mayor inversi&#xf3;n en comparaci&#xf3;n con arquitecturas m&#xe1;s simples.","children":[],"payload":{"tag":"li","lines":"1200,1201"}},{"content":"<strong>Evoluci&#xf3;n hacia microservicios</strong>: SOA fue el precursor de la arquitectura de microservicios, que simplifica y moderniza algunos de sus conceptos.","children":[],"payload":{"tag":"li","lines":"1201,1202"}}],"payload":{"tag":"ul","lines":"1197,1202"}}],"payload":{"tag":"li","lines":"1163,1202"}},{"content":"\n<p data-lines=\"1202,1203\">En n capas</p>\n<h2 data-lines=\"1204,1205\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1206,1209\">La <strong>Arquitectura en N Capas</strong> es un patr&#xf3;n de dise&#xf1;o de software que organiza una aplicaci&#xf3;n en m&#xfa;ltiples capas l&#xf3;gicas, cada una con responsabilidades espec&#xed;ficas.<br>\nSe denomina &#x201c;N&#x201d; porque el n&#xfa;mero de capas puede variar seg&#xfa;n la complejidad del sistema (3, 4 o m&#xe1;s capas).<br>\nSu objetivo principal es <strong>separar responsabilidades, mejorar la mantenibilidad y facilitar la escalabilidad</strong>.</p>\n<h2 data-lines=\"1210,1211\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Separaci&#xf3;n de responsabilidades</strong>: cada capa cumple una funci&#xf3;n distinta.","children":[],"payload":{"tag":"li","lines":"1212,1213"}},{"content":"<strong>Modularidad</strong>: facilita el reemplazo o actualizaci&#xf3;n de una capa sin afectar a las dem&#xe1;s.","children":[],"payload":{"tag":"li","lines":"1213,1214"}},{"content":"<strong>Escalabilidad</strong>: permite distribuir capas en distintos servidores o servicios.","children":[],"payload":{"tag":"li","lines":"1214,1215"}},{"content":"<strong>Flexibilidad tecnol&#xf3;gica</strong>: cada capa puede implementarse con diferentes tecnolog&#xed;as.","children":[],"payload":{"tag":"li","lines":"1215,1216"}},{"content":"<strong>Comunicaci&#xf3;n controlada</strong>: las capas interact&#xfa;an entre s&#xed; de manera ordenada y definida.","children":[],"payload":{"tag":"li","lines":"1216,1218"}}],"payload":{"tag":"ul","lines":"1212,1218"}},{"content":"","children":[{"content":"<strong>Capa de Presentaci&#xf3;n (Presentation Layer)</strong>","children":[{"content":"Interfaz con el usuario.","children":[],"payload":{"tag":"li","lines":"1221,1222"}},{"content":"Maneja la visualizaci&#xf3;n y captura de datos.","children":[],"payload":{"tag":"li","lines":"1222,1223"}},{"content":"Ejemplo: aplicaciones web (HTML, CSS, JavaScript).","children":[],"payload":{"tag":"li","lines":"1223,1224"}}],"payload":{"tag":"li","lines":"1220,1224"}},{"content":"<strong>Capa de L&#xf3;gica de Negocio (Business Layer)</strong>","children":[{"content":"Contiene reglas de negocio y procesos.","children":[],"payload":{"tag":"li","lines":"1225,1226"}},{"content":"Valida datos y coordina operaciones.","children":[],"payload":{"tag":"li","lines":"1226,1227"}},{"content":"Ejemplo: servicios que gestionan pedidos, facturaci&#xf3;n, usuarios.","children":[],"payload":{"tag":"li","lines":"1227,1228"}}],"payload":{"tag":"li","lines":"1224,1228"}},{"content":"<strong>Capa de Acceso a Datos (Data Access Layer)</strong>","children":[{"content":"Gestiona la comunicaci&#xf3;n con bases de datos o sistemas externos.","children":[],"payload":{"tag":"li","lines":"1229,1230"}},{"content":"Encapsula consultas y operaciones CRUD.","children":[],"payload":{"tag":"li","lines":"1230,1231"}},{"content":"Ejemplo: ORM (Hibernate, Entity Framework).","children":[],"payload":{"tag":"li","lines":"1231,1232"}}],"payload":{"tag":"li","lines":"1228,1232"}},{"content":"<strong>Capa de Datos (Data Layer)</strong>","children":[{"content":"Almacena la informaci&#xf3;n persistente.","children":[],"payload":{"tag":"li","lines":"1233,1234"}},{"content":"Puede ser una base de datos relacional, NoSQL o sistemas de archivos.","children":[],"payload":{"tag":"li","lines":"1234,1235"}},{"content":"Ejemplo: MySQL, PostgreSQL, MongoDB.","children":[],"payload":{"tag":"li","lines":"1235,1237"}}],"payload":{"tag":"li","lines":"1232,1237"}}],"payload":{"tag":"ul","lines":"1220,1237"}},{"content":"","children":[{"content":"<strong>Mantenibilidad</strong>: facilita localizar y corregir errores.","children":[],"payload":{"tag":"li","lines":"1241,1242"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: componentes de negocio y acceso a datos pueden usarse en distintas interfaces.","children":[],"payload":{"tag":"li","lines":"1242,1243"}},{"content":"<strong>Escalabilidad</strong>: se pueden distribuir capas en diferentes servidores.","children":[],"payload":{"tag":"li","lines":"1243,1244"}},{"content":"<strong>Seguridad</strong>: cada capa puede implementar controles espec&#xed;ficos.","children":[],"payload":{"tag":"li","lines":"1244,1245"}},{"content":"<strong>Flexibilidad</strong>: permite evolucionar el sistema sin afectar toda la aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1245,1247"}}],"payload":{"tag":"ul","lines":"1241,1247"}},{"content":"","children":[{"content":"<strong>Complejidad</strong>: m&#xe1;s capas implican mayor dificultad de dise&#xf1;o y mantenimiento.","children":[],"payload":{"tag":"li","lines":"1249,1250"}},{"content":"<strong>Rendimiento</strong>: demasiadas capas pueden introducir latencia.","children":[],"payload":{"tag":"li","lines":"1250,1251"}},{"content":"<strong>Acoplamiento</strong>: se debe evitar dependencias fuertes entre capas.","children":[],"payload":{"tag":"li","lines":"1251,1252"}},{"content":"<strong>Coste inicial</strong>: requiere m&#xe1;s planificaci&#xf3;n y recursos que una arquitectura monol&#xed;tica.","children":[],"payload":{"tag":"li","lines":"1252,1253"}},{"content":"<strong>Uso t&#xed;pico</strong>: aplicaciones empresariales, sistemas bancarios, ERPs y aplicaciones web de gran escala.","children":[],"payload":{"tag":"li","lines":"1253,1254"}}],"payload":{"tag":"ul","lines":"1249,1254"}}],"payload":{"tag":"li","lines":"1202,1254"}},{"content":"\n<p data-lines=\"1254,1255\">Event driven</p>\n<h2 data-lines=\"1256,1257\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1258,1261\">La <strong>Arquitectura Event-Driven (EDA)</strong> es un estilo de dise&#xf1;o de software basado en la <strong>generaci&#xf3;n, detecci&#xf3;n y consumo de eventos</strong>.<br>\nUn evento es cualquier cambio significativo en el estado de un sistema (ejemplo: un usuario realiza un pago, se registra un pedido, se actualiza un stock).<br>\nEDA permite que los sistemas reaccionen de manera <strong>as&#xed;ncrona y desacoplada</strong>, favoreciendo la escalabilidad y la flexibilidad.</p>\n<h2 data-lines=\"1262,1263\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Asincron&#xed;a</strong>: los componentes no esperan respuestas inmediatas, reaccionan cuando ocurre un evento.","children":[],"payload":{"tag":"li","lines":"1264,1265"}},{"content":"<strong>Desacoplamiento</strong>: productores y consumidores de eventos no dependen directamente entre s&#xed;.","children":[],"payload":{"tag":"li","lines":"1265,1266"}},{"content":"<strong>Escalabilidad</strong>: f&#xe1;cil a&#xf1;adir nuevos consumidores sin modificar los productores.","children":[],"payload":{"tag":"li","lines":"1266,1267"}},{"content":"<strong>Flexibilidad</strong>: los sistemas pueden evolucionar a&#xf1;adiendo nuevas funcionalidades basadas en eventos.","children":[],"payload":{"tag":"li","lines":"1267,1268"}},{"content":"<strong>Reactividad</strong>: los sistemas responden en tiempo real a cambios o acciones.","children":[],"payload":{"tag":"li","lines":"1268,1270"}}],"payload":{"tag":"ul","lines":"1264,1270"}},{"content":"","children":[{"content":"<strong>Productores de eventos</strong>: generan eventos cuando ocurre un cambio (ejemplo: aplicaci&#xf3;n de ventas que emite un evento &#x201c;pedido creado&#x201d;).","children":[],"payload":{"tag":"li","lines":"1272,1273"}},{"content":"<strong>Canal de eventos (Event Bus o Broker)</strong>: infraestructura que transporta los eventos entre productores y consumidores (ejemplo: Kafka, RabbitMQ, AWS EventBridge).","children":[],"payload":{"tag":"li","lines":"1273,1274"}},{"content":"<strong>Consumidores de eventos</strong>: servicios o aplicaciones que reaccionan a los eventos recibidos (ejemplo: servicio de facturaci&#xf3;n que procesa el evento &#x201c;pedido creado&#x201d;).","children":[],"payload":{"tag":"li","lines":"1274,1275"}},{"content":"<strong>Eventos</strong>: mensajes que describen el cambio ocurrido, normalmente en formato JSON, XML o Avro.","children":[],"payload":{"tag":"li","lines":"1275,1276"}},{"content":"<strong>Procesadores de eventos</strong>: l&#xf3;gica que transforma, enruta o filtra eventos antes de llegar a los consumidores.","children":[],"payload":{"tag":"li","lines":"1276,1278"}}],"payload":{"tag":"ul","lines":"1272,1278"}},{"content":"","children":[{"content":"<strong>Alta escalabilidad</strong>: permite manejar grandes vol&#xfa;menes de datos y transacciones.","children":[],"payload":{"tag":"li","lines":"1280,1281"}},{"content":"<strong>Resiliencia</strong>: los sistemas pueden seguir funcionando aunque un consumidor falle.","children":[],"payload":{"tag":"li","lines":"1281,1282"}},{"content":"<strong>Flexibilidad tecnol&#xf3;gica</strong>: productores y consumidores pueden estar desarrollados en diferentes lenguajes o plataformas.","children":[],"payload":{"tag":"li","lines":"1282,1283"}},{"content":"<strong>Tiempo real</strong>: ideal para aplicaciones que requieren respuesta inmediata (ejemplo: sistemas financieros, IoT, comercio electr&#xf3;nico).","children":[],"payload":{"tag":"li","lines":"1283,1284"}},{"content":"<strong>Extensibilidad</strong>: se pueden a&#xf1;adir nuevos consumidores sin modificar los productores existentes.","children":[],"payload":{"tag":"li","lines":"1284,1286"}}],"payload":{"tag":"ul","lines":"1280,1286"}},{"content":"","children":[{"content":"<strong>Complejidad</strong>: requiere infraestructura de mensajer&#xed;a y monitoreo avanzado.","children":[],"payload":{"tag":"li","lines":"1288,1289"}},{"content":"<strong>Gesti&#xf3;n de eventos</strong>: es necesario definir est&#xe1;ndares claros para los mensajes.","children":[],"payload":{"tag":"li","lines":"1289,1290"}},{"content":"<strong>Depuraci&#xf3;n</strong>: m&#xe1;s dif&#xed;cil rastrear errores en sistemas distribuidos basados en eventos.","children":[],"payload":{"tag":"li","lines":"1290,1291"}},{"content":"<strong>Orden de eventos</strong>: garantizar la secuencia correcta puede ser un reto.","children":[],"payload":{"tag":"li","lines":"1291,1292"}},{"content":"<strong>Coste inicial</strong>: mayor inversi&#xf3;n en comparaci&#xf3;n con arquitecturas m&#xe1;s simples.","children":[],"payload":{"tag":"li","lines":"1292,1293"}},{"content":"<strong>Casos de uso ideales</strong>: aplicaciones de streaming de datos, IoT, sistemas financieros, comercio electr&#xf3;nico y microservicios.","children":[],"payload":{"tag":"li","lines":"1293,1294"}}],"payload":{"tag":"ul","lines":"1288,1294"}}],"payload":{"tag":"li","lines":"1254,1294"}},{"content":"\n<p data-lines=\"1294,1295\">Capas hexagonal</p>\n<h2 data-lines=\"1296,1297\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1298,1300\">La <strong>Arquitectura Hexagonal</strong>, tambi&#xe9;n conocida como <strong>Arquitectura de Puertos y Adaptadores</strong>, es un patr&#xf3;n de dise&#xf1;o de software que busca aislar la l&#xf3;gica central del sistema (el dominio) de las dependencias externas (bases de datos, interfaces de usuario, APIs, frameworks).<br>\nSu objetivo es lograr un sistema <strong>independiente, flexible y f&#xe1;cilmente testeable</strong>, donde el n&#xfa;cleo de negocio no dependa de detalles t&#xe9;cnicos.</p>\n<h2 data-lines=\"1301,1302\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Separaci&#xf3;n clara</strong> entre l&#xf3;gica de negocio y detalles de infraestructura.","children":[],"payload":{"tag":"li","lines":"1303,1304"}},{"content":"<strong>Independencia tecnol&#xf3;gica</strong>: el dominio no depende de frameworks, bases de datos ni interfaces espec&#xed;ficas.","children":[],"payload":{"tag":"li","lines":"1304,1305"}},{"content":"<strong>Adaptadores intercambiables</strong>: se pueden reemplazar tecnolog&#xed;as externas sin modificar el n&#xfa;cleo.","children":[],"payload":{"tag":"li","lines":"1305,1306"}},{"content":"<strong>Testabilidad</strong>: facilita pruebas unitarias y de integraci&#xf3;n al aislar el dominio.","children":[],"payload":{"tag":"li","lines":"1306,1307"}},{"content":"<strong>Enfoque en el dominio</strong>: el coraz&#xf3;n de la aplicaci&#xf3;n es el modelo de negocio.","children":[],"payload":{"tag":"li","lines":"1307,1309"}}],"payload":{"tag":"ul","lines":"1303,1309"}},{"content":"","children":[{"content":"<strong>Dominio (Core)</strong>","children":[{"content":"Contiene las reglas de negocio y entidades principales.","children":[],"payload":{"tag":"li","lines":"1312,1313"}},{"content":"Es independiente de cualquier tecnolog&#xed;a externa.","children":[],"payload":{"tag":"li","lines":"1313,1314"}}],"payload":{"tag":"li","lines":"1311,1314"}},{"content":"<strong>Puertos (Ports)</strong>","children":[{"content":"Interfaces que definen c&#xf3;mo el dominio interact&#xfa;a con el exterior.","children":[],"payload":{"tag":"li","lines":"1315,1316"}},{"content":"Ejemplo: un puerto para guardar datos, otro para recibir comandos.","children":[],"payload":{"tag":"li","lines":"1316,1317"}}],"payload":{"tag":"li","lines":"1314,1317"}},{"content":"<strong>Adaptadores (Adapters)</strong>","children":[{"content":"Implementaciones concretas de los puertos.","children":[],"payload":{"tag":"li","lines":"1318,1319"}},{"content":"Ejemplo: adaptador para una base de datos SQL, adaptador para una API REST, adaptador para interfaz gr&#xe1;fica.","children":[],"payload":{"tag":"li","lines":"1319,1320"}}],"payload":{"tag":"li","lines":"1317,1320"}},{"content":"<strong>Entradas (Driving Adapters)</strong>","children":[{"content":"Componentes que env&#xed;an solicitudes al dominio (ejemplo: controladores web, CLI, servicios externos).","children":[],"payload":{"tag":"li","lines":"1321,1322"}}],"payload":{"tag":"li","lines":"1320,1322"}},{"content":"<strong>Salidas (Driven Adapters)</strong>","children":[{"content":"Componentes que reciben instrucciones del dominio para interactuar con sistemas externos (ejemplo: repositorios, servicios de mensajer&#xed;a).","children":[],"payload":{"tag":"li","lines":"1323,1325"}}],"payload":{"tag":"li","lines":"1322,1325"}}],"payload":{"tag":"ul","lines":"1311,1325"}},{"content":"","children":[{"content":"<strong>Flexibilidad tecnol&#xf3;gica</strong>: se pueden cambiar bases de datos, frameworks o interfaces sin afectar el n&#xfa;cleo.","children":[],"payload":{"tag":"li","lines":"1327,1328"}},{"content":"<strong>Mantenibilidad</strong>: el c&#xf3;digo est&#xe1; mejor organizado y desacoplado.","children":[],"payload":{"tag":"li","lines":"1328,1329"}},{"content":"<strong>Pruebas m&#xe1;s sencillas</strong>: el dominio puede probarse sin necesidad de infraestructura externa.","children":[],"payload":{"tag":"li","lines":"1329,1330"}},{"content":"<strong>Escalabilidad</strong>: facilita la evoluci&#xf3;n del sistema al a&#xf1;adir nuevos adaptadores.","children":[],"payload":{"tag":"li","lines":"1330,1331"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: el n&#xfa;cleo puede usarse en distintos contextos con diferentes adaptadores.","children":[],"payload":{"tag":"li","lines":"1331,1333"}}],"payload":{"tag":"ul","lines":"1327,1333"}},{"content":"","children":[{"content":"<strong>Complejidad inicial</strong>: requiere mayor esfuerzo de dise&#xf1;o y organizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1335,1336"}},{"content":"<strong>Curva de aprendizaje</strong>: puede ser m&#xe1;s dif&#xed;cil de entender para equipos sin experiencia en arquitectura.","children":[],"payload":{"tag":"li","lines":"1336,1337"}},{"content":"<strong>Sobrecarga de abstracci&#xf3;n</strong>: demasiados puertos y adaptadores pueden complicar el sistema.","children":[],"payload":{"tag":"li","lines":"1337,1338"}},{"content":"<strong>Uso t&#xed;pico</strong>: aplicaciones con l&#xf3;gica de negocio compleja, sistemas que necesitan independencia tecnol&#xf3;gica y proyectos de larga duraci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1338,1339"}}],"payload":{"tag":"ul","lines":"1335,1339"}}],"payload":{"tag":"li","lines":"1294,1339"}},{"content":"\n<p data-lines=\"1339,1340\">Basada en componentes</p>\n<h2 data-lines=\"1341,1342\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1343,1345\">La <strong>Arquitectura basada en Componentes</strong> e
