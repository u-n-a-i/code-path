s un estilo de dise&#xf1;o de software que organiza una aplicaci&#xf3;n en <strong>componentes independientes y reutilizables</strong>, cada uno con una funcionalidad espec&#xed;fica.<br>\nEl objetivo es construir sistemas complejos a partir de piezas modulares que puedan integrarse f&#xe1;cilmente, reduciendo la duplicaci&#xf3;n de c&#xf3;digo y mejorando la mantenibilidad.</p>\n<h2 data-lines=\"1346,1347\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Modularidad</strong>: el sistema se divide en componentes con responsabilidades claras.","children":[],"payload":{"tag":"li","lines":"1348,1349"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: los componentes pueden usarse en diferentes aplicaciones o contextos.","children":[],"payload":{"tag":"li","lines":"1349,1350"}},{"content":"<strong>Encapsulamiento</strong>: cada componente oculta su implementaci&#xf3;n interna y expone solo interfaces p&#xfa;blicas.","children":[],"payload":{"tag":"li","lines":"1350,1351"}},{"content":"<strong>Interoperabilidad</strong>: los componentes pueden comunicarse entre s&#xed; mediante interfaces bien definidas.","children":[],"payload":{"tag":"li","lines":"1351,1352"}},{"content":"<strong>Flexibilidad tecnol&#xf3;gica</strong>: los componentes pueden estar desarrollados en distintos lenguajes o plataformas, siempre que respeten las interfaces.","children":[],"payload":{"tag":"li","lines":"1352,1353"}},{"content":"<strong>Escalabilidad</strong>: facilita la evoluci&#xf3;n del sistema a&#xf1;adiendo o reemplazando componentes.","children":[],"payload":{"tag":"li","lines":"1353,1355"}}],"payload":{"tag":"ul","lines":"1348,1355"}},{"content":"","children":[{"content":"<strong>Componentes funcionales</strong>: implementan funcionalidades espec&#xed;ficas del negocio (ejemplo: gesti&#xf3;n de usuarios, procesamiento de pagos).","children":[],"payload":{"tag":"li","lines":"1357,1358"}},{"content":"<strong>Interfaces</strong>: definen c&#xf3;mo los componentes interact&#xfa;an entre s&#xed;, asegurando compatibilidad.","children":[],"payload":{"tag":"li","lines":"1358,1359"}},{"content":"<strong>Contenedores</strong>: entornos que alojan y gestionan los componentes (ejemplo: servidores de aplicaciones, frameworks).","children":[],"payload":{"tag":"li","lines":"1359,1360"}},{"content":"<strong>Conectores</strong>: mecanismos que permiten la comunicaci&#xf3;n entre componentes (ejemplo: APIs, servicios web, middleware).","children":[],"payload":{"tag":"li","lines":"1360,1361"}},{"content":"<strong>Bibliotecas de componentes</strong>: repositorios donde se almacenan y gestionan componentes reutilizables.","children":[],"payload":{"tag":"li","lines":"1361,1363"}}],"payload":{"tag":"ul","lines":"1357,1363"}},{"content":"","children":[{"content":"<strong>Mantenibilidad</strong>: los cambios se realizan en componentes espec&#xed;ficos sin afectar al resto del sistema.","children":[],"payload":{"tag":"li","lines":"1365,1366"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: se pueden aprovechar componentes ya desarrollados en nuevos proyectos.","children":[],"payload":{"tag":"li","lines":"1366,1367"}},{"content":"<strong>Escalabilidad</strong>: permite a&#xf1;adir nuevas funcionalidades sin redise&#xf1;ar toda la aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1367,1368"}},{"content":"<strong>Flexibilidad</strong>: facilita la integraci&#xf3;n con diferentes tecnolog&#xed;as y plataformas.","children":[],"payload":{"tag":"li","lines":"1368,1369"}},{"content":"<strong>Reducci&#xf3;n de costes</strong>: al reutilizar componentes, se disminuye el esfuerzo de desarrollo.","children":[],"payload":{"tag":"li","lines":"1369,1371"}}],"payload":{"tag":"ul","lines":"1365,1371"}},{"content":"","children":[{"content":"<strong>Complejidad de integraci&#xf3;n</strong>: requiere una buena definici&#xf3;n de interfaces para evitar incompatibilidades.","children":[],"payload":{"tag":"li","lines":"1373,1374"}},{"content":"<strong>Gesti&#xf3;n de dependencias</strong>: los componentes deben dise&#xf1;arse para minimizar acoplamientos.","children":[],"payload":{"tag":"li","lines":"1374,1375"}},{"content":"<strong>Sobrecarga inicial</strong>: dise&#xf1;ar componentes reutilizables puede requerir m&#xe1;s tiempo y esfuerzo.","children":[],"payload":{"tag":"li","lines":"1375,1376"}},{"content":"<strong>Rendimiento</strong>: la comunicaci&#xf3;n entre componentes puede introducir latencia si no se optimiza.","children":[],"payload":{"tag":"li","lines":"1376,1377"}},{"content":"<strong>Casos de uso ideales</strong>: aplicaciones grandes, sistemas distribuidos y proyectos que requieren evoluci&#xf3;n constante.","children":[],"payload":{"tag":"li","lines":"1377,1378"}}],"payload":{"tag":"ul","lines":"1373,1378"}}],"payload":{"tag":"li","lines":"1339,1378"}},{"content":"\n<p data-lines=\"1378,1379\">Nube</p>\n<h2 data-lines=\"1380,1381\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1382,1384\">La <strong>Arquitectura Cloud-Native</strong> es un enfoque de dise&#xf1;o y desarrollo de aplicaciones pensado espec&#xed;ficamente para aprovechar las capacidades de la <strong>computaci&#xf3;n en la nube</strong>.<br>\nSe basa en principios como la <strong>escalabilidad autom&#xe1;tica, resiliencia, despliegue continuo y desacoplamiento de servicios</strong>, permitiendo que las aplicaciones se adapten din&#xe1;micamente a la demanda y se integren con ecosistemas distribuidos.</p>\n<h2 data-lines=\"1385,1386\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Escalabilidad autom&#xe1;tica</strong>: las aplicaciones pueden crecer o reducir recursos seg&#xfa;n la carga.","children":[],"payload":{"tag":"li","lines":"1387,1388"}},{"content":"<strong>Resiliencia</strong>: tolerancia a fallos mediante redundancia y recuperaci&#xf3;n autom&#xe1;tica.","children":[],"payload":{"tag":"li","lines":"1388,1389"}},{"content":"<strong>Despliegue continuo (CI/CD)</strong>: integraci&#xf3;n y entrega continua para actualizaciones r&#xe1;pidas.","children":[],"payload":{"tag":"li","lines":"1389,1390"}},{"content":"<strong>Desacoplamiento</strong>: uso de microservicios y contenedores para modularidad.","children":[],"payload":{"tag":"li","lines":"1390,1391"}},{"content":"<strong>Portabilidad</strong>: aplicaciones dise&#xf1;adas para ejecutarse en diferentes proveedores de nube.","children":[],"payload":{"tag":"li","lines":"1391,1392"}},{"content":"<strong>Observabilidad</strong>: monitoreo, logging y m&#xe9;tricas integradas para gestionar sistemas distribuidos.","children":[],"payload":{"tag":"li","lines":"1392,1394"}}],"payload":{"tag":"ul","lines":"1387,1394"}},{"content":"","children":[{"content":"<strong>Microservicios</strong>: aplicaciones divididas en servicios peque&#xf1;os e independientes.","children":[],"payload":{"tag":"li","lines":"1396,1397"}},{"content":"<strong>Contenedores</strong>: empaquetan aplicaciones y dependencias (ejemplo: Docker).","children":[],"payload":{"tag":"li","lines":"1397,1398"}},{"content":"<strong>Orquestadores</strong>: gestionan contenedores y servicios distribuidos (ejemplo: Kubernetes).","children":[],"payload":{"tag":"li","lines":"1398,1399"}},{"content":"<strong>API Gateway</strong>: punto de entrada para gestionar peticiones y seguridad.","children":[],"payload":{"tag":"li","lines":"1399,1400"}},{"content":"<strong>Servicios gestionados de nube</strong>: bases de datos, almacenamiento, mensajer&#xed;a, autenticaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1400,1401"}},{"content":"<strong>Infraestructura como c&#xf3;digo (IaC)</strong>: automatizaci&#xf3;n de despliegues y configuraciones (ejemplo: Terraform, Ansible).","children":[],"payload":{"tag":"li","lines":"1401,1402"}},{"content":"<strong>Monitoreo y observabilidad</strong>: herramientas para m&#xe9;tricas, trazas y alertas (ejemplo: Prometheus, Grafana).","children":[],"payload":{"tag":"li","lines":"1402,1404"}}],"payload":{"tag":"ul","lines":"1396,1404"}},{"content":"","children":[{"content":"<strong>Escalabilidad din&#xe1;mica</strong>: ajusta recursos seg&#xfa;n la demanda.","children":[],"payload":{"tag":"li","lines":"1406,1407"}},{"content":"<strong>Agilidad</strong>: permite ciclos de desarrollo m&#xe1;s r&#xe1;pidos.","children":[],"payload":{"tag":"li","lines":"1407,1408"}},{"content":"<strong>Resiliencia y alta disponibilidad</strong>: aplicaciones tolerantes a fallos.","children":[],"payload":{"tag":"li","lines":"1408,1409"}},{"content":"<strong>Optimizaci&#xf3;n de costes</strong>: pago por uso de recursos.","children":[],"payload":{"tag":"li","lines":"1409,1410"}},{"content":"<strong>Flexibilidad tecnol&#xf3;gica</strong>: integraci&#xf3;n con m&#xfa;ltiples servicios y lenguajes.","children":[],"payload":{"tag":"li","lines":"1410,1411"}},{"content":"<strong>Innovaci&#xf3;n</strong>: acceso a servicios avanzados de IA, Big Data, IoT, etc.","children":[],"payload":{"tag":"li","lines":"1411,1413"}}],"payload":{"tag":"ul","lines":"1406,1413"}},{"content":"","children":[{"content":"<strong>Complejidad operativa</strong>: requiere experiencia en gesti&#xf3;n de sistemas distribuidos.","children":[],"payload":{"tag":"li","lines":"1415,1416"}},{"content":"<strong>Dependencia del proveedor (vendor lock-in)</strong>: riesgo de quedar atado a un servicio espec&#xed;fico de nube.","children":[],"payload":{"tag":"li","lines":"1416,1417"}},{"content":"<strong>Seguridad</strong>: necesidad de pol&#xed;ticas robustas de autenticaci&#xf3;n, autorizaci&#xf3;n y cifrado.","children":[],"payload":{"tag":"li","lines":"1417,1418"}},{"content":"<strong>Costes ocultos</strong>: mal dise&#xf1;o puede generar gastos elevados en recursos.","children":[],"payload":{"tag":"li","lines":"1418,1419"}},{"content":"<strong>Cultura DevOps</strong>: imprescindible para aprovechar CI/CD y automatizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1419,1420"}},{"content":"<strong>Casos de uso ideales</strong>: aplicaciones modernas, escalables, distribuidas y con alta demanda variable.","children":[],"payload":{"tag":"li","lines":"1420,1422"}}],"payload":{"tag":"ul","lines":"1415,1422"}}],"payload":{"tag":"li","lines":"1378,1422"}}],"payload":{"tag":"h3","lines":"906,907"}},{"content":"Paradigmas de programaci&#xf3;n","children":[{"content":"\n<p data-lines=\"1424,1425\">Introducci&#xf3;n</p>\n<h2 data-lines=\"1426,1427\">&#x1f539; &#xbf;Qu&#xe9; son los paradigmas de programaci&#xf3;n?</h2>\n<p data-lines=\"1428,1431\">Un <strong>paradigma de programaci&#xf3;n</strong> es un estilo o enfoque que define <strong>c&#xf3;mo se estructura y organiza el c&#xf3;digo</strong> para resolver problemas.<br>\nCada paradigma establece principios, t&#xe9;cnicas y formas de pensar que gu&#xed;an al programador en la construcci&#xf3;n de software.<br>\nEn otras palabras, son <strong>modelos mentales y metodol&#xf3;gicos</strong> que influyen en la manera de dise&#xf1;ar y escribir programas.</p>\n<h2 data-lines=\"1432,1433\">&#x1f539; Importancia de los paradigmas</h2>","children":[{"content":"","children":[{"content":"<strong>Organizaci&#xf3;n del pensamiento</strong>: ayudan a estructurar la soluci&#xf3;n de problemas.","children":[],"payload":{"tag":"li","lines":"1434,1435"}},{"content":"<strong>Eficiencia</strong>: cada paradigma ofrece ventajas espec&#xed;ficas seg&#xfa;n el tipo de aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1435,1436"}},{"content":"<strong>Mantenibilidad</strong>: facilitan la comprensi&#xf3;n y modificaci&#xf3;n del c&#xf3;digo.","children":[],"payload":{"tag":"li","lines":"1436,1437"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: fomentan la creaci&#xf3;n de estructuras y patrones reutilizables.","children":[],"payload":{"tag":"li","lines":"1437,1438"}},{"content":"<strong>Adaptabilidad</strong>: permiten elegir el enfoque m&#xe1;s adecuado seg&#xfa;n el contexto (ejemplo: sistemas cr&#xed;ticos, aplicaciones web, inteligencia artificial).","children":[],"payload":{"tag":"li","lines":"1438,1440"}}],"payload":{"tag":"ul","lines":"1434,1440"}},{"content":"","children":[{"content":"<strong>Imperativo</strong>: se centra en indicar paso a paso c&#xf3;mo resolver un problema.","children":[],"payload":{"tag":"li","lines":"1442,1443"}},{"content":"<strong>Declarativo</strong>: describe qu&#xe9; resultado se quiere obtener, sin detallar los pasos.","children":[],"payload":{"tag":"li","lines":"1443,1444"}},{"content":"<strong>Funcional</strong>: basado en funciones matem&#xe1;ticas puras y en la inmutabilidad.","children":[],"payload":{"tag":"li","lines":"1444,1445"}},{"content":"<strong>Orientado a Objetos (POO)</strong>: organiza el software en torno a objetos que combinan datos y comportamientos.","children":[],"payload":{"tag":"li","lines":"1445,1446"}},{"content":"<strong>L&#xf3;gico</strong>: utiliza hechos y reglas para deducir soluciones mediante inferencia.","children":[],"payload":{"tag":"li","lines":"1446,1447"}},{"content":"<strong>Basado en Componentes</strong>: construye aplicaciones a partir de m&#xf3;dulos reutilizables.","children":[],"payload":{"tag":"li","lines":"1447,1448"}},{"content":"<strong>Concurrente y Paralelo</strong>: permiten ejecutar m&#xfa;ltiples tareas de manera simult&#xe1;nea.","children":[],"payload":{"tag":"li","lines":"1448,1449"}},{"content":"<strong>Reactivo y Basado en Eventos</strong>: orientados a la respuesta en tiempo real frente a est&#xed;mulos o flujos de datos.","children":[],"payload":{"tag":"li","lines":"1449,1450"}},{"content":"<strong>Aspecto-Orientado (AOP)</strong>: separa las preocupaciones transversales (logging, seguridad, transacciones) del c&#xf3;digo principal.","children":[],"payload":{"tag":"li","lines":"1450,1452"}}],"payload":{"tag":"ul","lines":"1442,1452"}},{"content":"","children":[{"content":"1. <strong>A&#xf1;os 50-60</strong>: paradigmas imperativos y procedimentales (Fortran, COBOL).","children":[],"payload":{"tag":"li","lines":"1454,1455","listIndex":1}},{"content":"2. <strong>A&#xf1;os 70-80</strong>: auge de la programaci&#xf3;n estructurada y orientada a objetos (C++, Smalltalk).","children":[],"payload":{"tag":"li","lines":"1455,1456","listIndex":2}},{"content":"3. <strong>A&#xf1;os 90-2000</strong>: expansi&#xf3;n de la POO y aparici&#xf3;n de lenguajes multiparadigma (Java, Python).","children":[],"payload":{"tag":"li","lines":"1456,1457","listIndex":3}},{"content":"4. <strong>Actualidad</strong>: paradigmas funcionales, reactivos y concurrentes ganan relevancia en sistemas distribuidos, big data y aplicaciones modernas.","children":[],"payload":{"tag":"li","lines":"1457,1459","listIndex":4}}],"payload":{"tag":"ol","lines":"1454,1459"}},{"content":"","children":[{"content":"Permite <strong>elegir el enfoque m&#xe1;s adecuado</strong> para cada problema.","children":[],"payload":{"tag":"li","lines":"1461,1462"}},{"content":"Favorece la <strong>versatilidad del programador</strong> en distintos lenguajes y entornos.","children":[],"payload":{"tag":"li","lines":"1462,1463"}},{"content":"Mejora la <strong>calidad del software</strong> al aplicar principios de diferentes paradigmas.","children":[],"payload":{"tag":"li","lines":"1463,1464"}},{"content":"Facilita la <strong>innovaci&#xf3;n</strong> al combinar estilos (ejemplo: lenguajes multiparadigma como Python, Scala o JavaScript).","children":[],"payload":{"tag":"li","lines":"1464,1465"}}],"payload":{"tag":"ul","lines":"1461,1465"}}],"payload":{"tag":"li","lines":"1424,1465"}},{"content":"\n<p data-lines=\"1465,1466\">Imperativa</p>\n<h2 data-lines=\"1467,1468\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1469,1472\">La <strong>programaci&#xf3;n imperativa</strong> es un paradigma de programaci&#xf3;n en el que las instrucciones se ejecutan de manera secuencial, indicando <strong>c&#xf3;mo</strong> debe realizarse cada operaci&#xf3;n paso a paso.<br>\nSe basa en modificar el estado del programa mediante <strong>sentencias, asignaciones y estructuras de control</strong>.<br>\nEs uno de los paradigmas m&#xe1;s antiguos y ampliamente utilizados, presente en lenguajes como C, Pascal, Java y Python (aunque estos tambi&#xe9;n soportan otros paradigmas).</p>\n<h2 data-lines=\"1473,1474\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Secuencialidad</strong>: las instrucciones se ejecutan en orden, una tras otra.","children":[],"payload":{"tag":"li","lines":"1475,1476"}},{"content":"<strong>Estado mutable</strong>: las variables pueden cambiar su valor durante la ejecuci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1476,1477"}},{"content":"<strong>Uso de estructuras de control</strong>: condicionales (<code>if</code>, <code>switch</code>) y bucles (<code>for</code>, <code>while</code>).","children":[],"payload":{"tag":"li","lines":"1477,1478"}},{"content":"<strong>Enfoque en el &#x201c;c&#xf3;mo&#x201d;</strong>: el programador especifica los pasos exactos para resolver un problema.","children":[],"payload":{"tag":"li","lines":"1478,1479"}},{"content":"<strong>Modularidad</strong>: se pueden organizar instrucciones en funciones o procedimientos.","children":[],"payload":{"tag":"li","lines":"1479,1480"}},{"content":"<strong>Cercan&#xed;a al hardware</strong>: refleja el funcionamiento de la m&#xe1;quina (memoria, registros, instrucciones).","children":[],"payload":{"tag":"li","lines":"1480,1482"}}],"payload":{"tag":"ul","lines":"1475,1482"}},{"content":"","children":[{"content":"<strong>Variables</strong>: almacenan datos que pueden cambiar durante la ejecuci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1484,1485"}},{"content":"<strong>Operadores</strong>: realizan operaciones aritm&#xe9;ticas, l&#xf3;gicas o de asignaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1485,1486"}},{"content":"<strong>Estructuras de control</strong>: permiten tomar decisiones y repetir bloques de c&#xf3;digo.","children":[],"payload":{"tag":"li","lines":"1486,1487"}},{"content":"<strong>Funciones o procedimientos</strong>: agrupan instrucciones para reutilizaci&#xf3;n y organizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1487,1488"}},{"content":"<strong>Estado del programa</strong>: conjunto de valores de las variables en un momento dado.","children":[],"payload":{"tag":"li","lines":"1488,1490"}}],"payload":{"tag":"ul","lines":"1484,1490"}},{"content":"","children":[{"content":"<strong>Simplicidad conceptual</strong>: f&#xe1;cil de entender para principiantes, ya que sigue la l&#xf3;gica paso a paso.","children":[],"payload":{"tag":"li","lines":"1492,1493"}},{"content":"<strong>Amplia disponibilidad</strong>: la mayor&#xed;a de los lenguajes soportan este paradigma.","children":[],"payload":{"tag":"li","lines":"1493,1494"}},{"content":"<strong>Eficiencia</strong>: permite un control detallado sobre el flujo y el uso de recursos.","children":[],"payload":{"tag":"li","lines":"1494,1495"}},{"content":"<strong>Flexibilidad</strong>: adecuado para problemas donde se requiere manipulaci&#xf3;n directa del estado.","children":[],"payload":{"tag":"li","lines":"1495,1496"}},{"content":"<strong>Compatibilidad</strong>: se integra f&#xe1;cilmente con otros paradigmas (ejemplo: programaci&#xf3;n orientada a objetos).","children":[],"payload":{"tag":"li","lines":"1496,1498"}}],"payload":{"tag":"ul","lines":"1492,1498"}},{"content":"","children":[{"content":"<strong>Complejidad en programas grandes</strong>: el manejo de estados mutables puede generar errores dif&#xed;ciles de rastrear.","children":[],"payload":{"tag":"li","lines":"1500,1501"}},{"content":"<strong>Menor expresividad</strong>: comparado con paradigmas declarativos (como funcional o l&#xf3;gico), requiere m&#xe1;s l&#xed;neas de c&#xf3;digo para expresar una idea.","children":[],"payload":{"tag":"li","lines":"1501,1502"}},{"content":"<strong>Mantenibilidad</strong>: el c&#xf3;digo puede volverse dif&#xed;cil de mantener si no se organiza bien.","children":[],"payload":{"tag":"li","lines":"1502,1503"}},{"content":"<strong>Dependencia del orden de ejecuci&#xf3;n</strong>: cambios en el flujo pueden afectar todo el programa.","children":[],"payload":{"tag":"li","lines":"1503,1504"}},{"content":"<strong>Uso t&#xed;pico</strong>: sistemas operativos, aplicaciones de bajo nivel, algoritmos que requieren control detallado del hardware.","children":[],"payload":{"tag":"li","lines":"1504,1505"}}],"payload":{"tag":"ul","lines":"1500,1505"}}],"payload":{"tag":"li","lines":"1465,1505"}},{"content":"\n<p data-lines=\"1505,1506\">Declarativa</p>\n<h2 data-lines=\"1507,1508\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1509,1512\">La <strong>programaci&#xf3;n declarativa</strong> es un paradigma en el que el programador especifica <strong>qu&#xe9; resultado desea obtener</strong>, sin indicar expl&#xed;citamente los pasos para lograrlo.<br>\nA diferencia de la programaci&#xf3;n imperativa (que se centra en el <em>c&#xf3;mo</em>), la declarativa se centra en el <em>qu&#xe9;</em>.<br>\nEjemplos de lenguajes y enfoques declarativos incluyen <strong>SQL</strong> (consultas de bases de datos), <strong>HTML</strong> (estructuraci&#xf3;n de p&#xe1;ginas web), lenguajes funcionales como <strong>Haskell</strong>, y lenguajes l&#xf3;gicos como <strong>Prolog</strong>.</p>\n<h2 data-lines=\"1513,1514\">&#x1f539; Caracter&#xed;sticas</h2>","children":[{"content":"","children":[{"content":"<strong>Enfoque en el resultado</strong>: describe el objetivo, no el procedimiento.","children":[],"payload":{"tag":"li","lines":"1515,1516"}},{"content":"<strong>Menor control del flujo</strong>: el programador no gestiona directamente bucles o estados.","children":[],"payload":{"tag":"li","lines":"1516,1517"}},{"content":"<strong>Abstracci&#xf3;n</strong>: se ocultan los detalles de implementaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1517,1518"}},{"content":"<strong>Expresividad</strong>: permite escribir menos c&#xf3;digo para expresar operaciones complejas.","children":[],"payload":{"tag":"li","lines":"1518,1519"}},{"content":"<strong>Paradigmas asociados</strong>: programaci&#xf3;n funcional y l&#xf3;gica.","children":[],"payload":{"tag":"li","lines":"1519,1520"}},{"content":"<strong>Orientada a reglas y expresiones</strong>: se basa en definiciones, condiciones y relaciones.","children":[],"payload":{"tag":"li","lines":"1520,1522"}}],"payload":{"tag":"ul","lines":"1515,1522"}},{"content":"","children":[{"content":"<strong>Expresiones</strong>: definen relaciones o resultados esperados.","children":[],"payload":{"tag":"li","lines":"1524,1525"}},{"content":"<strong>Reglas</strong>: establecen condiciones que deben cumplirse.","children":[],"payload":{"tag":"li","lines":"1525,1526"}},{"content":"<strong>Consultas</strong>: permiten obtener informaci&#xf3;n de un sistema (ejemplo: SQL).","children":[],"payload":{"tag":"li","lines":"1526,1527"}},{"content":"<strong>Funciones puras</strong> (en programaci&#xf3;n funcional): producen resultados sin efectos secundarios.","children":[],"payload":{"tag":"li","lines":"1527,1528"}},{"content":"<strong>Declaraciones de estructura</strong>: como HTML o XML, que describen contenido y organizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1528,1530"}}],"payload":{"tag":"ul","lines":"1524,1530"}},{"content":"","children":[{"content":"<strong>Simplicidad</strong>: el c&#xf3;digo suele ser m&#xe1;s corto y f&#xe1;cil de leer.","children":[],"payload":{"tag":"li","lines":"1532,1533"}},{"content":"<strong>Mantenibilidad</strong>: al centrarse en el <em>qu&#xe9;</em>, es m&#xe1;s f&#xe1;cil modificar reglas o expresiones.","children":[],"payload":{"tag":"li","lines":"1533,1534"}},{"content":"<strong>Menos errores</strong>: al no gestionar directamente el estado mutable, se reducen fallos comunes.","children":[],"payload":{"tag":"li","lines":"1534,1535"}},{"content":"<strong>Productividad</strong>: permite resolver problemas complejos con menos esfuerzo.","children":[],"payload":{"tag":"li","lines":"1535,1536"}},{"content":"<strong>Paralelizaci&#xf3;n natural</strong>: muchos lenguajes declarativos se adaptan bien a la ejecuci&#xf3;n concurrente.","children":[],"payload":{"tag":"li","lines":"1536,1538"}}],"payload":{"tag":"ul","lines":"1532,1538"}},{"content":"","children":[{"content":"<strong>Menor control</strong>: el programador no define los pasos exactos, lo que puede ser una limitaci&#xf3;n en ciertos casos.","children":[],"payload":{"tag":"li","lines":"1540,1541"}},{"content":"<strong>Curva de aprendizaje</strong>: puede resultar dif&#xed;cil para quienes vienen de paradigmas imperativos.","children":[],"payload":{"tag":"li","lines":"1541,1542"}},{"content":"<strong>Rendimiento</strong>: depende de la implementaci&#xf3;n del lenguaje o motor subyacente.","children":[],"payload":{"tag":"li","lines":"1542,1543"}},{"content":"<strong>Aplicaci&#xf3;n limitada</strong>: no siempre es adecuado para tareas que requieren control detallado del hardware o del flujo.","children":[],"payload":{"tag":"li","lines":"1543,1544"}},{"content":"<strong>Uso t&#xed;pico</strong>: consultas de bases de datos, definici&#xf3;n de interfaces, programaci&#xf3;n funcional y l&#xf3;gica.","children":[],"payload":{"tag":"li","lines":"1544,1545"}}],"payload":{"tag":"ul","lines":"1540,1545"}}],"payload":{"tag":"li","lines":"1505,1545"}},{"content":"\n<p data-lines=\"1545,1546\">Funcional</p>\n<h2 data-lines=\"1547,1548\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1549,1552\">La <strong>programaci&#xf3;n funcional</strong> es un paradigma de programaci&#xf3;n basado en el uso de <strong>funciones matem&#xe1;ticas puras</strong> como bloques principales de construcci&#xf3;n.<br>\nSe centra en describir <strong>qu&#xe9; se quiere calcular</strong> en lugar de <strong>c&#xf3;mo hacerlo paso a paso</strong>, evitando estados mutables y efectos secundarios.<br>\nLenguajes representativos: <strong>Haskell, Lisp, Erlang, Scala, F#, OCaml</strong>, aunque lenguajes multiparadigma como <strong>Python o JavaScript</strong> tambi&#xe9;n soportan programaci&#xf3;n funcional.</p>\n<h2 data-lines=\"1553,1554\">&#x1f539; Caracter&#xed;sticas</h2>","children":[{"content":"","children":[{"content":"<strong>Funciones puras</strong>: siempre producen el mismo resultado para los mismos argumentos, sin efectos secundarios.","children":[],"payload":{"tag":"li","lines":"1555,1556"}},{"content":"<strong>Inmutabilidad</strong>: las variables no cambian su valor una vez asignadas.","children":[],"payload":{"tag":"li","lines":"1556,1557"}},{"content":"<strong>Expresividad</strong>: se utilizan funciones de orden superior, composici&#xf3;n y recursi&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1557,1558"}},{"content":"<strong>Declaratividad</strong>: describe el <em>qu&#xe9;</em> en lugar del <em>c&#xf3;mo</em>.","children":[],"payload":{"tag":"li","lines":"1558,1559"}},{"content":"<strong>Evaluaci&#xf3;n perezosa (lazy evaluation)</strong>: los c&#xe1;lculos se realizan solo cuando son necesarios (en algunos lenguajes).","children":[],"payload":{"tag":"li","lines":"1559,1560"}},{"content":"<strong>Paralelizaci&#xf3;n natural</strong>: al no depender de estados compartidos, facilita la ejecuci&#xf3;n concurrente.","children":[],"payload":{"tag":"li","lines":"1560,1562"}}],"payload":{"tag":"ul","lines":"1555,1562"}},{"content":"","children":[{"content":"<strong>Funciones de orden superior</strong>: reciben funciones como par&#xe1;metros o devuelven funciones como resultado.","children":[],"payload":{"tag":"li","lines":"1564,1565"}},{"content":"<strong>Composici&#xf3;n de funciones</strong>: combinar funciones peque&#xf1;as para formar operaciones m&#xe1;s complejas.","children":[],"payload":{"tag":"li","lines":"1565,1566"}},{"content":"<strong>Recursi&#xf3;n</strong>: reemplaza bucles tradicionales mediante llamadas repetidas a funciones.","children":[],"payload":{"tag":"li","lines":"1566,1567"}},{"content":"<strong>Expresiones lambda</strong>: funciones an&#xf3;nimas que se definen en l&#xed;nea.","children":[],"payload":{"tag":"li","lines":"1567,1568"}},{"content":"<strong>Tipos algebraicos de datos</strong>: estructuras que permiten modelar datos de forma expresiva (ejemplo: <code>Maybe</code>, <code>Either</code> en Haskell).","children":[],"payload":{"tag":"li","lines":"1568,1569"}},{"content":"<strong>Map, Filter, Reduce</strong>: operaciones fundamentales para transformar colecciones de datos.","children":[],"payload":{"tag":"li","lines":"1569,1571"}}],"payload":{"tag":"ul","lines":"1564,1571"}},{"content":"","children":[{"content":"<strong>C&#xf3;digo m&#xe1;s conciso y expresivo</strong>: menos l&#xed;neas para expresar operaciones complejas.","children":[],"payload":{"tag":"li","lines":"1573,1574"}},{"content":"<strong>Facilidad de pruebas</strong>: las funciones puras son m&#xe1;s f&#xe1;ciles de testear.","children":[],"payload":{"tag":"li","lines":"1574,1575"}},{"content":"<strong>Menos errores</strong>: al evitar estados mutables y efectos secundarios.","children":[],"payload":{"tag":"li","lines":"1575,1576"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: funciones peque&#xf1;as y gen&#xe9;ricas pueden combinarse en distintos contextos.","children":[],"payload":{"tag":"li","lines":"1576,1577"}},{"content":"<strong>Paralelismo y concurrencia</strong>: m&#xe1;s sencillo de implementar por la ausencia de estados compartidos.","children":[],"payload":{"tag":"li","lines":"1577,1578"}},{"content":"<strong>Mantenibilidad</strong>: c&#xf3;digo m&#xe1;s modular y f&#xe1;cil de extender.","children":[],"payload":{"tag":"li","lines":"1578,1580"}}],"payload":{"tag":"ul","lines":"1573,1580"}},{"content":"","children":[{"content":"<strong>Curva de aprendizaje</strong>: puede resultar dif&#xed;cil para quienes vienen de paradigmas imperativos.","children":[],"payload":{"tag":"li","lines":"1582,1583"}},{"content":"<strong>Rendimiento</strong>: algunas operaciones funcionales pueden ser menos eficientes que las imperativas si no se optimizan.","children":[],"payload":{"tag":"li","lines":"1583,1584"}},{"content":"<strong>Legibilidad</strong>: el uso intensivo de funciones an&#xf3;nimas y composici&#xf3;n puede dificultar la comprensi&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1584,1585"}},{"content":"<strong>Aplicaci&#xf3;n pr&#xe1;ctica</strong>: no siempre es el paradigma m&#xe1;s adecuado para problemas que requieren control detallado del hardware o del flujo.","children":[],"payload":{"tag":"li","lines":"1585,1586"}},{"content":"<strong>Uso t&#xed;pico</strong>","children":[],"payload":{"tag":"li","lines":"1586,1587"}}],"payload":{"tag":"ul","lines":"1582,1587"}}],"payload":{"tag":"li","lines":"1545,1587"}},{"content":"\n<p data-lines=\"1587,1588\">Orientada a objetos</p>\n<h2 data-lines=\"1589,1590\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1591,1594\">La <strong>Programaci&#xf3;n Orientada a Objetos (POO)</strong> es un paradigma de programaci&#xf3;n que organiza el software en torno a <strong>objetos</strong>, los cuales combinan <strong>datos (atributos)</strong> y <strong>comportamientos (m&#xe9;todos)</strong>.<br>\nSu objetivo es modelar sistemas de manera m&#xe1;s cercana al mundo real, facilitando la reutilizaci&#xf3;n, modularidad y mantenibilidad del c&#xf3;digo.<br>\nLenguajes representativos: <strong>Java, C++, Python, C#, Ruby, PHP</strong>.</p>\n<h2 data-lines=\"1595,1596\">&#x1f539; Caracter&#xed;sticas</h2>","children":[{"content":"","children":[{"content":"<strong>Abstracci&#xf3;n</strong>: permite representar conceptos complejos mediante clases y objetos simplificados.","children":[],"payload":{"tag":"li","lines":"1597,1598"}},{"content":"<strong>Encapsulamiento</strong>: protege los datos internos de un objeto, exponiendo solo lo necesario mediante interfaces.","children":[],"payload":{"tag":"li","lines":"1598,1599"}},{"content":"<strong>Herencia</strong>: posibilita que una clase derive de otra, reutilizando y extendiendo funcionalidades.","children":[],"payload":{"tag":"li","lines":"1599,1600"}},{"content":"<strong>Polimorfismo</strong>: permite que diferentes clases respondan de manera distinta a un mismo m&#xe9;todo o mensaje.","children":[],"payload":{"tag":"li","lines":"1600,1601"}},{"content":"<strong>Modularidad</strong>: el sistema se divide en objetos independientes que interact&#xfa;an entre s&#xed;.","children":[],"payload":{"tag":"li","lines":"1601,1602"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: fomenta el uso de clases y m&#xe9;todos en distintos contextos.","children":[],"payload":{"tag":"li","lines":"1602,1604"}}],"payload":{"tag":"ul","lines":"1597,1604"}},{"content":"","children":[{"content":"<strong>Clase</strong>: plantilla que define atributos y m&#xe9;todos de un objeto.","children":[],"payload":{"tag":"li","lines":"1606,1607"}},{"content":"<strong>Objeto</strong>: instancia concreta de una clase.","children":[],"payload":{"tag":"li","lines":"1607,1608"}},{"content":"<strong>Atributos</strong>: variables que representan el estado del objeto.","children":[],"payload":{"tag":"li","lines":"1608,1609"}},{"content":"<strong>M&#xe9;todos</strong>: funciones que definen el comportamiento del objeto.","children":[],"payload":{"tag":"li","lines":"1609,1610"}},{"content":"<strong>Constructores</strong>: inicializan objetos al momento de su creaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1610,1611"}},{"content":"<strong>Interfaces</strong>: contratos que definen m&#xe9;todos que deben implementarse en las clases.","children":[],"payload":{"tag":"li","lines":"1611,1612"}},{"content":"<strong>Relaciones entre clases</strong>: herencia, composici&#xf3;n y agregaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1612,1614"}}],"payload":{"tag":"ul","lines":"1606,1614"}},{"content":"","children":[{"content":"<strong>Mantenibilidad</strong>: facilita localizar y corregir errores gracias a la modularidad.","children":[],"payload":{"tag":"li","lines":"1616,1617"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: clases y objetos pueden emplearse en diferentes proyectos.","children":[],"payload":{"tag":"li","lines":"1617,1618"}},{"content":"<strong>Escalabilidad</strong>: permite construir sistemas grandes y complejos de manera organizada.","children":[],"payload":{"tag":"li","lines":"1618,1619"}},{"content":"<strong>Flexibilidad</strong>: polimorfismo y herencia permiten adaptar y extender funcionalidades.","children":[],"payload":{"tag":"li","lines":"1619,1620"}},{"content":"<strong>Cercan&#xed;a al mundo real</strong>: modela entidades y relaciones de forma intuitiva.","children":[],"payload":{"tag":"li","lines":"1620,1621"}},{"content":"<strong>Colaboraci&#xf3;n</strong>: facilita el trabajo en equipo gracias a la divisi&#xf3;n en m&#xf3;dulos.","children":[],"payload":{"tag":"li","lines":"1621,1623"}}],"payload":{"tag":"ul","lines":"1616,1623"}},{"content":"","children":[{"content":"<strong>Curva de aprendizaje</strong>: puede resultar m&#xe1;s compleja que paradigmas como el imperativo.","children":[],"payload":{"tag":"li","lines":"1625,1626"}},{"content":"<strong>Sobrecarga de dise&#xf1;o</strong>: un exceso de abstracci&#xf3;n puede complicar el sistema.","children":[],"payload":{"tag":"li","lines":"1626,1627"}},{"content":"<strong>Rendimiento</strong>: la orientaci&#xf3;n a objetos puede ser menos eficiente que enfoques m&#xe1;s directos en aplicaciones cr&#xed;ticas.","children":[],"payload":{"tag":"li","lines":"1627,1628"}},{"content":"<strong>Mala implementaci&#xf3;n</strong>: si no se aplican correctamente los principios, el c&#xf3;digo puede volverse r&#xed;gido y dif&#xed;cil de mantener.","children":[],"payload":{"tag":"li","lines":"1628,1629"}},{"content":"<strong>Uso t&#xed;pico</strong>: aplicaciones empresariales, videojuegos, sistemas distribuidos y software de gran escala.","children":[],"payload":{"tag":"li","lines":"1629,1630"}}],"payload":{"tag":"ul","lines":"1625,1630"}}],"payload":{"tag":"li","lines":"1587,1630"}},{"content":"\n<p data-lines=\"1630,1631\">L&#xf3;gica</p>\n<h2 data-lines=\"1632,1633\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1634,1637\">La <strong>programaci&#xf3;n l&#xf3;gica</strong> es un paradigma de programaci&#xf3;n basado en la <strong>l&#xf3;gica matem&#xe1;tica y el razonamiento declarativo</strong>.<br>\nEn lugar de indicar c&#xf3;mo realizar una tarea paso a paso, el programador define <strong>hechos, reglas y consultas</strong> que describen el problema, y el sistema utiliza mecanismos de inferencia para encontrar soluciones.<br>\nLenguaje representativo: <strong>Prolog (Programming in Logic)</strong>, ampliamente usado en inteligencia artificial y sistemas expertos.</p>\n<h2 data-lines=\"1638,1639\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Declarativa</strong>: el programador describe el problema en t&#xe9;rminos de l&#xf3;gica, no el procedimiento.","children":[],"payload":{"tag":"li","lines":"1640,1641"}},{"content":"<strong>Basada en hechos y reglas</strong>: el conocimiento se expresa mediante relaciones l&#xf3;gicas.","children":[],"payload":{"tag":"li","lines":"1641,1642"}},{"content":"<strong>Inferencia autom&#xe1;tica</strong>: el motor l&#xf3;gico deduce respuestas a partir de las reglas definidas.","children":[],"payload":{"tag":"li","lines":"1642,1643"}},{"content":"<strong>Uso de predicados</strong>: funciones l&#xf3;gicas que representan relaciones entre objetos.","children":[],"payload":{"tag":"li","lines":"1643,1644"}},{"content":"<strong>No secuencial</strong>: el orden de las instrucciones no es relevante, lo importante son las relaciones.","children":[],"payload":{"tag":"li","lines":"1644,1645"}},{"content":"<strong>Aplicaci&#xf3;n en IA</strong>: muy utilizada en sistemas expertos, razonamiento autom&#xe1;tico y procesamiento de lenguaje natural.","children":[],"payload":{"tag":"li","lines":"1645,1647"}}],"payload":{"tag":"ul","lines":"1640,1647"}},{"content":"","children":[{"content":"<strong>Hechos</strong>: representan informaci&#xf3;n conocida del dominio (ejemplo: <code>padre(juan, maria).</code>).","children":[],"payload":{"tag":"li","lines":"1649,1650"}},{"content":"<strong>Reglas</strong>: definen relaciones y condiciones (ejemplo: <code>abuelo(X, Y) :- padre(X, Z), padre(Z, Y).</code>).","children":[],"payload":{"tag":"li","lines":"1650,1651"}},{"content":"<strong>Consultas</strong>: preguntas que el usuario realiza al sistema (ejemplo: <code>?- abuelo(juan, maria).</code>).","children":[],"payload":{"tag":"li","lines":"1651,1652"}},{"content":"<strong>Motor de inferencia</strong>: mecanismo que eval&#xfa;a hechos y reglas para responder consultas.","children":[],"payload":{"tag":"li","lines":"1652,1653"}},{"content":"<strong>Predicados</strong>: expresiones l&#xf3;gicas que describen propiedades o relaciones.","children":[],"payload":{"tag":"li","lines":"1653,1655"}}],"payload":{"tag":"ul","lines":"1649,1655"}},{"content":"","children":[{"content":"<strong>Expresividad</strong>: permite describir problemas complejos de manera sencilla y l&#xf3;gica.","children":[],"payload":{"tag":"li","lines":"1657,1658"}},{"content":"<strong>Automatizaci&#xf3;n del razonamiento</strong>: el sistema deduce soluciones sin necesidad de instrucciones detalladas.","children":[],"payload":{"tag":"li","lines":"1658,1659"}},{"content":"<strong>Flexibilidad</strong>: f&#xe1;cil de extender a&#xf1;adiendo nuevos hechos y reglas.","children":[],"payload":{"tag":"li","lines":"1659,1660"}},{"content":"<strong>Aplicaciones en IA</strong>: &#xfa;til en sistemas expertos, planificaci&#xf3;n, resoluci&#xf3;n de problemas y NLP.","children":[],"payload":{"tag":"li","lines":"1660,1661"}},{"content":"<strong>Menos errores de flujo</strong>: al no depender de estados mutables ni secuencias de ejecuci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1661,1663"}}],"payload":{"tag":"ul","lines":"1657,1663"}},{"content":"","children":[{"content":"<strong>Curva de aprendizaje</strong>: puede resultar dif&#xed;cil para quienes vienen de paradigmas imperativos u orientados a objetos.","children":[],"payload":{"tag":"li","lines":"1665,1666"}},{"content":"<strong>Rendimiento</strong>: la inferencia l&#xf3;gica puede ser costosa en problemas grandes.","children":[],"payload":{"tag":"li","lines":"1666,1667"}},{"content":"<strong>Legibilidad</strong>: reglas complejas pueden volverse dif&#xed;ciles de entender y mantener.","children":[],"payload":{"tag":"li","lines":"1667,1668"}},{"content":"<strong>Aplicaci&#xf3;n limitada</strong>: no siempre es adecuada para sistemas que requieren control detallado del hardware o alto rendimiento.","children":[],"payload":{"tag":"li","lines":"1668,1669"}},{"content":"<strong>Uso t&#xed;pico</strong>: inteligencia artificial, sistemas expertos, razonamiento autom&#xe1;tico, verificaci&#xf3;n de conocimiento y procesamiento de lenguaje natural.","children":[],"payload":{"tag":"li","lines":"1669,1670"}}],"payload":{"tag":"ul","lines":"1665,1670"}}],"payload":{"tag":"li","lines":"1630,1670"}},{"content":"\n<p data-lines=\"1670,1671\">Basada en componentes</p>\n<h2 data-lines=\"1672,1673\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1674,1676\">La <strong>programaci&#xf3;n basada en componentes</strong> es un paradigma que organiza el software en <strong>unidades modulares reutilizables llamadas componentes</strong>, cada una con una funcionalidad espec&#xed;fica y bien definida.<br>\nEl objetivo es construir aplicaciones complejas a partir de piezas independientes que puedan integrarse f&#xe1;cilmente, favoreciendo la reutilizaci&#xf3;n y la mantenibilidad.</p>\n<h2 data-lines=\"1677,1678\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Modularidad</strong>: el sistema se divide en componentes con responsabilidades claras.","children":[],"payload":{"tag":"li","lines":"1679,1680"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: los componentes pueden emplearse en diferentes aplicaciones o proyectos.","children":[],"payload":{"tag":"li","lines":"1680,1681"}},{"content":"<strong>Encapsulamiento</strong>: cada componente oculta su implementaci&#xf3;n interna y expone solo interfaces p&#xfa;blicas.","children":[],"payload":{"tag":"li","lines":"1681,1682"}},{"content":"<strong>Interoperabilidad</strong>: los componentes se comunican mediante interfaces bien definidas.","children":[],"payload":{"tag":"li","lines":"1682,1683"}},{"content":"<strong>Flexibilidad tecnol&#xf3;gica</strong>: los componentes pueden desarrollarse en distintos lenguajes o plataformas.","children":[],"payload":{"tag":"li","lines":"1683,1684"}},{"content":"<strong>Escalabilidad</strong>: facilita la evoluci&#xf3;n del sistema a&#xf1;adiendo o reemplazando componentes.","children":[],"payload":{"tag":"li","lines":"1684,1686"}}],"payload":{"tag":"ul","lines":"1679,1686"}},{"content":"","children":[{"content":"<strong>Componentes funcionales</strong>: implementan funcionalidades espec&#xed;ficas del negocio (ejemplo: gesti&#xf3;n de usuarios, procesamiento de pagos).","children":[],"payload":{"tag":"li","lines":"1688,1689"}},{"content":"<strong>Interfaces</strong>: definen c&#xf3;mo los componentes interact&#xfa;an entre s&#xed;, asegurando compatibilidad.","children":[],"payload":{"tag":"li","lines":"1689,1690"}},{"content":"<strong>Conectores</strong>: mecanismos que permiten la comunicaci&#xf3;n entre componentes (ejemplo: APIs, servicios web, middleware).","children":[],"payload":{"tag":"li","lines":"1690,1691"}},{"content":"<strong>Contenedores</strong>: entornos que alojan y gestionan los componentes (ejemplo: frameworks, servidores de aplicaciones).","children":[],"payload":{"tag":"li","lines":"1691,1692"}},{"content":"<strong>Bibliotecas de componentes</strong>: repositorios donde se almacenan y gestionan componentes reutilizables.","children":[],"payload":{"tag":"li","lines":"1692,1694"}}],"payload":{"tag":"ul","lines":"1688,1694"}},{"content":"","children":[{"content":"<strong>Mantenibilidad</strong>: los cambios se realizan en componentes espec&#xed;ficos sin afectar al resto del sistema.","children":[],"payload":{"tag":"li","lines":"1696,1697"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: se pueden aprovechar componentes ya desarrollados en nuevos proyectos.","children":[],"payload":{"tag":"li","lines":"1697,1698"}},{"content":"<strong>Escalabilidad</strong>: permite a&#xf1;adir nuevas funcionalidades sin redise&#xf1;ar toda la aplicaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1698,1699"}},{"content":"<strong>Flexibilidad</strong>: facilita la integraci&#xf3;n con diferentes tecnolog&#xed;as y plataformas.","children":[],"payload":{"tag":"li","lines":"1699,1700"}},{"content":"<strong>Reducci&#xf3;n de costes</strong>: al reutilizar componentes, se disminuye el esfuerzo de desarrollo.","children":[],"payload":{"tag":"li","lines":"1700,1702"}}],"payload":{"tag":"ul","lines":"1696,1702"}},{"content":"","children":[{"content":"<strong>Complejidad de integraci&#xf3;n</strong>: requiere una buena definici&#xf3;n de interfaces para evitar incompatibilidades.","children":[],"payload":{"tag":"li","lines":"1704,1705"}},{"content":"<strong>Gesti&#xf3;n de dependencias</strong>: los componentes deben dise&#xf1;arse para minimizar acoplamientos.","children":[],"payload":{"tag":"li","lines":"1705,1706"}},{"content":"<strong>Sobrecarga inicial</strong>: dise&#xf1;ar componentes reutilizables puede requerir m&#xe1;s tiempo y esfuerzo.","children":[],"payload":{"tag":"li","lines":"1706,1707"}},{"content":"<strong>Rendimiento</strong>: la comunicaci&#xf3;n entre componentes puede introducir latencia si no se optimiza.","children":[],"payload":{"tag":"li","lines":"1707,1708"}},{"content":"<strong>Uso t&#xed;pico</strong>: aplicaciones grandes, sistemas distribuidos y proyectos que requieren evoluci&#xf3;n constante.","children":[],"payload":{"tag":"li","lines":"1708,1709"}}],"payload":{"tag":"ul","lines":"1704,1709"}}],"payload":{"tag":"li","lines":"1670,1709"}},{"content":"\n<p data-lines=\"1709,1710\">Concurrente</p>\n<h2 data-lines=\"1711,1712\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1713,1715\">La <strong>programaci&#xf3;n concurrente</strong> es un paradigma que permite la <strong>ejecuci&#xf3;n simult&#xe1;nea de m&#xfa;ltiples tareas o procesos</strong>, compartiendo recursos y comunic&#xe1;ndose entre s&#xed;.<br>\nSu objetivo es mejorar el rendimiento y la eficiencia de los sistemas, especialmente en aplicaciones que deben manejar m&#xfa;ltiples operaciones al mismo tiempo, como servidores web, sistemas distribuidos o aplicaciones de tiempo real.</p>\n<h2 data-lines=\"1716,1717\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Ejecuci&#xf3;n simult&#xe1;nea</strong>: varios procesos o hilos pueden ejecutarse de manera concurrente.","children":[],"payload":{"tag":"li","lines":"1718,1719"}},{"content":"<strong>Compartici&#xf3;n de recursos</strong>: memoria, archivos y dispositivos pueden ser utilizados por m&#xfa;ltiples tareas.","children":[],"payload":{"tag":"li","lines":"1719,1720"}},{"content":"<strong>Sincronizaci&#xf3;n</strong>: se requieren mecanismos para coordinar el acceso a recursos compartidos.","children":[],"payload":{"tag":"li","lines":"1720,1721"}},{"content":"<strong>Paralelismo vs. concurrencia</strong>: la concurrencia organiza m&#xfa;ltiples tareas, mientras que el paralelismo las ejecuta f&#xed;sicamente al mismo tiempo en m&#xfa;ltiples n&#xfa;cleos.","children":[],"payload":{"tag":"li","lines":"1721,1722"}},{"content":"<strong>Escalabilidad</strong>: permite aprovechar mejor los sistemas multiprocesador y distribuidos.","children":[],"payload":{"tag":"li","lines":"1722,1723"}},{"content":"<strong>Complejidad</strong>: requiere un dise&#xf1;o cuidadoso para evitar errores como condiciones de carrera o bloqueos.","children":[],"payload":{"tag":"li","lines":"1723,1725"}}],"payload":{"tag":"ul","lines":"1718,1725"}},{"content":"","children":[{"content":"<strong>Multihilo (Multithreading)</strong>","children":[{"content":"Varias hebras de ejecuci&#xf3;n dentro de un mismo proceso.","children":[],"payload":{"tag":"li","lines":"1728,1729"}},{"content":"Ejemplo: aplicaciones Java con <code>Thread</code> o <code>ExecutorService</code>.","children":[],"payload":{"tag":"li","lines":"1729,1730"}}],"payload":{"tag":"li","lines":"1727,1730"}},{"content":"<strong>Procesos paralelos</strong>","children":[{"content":"Ejecuci&#xf3;n de m&#xfa;ltiples procesos independientes que pueden comunicarse mediante IPC (Inter-Process Communication).","children":[],"payload":{"tag":"li","lines":"1731,1732"}}],"payload":{"tag":"li","lines":"1730,1732"}},{"content":"<strong>Modelo de actores</strong>","children":[{"content":"Cada actor es una entidad independiente que procesa mensajes y responde.","children":[],"payload":{"tag":"li","lines":"1733,1734"}},{"content":"Ejemplo: frameworks como Akka en Scala.","children":[],"payload":{"tag":"li","lines":"1734,1735"}}],"payload":{"tag":"li","lines":"1732,1735"}},{"content":"<strong>Eventos y callbacks</strong>","children":[{"content":"Basado en la reacci&#xf3;n a eventos asincr&#xf3;nicos.","children":[],"payload":{"tag":"li","lines":"1736,1737"}},{"content":"Ejemplo: programaci&#xf3;n en JavaScript con <code>async/await</code> o Node.js..","children":[],"payload":{"tag":"li","lines":"1737,1738"}}],"payload":{"tag":"li","lines":"1735,1738"}},{"content":"<strong>Corutinas</strong>","children":[{"content":"Funciones que pueden suspenderse y reanudarse, facilitando la concurrencia cooperativa.","children":[],"payload":{"tag":"li","lines":"1739,1740"}},{"content":"Ejemplo: Python con <code>asyncio</code>, Kotlin con <code>coroutines</code>.","children":[],"payload":{"tag":"li","lines":"1740,1742"}}],"payload":{"tag":"li","lines":"1738,1742"}}],"payload":{"tag":"ul","lines":"1727,1742"}},{"content":"","children":[{"content":"<strong>Bloqueos (Locks, Mutex)</strong>: aseguran que solo un hilo acceda a un recurso a la vez.","children":[],"payload":{"tag":"li","lines":"1744,1745"}},{"content":"<strong>Sem&#xe1;foros</strong>: controlan el acceso a recursos limitados.","children":[],"payload":{"tag":"li","lines":"1745,1746"}},{"content":"<strong>Monitores</strong>: estructuras que combinan bloqueo y condici&#xf3;n para sincronizaci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1746,1747"}},{"content":"<strong>Barreras</strong>: sincronizan m&#xfa;ltiples hilos en un punto com&#xfa;n antes de continuar.","children":[],"payload":{"tag":"li","lines":"1747,1748"}},{"content":"<strong>Colas de mensajes</strong>: permiten comunicaci&#xf3;n segura entre procesos o hilos.","children":[],"payload":{"tag":"li","lines":"1748,1750"}}],"payload":{"tag":"ul","lines":"1744,1750"}},{"content":"","children":[{"content":"<strong>Mejor rendimiento</strong>: aprovecha m&#xfa;ltiples n&#xfa;cleos y recursos del sistema.","children":[],"payload":{"tag":"li","lines":"1752,1753"}},{"content":"<strong>Escalabilidad</strong>: adecuado para aplicaciones que manejan gran cantidad de usuarios o tareas simult&#xe1;neas.","children":[],"payload":{"tag":"li","lines":"1753,1754"}},{"content":"<strong>Responsividad</strong>: aplicaciones m&#xe1;s r&#xe1;pidas y reactivas.","children":[],"payload":{"tag":"li","lines":"1754,1755"}},{"content":"<strong>Flexibilidad</strong>: soporta distintos modelos de ejecuci&#xf3;n (hilos, actores, eventos).","children":[],"payload":{"tag":"li","lines":"1755,1756"}},{"content":"<strong>Uso en sistemas modernos</strong>: esencial en servidores web, videojuegos, sistemas distribuidos y aplicaciones m&#xf3;viles.","children":[],"payload":{"tag":"li","lines":"1756,1758"}}],"payload":{"tag":"ul","lines":"1752,1758"}},{"content":"","children":[{"content":"<strong>Complejidad</strong>: el dise&#xf1;o concurrente es m&#xe1;s dif&#xed;cil que el secuencial.","children":[],"payload":{"tag":"li","lines":"1760,1761"}},{"content":"<strong>Errores comunes</strong>: condiciones de carrera, bloqueos (deadlocks), inanici&#xf3;n (starvation).","children":[],"payload":{"tag":"li","lines":"1761,1762"}},{"content":"<strong>Sobrecarga de sincronizaci&#xf3;n</strong>: puede reducir el rendimiento si no se gestiona bien.","children":[],"payload":{"tag":"li","lines":"1762,1763"}},{"content":"<strong>Depuraci&#xf3;n dif&#xed;cil</strong>: los errores concurrentes suelen ser intermitentes y dif&#xed;ciles de reproducir.","children":[],"payload":{"tag":"li","lines":"1763,1764"}},{"content":"<strong>Uso t&#xed;pico</strong>: sistemas de tiempo real, servidores de alto rendimiento, aplicaciones distribuidas y procesamiento paralelo.","children":[],"payload":{"tag":"li","lines":"1764,1765"}}],"payload":{"tag":"ul","lines":"1760,1765"}}],"payload":{"tag":"li","lines":"1709,1765"}},{"content":"\n<p data-lines=\"1765,1766\">Reactiva</p>\n<h2 data-lines=\"1767,1768\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1769,1772\">La <strong>programaci&#xf3;n reactiva</strong> es un paradigma de programaci&#xf3;n orientado al manejo de <strong>flujos de datos as&#xed;ncronos</strong> y la propagaci&#xf3;n de cambios.<br>\nEn este enfoque, los sistemas reaccionan autom&#xe1;ticamente a eventos o modificaciones en los datos, lo que permite construir aplicaciones m&#xe1;s <strong>responsivas, escalables y resilientes</strong>.<br>\nLenguajes y librer&#xed;as representativas: <strong>ReactiveX (RxJava, RxJS, RxPython)</strong>, <strong>Project Reactor</strong>, <strong>Akka Streams</strong>.</p>\n<h2 data-lines=\"1773,1774\">&#x1f539; Caracter&#xed;sticas Principales</h2>","children":[{"content":"","children":[{"content":"<strong>Orientada a eventos</strong>: el sistema responde a cambios o est&#xed;mulos externos en tiempo real.","children":[],"payload":{"tag":"li","lines":"1775,1776"}},{"content":"<strong>Asincron&#xed;a</strong>: las operaciones no bloquean el flujo principal, mejorando la eficiencia.","children":[],"payload":{"tag":"li","lines":"1776,1777"}},{"content":"<strong>Flujos de datos</strong>: los datos se modelan como secuencias que pueden transformarse y combinarse.","children":[],"payload":{"tag":"li","lines":"1777,1778"}},{"content":"<strong>Propagaci&#xf3;n autom&#xe1;tica</strong>: los cambios en un flujo se transmiten a todos los componentes dependientes.","children":[],"payload":{"tag":"li","lines":"1778,1779"}},{"content":"<strong>Composici&#xf3;n funcional</strong>: se utilizan operadores como <code>map</code>, <code>filter</code>, <code>reduce</code> para transformar flujos.","children":[],"payload":{"tag":"li","lines":"1779,1780"}},{"content":"<strong>Resiliencia</strong>: maneja errores y fallos de manera m&#xe1;s controlada en sistemas distribuidos.","children":[],"payload":{"tag":"li","lines":"1780,1782"}}],"payload":{"tag":"ul","lines":"1775,1782"}},{"content":"","children":[{"content":"<strong>Publisher (Emisor)</strong>: genera y emite eventos o datos.","children":[],"payload":{"tag":"li","lines":"1784,1785"}},{"content":"<strong>Subscriber (Suscriptor)</strong>: recibe y procesa los datos emitidos.","children":[],"payload":{"tag":"li","lines":"1785,1786"}},{"content":"<strong>Operadores</strong>: transforman, filtran o combinan flujos de datos (ejemplo: <code>map</code>, <code>flatMap</code>).","children":[],"payload":{"tag":"li","lines":"1786,1787"}},{"content":"<strong>Scheduler</strong>: gestiona la ejecuci&#xf3;n de tareas en distintos hilos o contextos.","children":[],"payload":{"tag":"li","lines":"1787,1788"}},{"content":"<strong>Streams (Flujos)</strong>: secuencias de datos que pueden ser infinitas o finitas.","children":[],"payload":{"tag":"li","lines":"1788,1789"}},{"content":"<strong>Backpressure</strong>: mecanismo para controlar la velocidad de emisi&#xf3;n y evitar saturaci&#xf3;n de consumidores.","children":[],"payload":{"tag":"li","lines":"1789,1791"}}],"payload":{"tag":"ul","lines":"1784,1791"}},{"content":"","children":[{"content":"<strong>Responsividad</strong>: aplicaciones m&#xe1;s r&#xe1;pidas y reactivas frente a cambios.","children":[],"payload":{"tag":"li","lines":"1793,1794"}},{"content":"<strong>Escalabilidad</strong>: adecuada para sistemas distribuidos y de alta concurrencia.","children":[],"payload":{"tag":"li","lines":"1794,1795"}},{"content":"<strong>Eficiencia</strong>: aprovecha mejor los recursos al trabajar de forma as&#xed;ncrona.","children":[],"payload":{"tag":"li","lines":"1795,1796"}},{"content":"<strong>Mantenibilidad</strong>: c&#xf3;digo m&#xe1;s declarativo y expresivo.","children":[],"payload":{"tag":"li","lines":"1796,1797"}},{"content":"<strong>Resiliencia</strong>: mejor manejo de errores y fallos en tiempo real.","children":[],"payload":{"tag":"li","lines":"1797,1798"}},{"content":"<strong>Flexibilidad</strong>: se adapta a diferentes entornos (web, m&#xf3;vil, backend, IoT).","children":[],"payload":{"tag":"li","lines":"1798,1800"}}],"payload":{"tag":"ul","lines":"1793,1800"}},{"content":"","children":[{"content":"<strong>Curva de aprendizaje</strong>: puede resultar compleja para quienes vienen de paradigmas imperativos.","children":[],"payload":{"tag":"li","lines":"1802,1803"}},{"content":"<strong>Depuraci&#xf3;n dif&#xed;cil</strong>: los flujos as&#xed;ncronos pueden complicar la identificaci&#xf3;n de errores.","children":[],"payload":{"tag":"li","lines":"1803,1804"}},{"content":"<strong>Sobrecarga conceptual</strong>: requiere entender operadores, suscripciones y propagaci&#xf3;n de eventos.","children":[],"payload":{"tag":"li","lines":"1804,1805"}},{"content":"<strong>Rendimiento</strong>: aunque eficiente, un mal dise&#xf1;o puede generar cuellos de botella.","children":[],"payload":{"tag":"li","lines":"1805,1806"}},{"content":"<strong>Uso adecuado</strong>: m&#xe1;s &#xfa;til en sistemas con alta concurrencia o interacci&#xf3;n en tiempo real.","children":[],"payload":{"tag":"li","lines":"1806,1808"}}],"payload":{"tag":"ul","lines":"1802,1808"}},{"content":"","children":[{"content":"<strong>Interfaces de usuario din&#xe1;micas</strong>: aplicaciones web y m&#xf3;viles que reaccionan a eventos del usuario.","children":[],"payload":{"tag":"li","lines":"1810,1811"}},{"content":"<strong>Sistemas de streaming</strong>: plataformas de video, m&#xfa;sica o datos en tiempo real.","children":[],"payload":{"tag":"li","lines":"1811,1812"}},{"content":"<strong>IoT (Internet of Things)</strong>: dispositivos que generan y procesan eventos continuamente.","children":[],"payload":{"tag":"li","lines":"1812,1813"}},{"content":"<strong>Procesamiento de datos en tiempo real</strong>: an&#xe1;lisis de logs, monitoreo de sistemas, big data.","children":[],"payload":{"tag":"li","lines":"1813,1814"}},{"content":"<strong>Microservicios</strong>: comunicaci&#xf3;n eficiente y resiliente entre servicios distribuidos.","children":[],"payload":{"tag":"li","lines":"1814,1815"}},{"content":"<strong>Aplicaciones financieras</strong>","children":[],"payload":{"tag":"li","lines":"1815,1816"}}],"payload":{"tag":"ul","lines":"1810,1816"}}],"payload":{"tag":"li","lines":"1765,1816"}},{"content":"\n<p data-lines=\"1816,1817\">Basada en eventos</p>\n<h2 data-lines=\"1818,1819\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1820,1822\">La <strong>programaci&#xf3;n basada en eventos</strong> es un paradigma en el que el flujo de ejecuci&#xf3;n de un programa est&#xe1; determinado por <strong>eventos externos o internos</strong>, como acciones del usuario, mensajes de otros sistemas o cambios en el estado de la aplicaci&#xf3;n.<br>\nEn lugar de ejecutar instrucciones de manera secuencial, el sistema <strong>reacciona a eventos</strong> mediante manejadores o listeners que definen c&#xf3;mo responder a cada situaci&#xf3;n.</p>\n<h2 data-lines=\"1823,1824\">&#x1f539; Caracter&#xed;sticas</h2>","children":[{"content":"","children":[{"content":"<strong>Orientada a eventos</strong>: el programa responde a est&#xed;mulos como clics, teclas, mensajes o se&#xf1;ales.","children":[],"payload":{"tag":"li","lines":"1825,1826"}},{"content":"<strong>Asincron&#xed;a</strong>: los eventos pueden ocurrir en cualquier momento, y el sistema debe estar preparado para reaccionar.","children":[],"payload":{"tag":"li","lines":"1826,1827"}},{"content":"<strong>Desacoplamiento</strong>: los emisores de eventos no necesitan conocer a los receptores.","children":[],"payload":{"tag":"li","lines":"1827,1828"}},{"content":"<strong>Uso de manejadores (event handlers)</strong>: funciones o m&#xe9;todos que se ejecutan cuando ocurre un evento.","children":[],"payload":{"tag":"li","lines":"1828,1829"}},{"content":"<strong>Flexibilidad</strong>: permite construir aplicaciones interactivas y din&#xe1;micas.","children":[],"payload":{"tag":"li","lines":"1829,1830"}},{"content":"<strong>Com&#xfa;n en interfaces gr&#xe1;ficas y sistemas distribuidos</strong>.","children":[],"payload":{"tag":"li","lines":"1830,1832"}}],"payload":{"tag":"ul","lines":"1825,1832"}},{"content":"","children":[{"content":"<strong>Eventos</strong>: sucesos que desencadenan una acci&#xf3;n (ejemplo: clic de rat&#xf3;n, llegada de un mensaje).","children":[],"payload":{"tag":"li","lines":"1834,1835"}},{"content":"<strong>Emisor (Event Source)</strong>: entidad que genera el evento.","children":[],"payload":{"tag":"li","lines":"1835,1836"}},{"content":"<strong>Receptor (Event Listener/Handler)</strong>: funci&#xf3;n o componente que responde al evento.","children":[],"payload":{"tag":"li","lines":"1836,1837"}},{"content":"<strong>Cola de eventos (Event Queue)</strong>: estructura que gestiona los eventos pendientes de procesar.","children":[],"payload":{"tag":"li","lines":"1837,1838"}},{"content":"<strong>Bucle de eventos (Event Loop)</strong>: mecanismo que escucha y despacha eventos a sus manejadores.","children":[],"payload":{"tag":"li","lines":"1838,1840"}}],"payload":{"tag":"ul","lines":"1834,1840"}},{"content":"","children":[{"content":"<strong>Interactividad</strong>: ideal para aplicaciones con interfaces gr&#xe1;ficas y sistemas que requieren respuesta inmediata.","children":[],"payload":{"tag":"li","lines":"1842,1843"}},{"content":"<strong>Escalabilidad</strong>: adecuado para sistemas distribuidos y aplicaciones que manejan m&#xfa;ltiples usuarios simult&#xe1;neos.","children":[],"payload":{"tag":"li","lines":"1843,1844"}},{"content":"<strong>Flexibilidad</strong>: f&#xe1;cil a&#xf1;adir nuevos eventos y manejadores sin modificar el n&#xfa;cleo del sistema.","children":[],"payload":{"tag":"li","lines":"1844,1845"}},{"content":"<strong>Eficiencia</strong>: permite manejar m&#xfa;ltiples operaciones sin bloquear el flujo principal.","children":[],"payload":{"tag":"li","lines":"1845,1846"}},{"content":"<strong>Desacoplamiento</strong>: emisores y receptores pueden evolucionar de manera independiente.","children":[],"payload":{"tag":"li","lines":"1846,1848"}}],"payload":{"tag":"ul","lines":"1842,1848"}},{"content":"","children":[{"content":"<strong>Complejidad</strong>: el flujo de ejecuci&#xf3;n puede volverse dif&#xed;cil de seguir en sistemas grandes.","children":[],"payload":{"tag":"li","lines":"1850,1851"}},{"content":"<strong>Depuraci&#xf3;n complicada</strong>: los errores pueden ser intermitentes y dif&#xed;ciles de reproducir.","children":[],"payload":{"tag":"li","lines":"1851,1852"}},{"content":"<strong>Sobrecarga de eventos</strong>: demasiados eventos simult&#xe1;neos pueden saturar el sistema.","children":[],"payload":{"tag":"li","lines":"1852,1853"}},{"content":"<strong>Dise&#xf1;o cuidadoso</strong>: se requiere una buena gesti&#xf3;n de colas y bucles de eventos para evitar bloqueos.","children":[],"payload":{"tag":"li","lines":"1853,1854"}},{"content":"<strong>Uso adecuado</strong>: m&#xe1;s &#xfa;til en sistemas interactivos o distribuidos que en aplicaciones secuenciales simples.","children":[],"payload":{"tag":"li","lines":"1854,1856"}}],"payload":{"tag":"ul","lines":"1850,1856"}},{"content":"","children":[{"content":"<strong>Interfaces gr&#xe1;ficas (GUI)</strong>: clics de botones, movimientos de rat&#xf3;n, entradas de teclado.","children":[],"payload":{"tag":"li","lines":"1858,1859"}},{"content":"<strong>Aplicaciones web</strong>: eventos en JavaScript como <code>onclick</code>, <code>onchange</code>, <code>onload</code>.","children":[],"payload":{"tag":"li","lines":"1859,1860"}},{"content":"<strong>Sistemas distribuidos</strong>: comunicaci&#xf3;n entre microservicios mediante eventos.","children":[],"payload":{"tag":"li","lines":"1860,1861"}},{"content":"<strong>IoT (Internet of Things)</strong>: dispositivos que reaccionan a sensores o se&#xf1;ales externas.","children":[],"payload":{"tag":"li","lines":"1861,1862"}},{"content":"<strong>Videojuegos</strong>: acciones del jugador y eventos del entorno.","children":[],"payload":{"tag":"li","lines":"1862,1863"}},{"content":"<strong>Plataformas de mensajer&#xed;a</strong>: recepci&#xf3;n y procesamiento de mensajes en tiempo real.","children":[],"payload":{"tag":"li","lines":"1863,1865"}}],"payload":{"tag":"ul","lines":"1858,1865"}}],"payload":{"tag":"li","lines":"1816,1865"}},{"content":"\n<p data-lines=\"1865,1866\">Aspecto orientada</p>\n<h2 data-lines=\"1867,1868\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1869,1872\">La <strong>Programaci&#xf3;n Aspecto-Orientada (AOP, Aspect-Oriented Programming)</strong> es un paradigma que busca <strong>separar las preocupaciones transversales</strong> del c&#xf3;digo principal de la aplicaci&#xf3;n.<br>\nEstas preocupaciones transversales son funcionalidades que afectan a m&#xfa;ltiples m&#xf3;dulos, como <strong>seguridad, logging, manejo de errores o transacciones</strong>.<br>\nEl objetivo es mejorar la modularidad y evitar la duplicaci&#xf3;n de c&#xf3;digo, integrando estos aspectos de manera autom&#xe1;tica en los puntos adecuados del programa.</p>\n<h2 data-lines=\"1873,1874\">&#x1f539; Caracter&#xed;sticas</h2>","children":[{"content":"","children":[{"content":"<strong>Separaci&#xf3;n de preocupaciones</strong>: distingue entre l&#xf3;gica de negocio y aspectos transversales.","children":[],"payload":{"tag":"li","lines":"1875,1876"}},{"content":"<strong>Aspectos</strong>: m&#xf3;dulos que encapsulan funcionalidades transversales.","children":[],"payload":{"tag":"li","lines":"1876,1877"}},{"content":"<strong>Join Points</strong>: puntos espec&#xed;ficos en la ejecuci&#xf3;n del programa donde se puede aplicar un aspecto.","children":[],"payload":{"tag":"li","lines":"1877,1878"}},{"content":"<strong>Advice</strong>: acciones que se ejecutan en un join point (antes, despu&#xe9;s o alrededor de la ejecuci&#xf3;n).","children":[],"payload":{"tag":"li","lines":"1878,1879"}},{"content":"<strong>Weaving (entrelazado)</strong>: proceso de integrar aspectos en el c&#xf3;digo base, ya sea en tiempo de compilaci&#xf3;n, carga o ejecuci&#xf3;n.","children":[],"payload":{"tag":"li","lines":"1879,1880"}},{"content":"<strong>Complemento a otros paradigmas</strong>: suele combinarse con la programaci&#xf3;n orientada a objetos.","children":[],"payload":{"tag":"li","lines":"1880,1882"}}],"payload":{"tag":"ul","lines":"1875,1882"}},{"content":"","children":[{"content":"<strong>Mantenibilidad</strong>: facilita la gesti&#xf3;n de funcionalidades transversales sin duplicar c&#xf3;digo.","children":[],"payload":{"tag":"li","lines":"1884,1885"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: los aspectos pueden aplicarse en diferentes m&#xf3;dulos o proyectos.","children":[],"payload":{"tag":"li","lines":"1885,1886"}},{"content":"<strong>Modularidad</strong>: mejora la organizaci&#xf3;n del sistema al separar l&#xf3;gica de negocio y aspectos.","children":[],"payload":{"tag":"li","lines":"1886,1887"}},{"content":"<strong>Flexibilidad</strong>: permite a&#xf1;adir o modificar aspectos sin alterar el c&#xf3;digo principal.","children":[],"payload":{"tag":"li","lines":"1887,1888"}},{"content":"<strong>Reducci&#xf3;n de errores</strong>: al centralizar la l&#xf3;gica transversal, se disminuye la probabilidad de inconsistencias.","children":[],"payload":{"tag":"li","lines":"1888,1890"}}],"payload":{"tag":"ul","lines":"1884,1890"}},{"content":"","children":[{"content":"<strong>Curva de aprendizaje</strong>: puede resultar complejo para desarrolladores sin experiencia en AOP.","children":[],"payload":{"tag":"li","lines":"1892,1893"}},{"content":"<strong>Sobrecarga conceptual</strong>: requiere entender join points, advices y weaving.","children":[],"payload":{"tag":"li","lines":"1893,1894"}},{"content":"<strong>Depuraci&#xf3;n dif&#xed;cil</strong>: el entrelazado puede complicar la identificaci&#xf3;n de errores.","children":[],"payload":{"tag":"li","lines":"1894,1895"}},{"content":"<strong>Uso excesivo</strong>: aplicar demasiados aspectos puede generar un sistema dif&#xed;cil de mantener.","children":[],"payload":{"tag":"li","lines":"1895,1896"}},{"content":"<strong>Dependencia de frameworks</strong>: AOP suele implementarse mediante herramientas espec&#xed;ficas (ejemplo: Spring AOP, AspectJ).","children":[],"payload":{"tag":"li","lines":"1896,1898"}}],"payload":{"tag":"ul","lines":"1892,1898"}},{"content":"","children":[{"content":"<strong>Logging</strong>: registrar autom&#xe1;ticamente la entrada y salida de m&#xe9;todos.","children":[],"payload":{"tag":"li","lines":"1900,1901"}},{"content":"<strong>Seguridad</strong>: verificar permisos antes de ejecutar ciertas operaciones.","children":[],"payload":{"tag":"li","lines":"1901,1902"}},{"content":"<strong>Transacciones</strong>: gestionar inicio, confirmaci&#xf3;n o rollback de transacciones en bases de datos.","children":[],"payload":{"tag":"li","lines":"1902,1903"}},{"content":"<strong>Manejo de excepciones</strong>: capturar y procesar errores de manera uniforme.","children":[],"payload":{"tag":"li","lines":"1903,1904"}},{"content":"<strong>Monitoreo de rendimiento</strong>: medir tiempos de ejecuci&#xf3;n de m&#xe9;todos cr&#xed;ticos.","children":[],"payload":{"tag":"li","lines":"1904,1905"}},{"content":"<strong>Auditor&#xed;a</strong>: registrar acciones de usuarios para trazabilidad.","children":[],"payload":{"tag":"li","lines":"1905,1907"}}],"payload":{"tag":"ul","lines":"1900,1907"}}],"payload":{"tag":"li","lines":"1865,1907"}}],"payload":{"tag":"h3","lines":"1422,1423"}},{"content":"Patrones de dise&#xf1;o","children":[{"content":"\n<p data-lines=\"1909,1910\">Introducci&#xf3;n</p>\n<h2 data-lines=\"1911,1912\">&#x1f539; &#xbf;Qu&#xe9; son los Patrones de Dise&#xf1;o?</h2>\n<p data-lines=\"1913,1916\">Los <strong>patrones de dise&#xf1;o</strong> son <strong>soluciones reutilizables y probadas</strong> para problemas comunes en el desarrollo de software.<br>\nNo son c&#xf3;digo listo para copiar y pegar, sino <strong>modelos conceptuales</strong> que gu&#xed;an a los desarrolladores en la construcci&#xf3;n de sistemas m&#xe1;s <strong>robustos, mantenibles y escalables</strong>.<br>\nSe popularizaron gracias al libro <em>Design Patterns: Elements of Reusable Object-Oriented Software</em> (1994) de la &quot;Banda de los Cuatro&quot; (Gamma, Helm, Johnson y Vlissides).</p>\n<h2 data-lines=\"1917,1918\">&#x1f539; Importancia</h2>","children":[{"content":"","children":[{"content":"<strong>Estandarizaci&#xf3;n</strong>: ofrecen un lenguaje com&#xfa;n entre arquitectos y desarrolladores.","children":[],"payload":{"tag":"li","lines":"1919,1920"}},{"content":"<strong>Reutilizaci&#xf3;n</strong>: evitan reinventar la rueda al aplicar soluciones ya probadas.","children":[],"payload":{"tag":"li","lines":"1920,1921"}},{"content":"<strong>Mantenibilidad</strong>: facilitan la evoluci&#xf3;n del software sin romper su estructura.","children":[],"payload":{"tag":"li","lines":"1921,1922"}},{"content":"<strong>Escalabilidad</strong>: permiten construir sistemas m&#xe1;s grandes y complejos de manera organizada.","children":[],"payload":{"tag":"li","lines":"1922,1923"}},{"content":"<strong>Flexibilidad</strong>: ayudan a desacoplar componentes y mejorar la extensibilidad.","children":[],"payload":{"tag":"li","lines":"1923,1925"}}],"payload":{"tag":"ul","lines":"1919,1925"}},{"content":"","children":[{"content":"<strong>Patrones Creacionales</strong><br>\nSe enfocan en la <strong>instanciaci&#xf3;n de objetos</strong>, controlando c&#xf3;mo y cu&#xe1;ndo se crean.<br>\nEjemplos: <em>Singleton, Factory Method, Abstract Factory, Builder, Prototype</em>.","children":[],"payload":{"tag":"li","lines":"1929,1932"}},{"content":"<strong>Patrones Estructurales</strong><br>\nSe centran en la <strong>composici&#xf3;n de clases y objetos</strong>, facilitando la organizaci&#xf3;n y reutilizaci&#xf3;n.<br>\nEjemplos: <em>Adapter, Bridge, Composite, Decorator, Facade, Flyweight, Proxy</em>.","children":[],"payload":{"tag":"li","lines":"1932,1935"}},{"content":"<strong>Patrones de Comportamiento</strong><br>\nDefinen c&#xf3;mo los objetos <strong>interact&#xfa;an y se comunican</strong> entre s&#xed;.<br>\nEjemplos: <em>Observer, Strategy, Command, State, Iterator, Mediator, Memento, Template Method, Visitor, Chain of Responsibility, Interpreter</em>.","children":[],"payload":{"tag":"li","lines":"1935,1939"}}],"payload":{"tag":"ul","lines":"1929,1939"}},{"content":"","children":[{"content":"Mejoran la <strong>calidad del software</strong>.","children":[],"payload":{"tag":"li","lines":"1941,1942"}},{"content":"Reducen el <strong>tiempo de desarrollo</strong>.","children":[],"payload":{"tag":"li","lines":"1942,1943"}},{"content":"Facilitan la <strong>comunicaci&#xf3;n entre equipos</strong>.","children":[],"payload":{"tag":"li","lines":"1943,1944"}},{"content":"Promueven el <strong>uso de buenas pr&#xe1;cticas</strong>.","children":[],"payload":{"tag":"li","lines":"1944,1945"}},{"content":"Ayudan a <strong>anticipar y resolver problemas comunes</strong>.","children":[],"payload":{"tag":"li","lines":"1945,1947"}}],"payload":{"tag":"ul","lines":"1941,1947"}},{"content":"","children":[{"content":"Los <strong>patrones de dise&#xf1;o</strong> act&#xfa;an a nivel de <strong>clases y objetos</strong>.","children":[],"payload":{"tag":"li","lines":"1949,1950"}},{"content":"Los <strong>patrones arquitect&#xf3;nicos</strong>","children":[],"payload":{"tag":"li","lines":"1950,1951"}}],"payload":{"tag":"ul","lines":"1949,1951"}}],"payload":{"tag":"li","lines":"1909,1951"}},{"content":"\n<p data-lines=\"1951,1952\">Creaci&#xf3;n</p>\n<h2 data-lines=\"1953,1954\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1955,1958\">Los <strong>patrones creacionales</strong> son un conjunto de patrones de dise&#xf1;o que se enfocan en la <strong>creaci&#xf3;n de objetos</strong>.<br>\nSu objetivo es abstraer y controlar el proceso de instanciaci&#xf3;n, ofreciendo mayor <strong>flexibilidad y reutilizaci&#xf3;n</strong> en el c&#xf3;digo.<br>\nEstos patrones permiten desacoplar la l&#xf3;gica de creaci&#xf3;n de objetos de su uso, evitando dependencias r&#xed;gidas y facilitando la extensi&#xf3;n del sistema.</p>\n<h2 data-lines=\"1959,1960\">&#x1f539; Singleton (&#xda;nico)</h2>","children":[{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: garantizar que una clase tenga <strong>una &#xfa;nica instancia</strong> en todo el sistema y proporcionar un punto de acceso global a ella.","children":[],"payload":{"tag":"li","lines":"1961,1962"}},{"content":"<strong>Caracter&#xed;sticas</strong>: constructor privado, instancia est&#xe1;tica y m&#xe9;todo p&#xfa;blico para obtener la instancia.","children":[],"payload":{"tag":"li","lines":"1962,1963"}},{"content":"<strong>Ejemplo de uso</strong>: gestores de configuraci&#xf3;n, conexiones a base de datos, registro de logs.","children":[],"payload":{"tag":"li","lines":"1963,1965"}}],"payload":{"tag":"ul","lines":"1961,1965"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: definir una <strong>interfaz para crear objetos</strong>, pero permitir que las subclases decidan qu&#xe9; clase instanciar.","children":[],"payload":{"tag":"li","lines":"1967,1968"}},{"content":"<strong>Caracter&#xed;sticas</strong>: delega la creaci&#xf3;n de objetos a clases derivadas.","children":[],"payload":{"tag":"li","lines":"1968,1969"}},{"content":"<strong>Ejemplo de uso</strong>: frameworks que permiten extender la creaci&#xf3;n de componentes sin modificar el c&#xf3;digo base.","children":[],"payload":{"tag":"li","lines":"1969,1971"}}],"payload":{"tag":"ul","lines":"1967,1971"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: proporcionar una <strong>interfaz para crear familias de objetos relacionados</strong> sin especificar sus clases concretas.","children":[],"payload":{"tag":"li","lines":"1973,1974"}},{"content":"<strong>Caracter&#xed;sticas</strong>: encapsula m&#xfa;ltiples f&#xe1;bricas concretas bajo una interfaz com&#xfa;n.","children":[],"payload":{"tag":"li","lines":"1974,1975"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas multiplataforma donde se necesitan diferentes implementaciones de UI (Windows, Mac, Linux).","children":[],"payload":{"tag":"li","lines":"1975,1977"}}],"payload":{"tag":"ul","lines":"1973,1977"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: separar la <strong>construcci&#xf3;n compleja de un objeto</strong> de su representaci&#xf3;n final, permitiendo crear diferentes representaciones con el mismo proceso.","children":[],"payload":{"tag":"li","lines":"1979,1980"}},{"content":"<strong>Caracter&#xed;sticas</strong>: utiliza pasos definidos para construir objetos paso a paso.","children":[],"payload":{"tag":"li","lines":"1980,1981"}},{"content":"<strong>Ejemplo de uso</strong>: creaci&#xf3;n de documentos, objetos JSON/XML, o ensamblaje de veh&#xed;culos con distintas configuraciones.","children":[],"payload":{"tag":"li","lines":"1981,1983"}}],"payload":{"tag":"ul","lines":"1979,1983"}},{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: crear nuevos objetos mediante la <strong>clonaci&#xf3;n de un prototipo existente</strong>, en lugar de instanciarlos directamente.","children":[],"payload":{"tag":"li","lines":"1985,1986"}},{"content":"<strong>Caracter&#xed;sticas</strong>: evita la creaci&#xf3;n costosa de objetos desde cero.","children":[],"payload":{"tag":"li","lines":"1986,1987"}},{"content":"<strong>Ejemplo de uso</strong>: sistemas gr&#xe1;ficos donde se duplican elementos, juegos donde se clonan personajes u objetos.","children":[],"payload":{"tag":"li","lines":"1987,1988"}}],"payload":{"tag":"ul","lines":"1985,1988"}}],"payload":{"tag":"li","lines":"1951,1988"}},{"content":"\n<p data-lines=\"1988,1989\">Estructurales</p>\n<h2 data-lines=\"1990,1991\">&#x1f539; Definici&#xf3;n</h2>\n<p data-lines=\"1992,1994\">Los <strong>patrones estructurales</strong> son un grupo de patrones de dise&#xf1;o que se enfocan en la <strong>composici&#xf3;n de clases y objetos</strong> para formar estructuras m&#xe1;s grandes y flexibles.<br>\nSu objetivo es facilitar la <strong>organizaci&#xf3;n, reutilizaci&#xf3;n y extensi&#xf3;n</strong> del c&#xf3;digo, asegurando que los componentes trabajen juntos de manera eficiente sin perder independencia.</p>\n<h2 data-lines=\"1995,1996\">&#x1f539; Adapter (Adaptador)</h2>","children":[{"content":"","children":[{"content":"<strong>Prop&#xf3;sito</strong>: permite que dos interfaces incompatibles trabajen juntas.","children":[],"payload":{"tag":"li","lines":"1997,1998"}},{"content":"<strong>Caracter&#xed;sticas</strong>: act&#xfa;a como un traductor entre clases o sistemas.","children":[],"payload":{"tag":"li","lines":"1998,1999"}},{"content":"<strong>Ejemplo de uso</strong>: integrar una librer&#xed;a antigua con un sistema moderno.","children":[],"payload":{"tag":"li","lines":"1999,2001"}}],"payload":{"tag":"
